/* ══ Bagua seal puzzle ══ */
/* 後天八卦：N=坎水 / NE=艮山 / E=震雷 / SE=巽風 / S=離火 / SW=坤地 / W=兌澤 / NW=乾天 */
var TRIGRAMS=[
  {key:'kan', name:'水', cn:'坎', pos:'N',  pat:[0,1,0]},
  {key:'gen', name:'山', cn:'艮', pos:'NE', pat:[1,0,0]},
  {key:'zhen',name:'雷', cn:'震', pos:'E',  pat:[0,0,1]},
  {key:'xun', name:'風', cn:'巽', pos:'SE', pat:[1,1,0]},
  {key:'li',  name:'火', cn:'離', pos:'S',  pat:[1,0,1]},
  {key:'kun', name:'地', cn:'坤', pos:'SW', pat:[0,0,0]},
  {key:'dui', name:'澤', cn:'兌', pos:'W',  pat:[0,1,1]},
  {key:'qian',name:'天', cn:'乾', pos:'NW', pat:[1,1,1]}
];
/* 八層撕開順序 */
var BAGUA_LAYERS=[
  {idx:1,zh:'咸',sub:'澤山咸',order:['澤','山']},
  {idx:2,zh:'蒙',sub:'山水蒙',order:['山','水']},
  {idx:3,zh:'夬',sub:'澤天夬',order:['澤','天']},
  {idx:4,zh:'革',sub:'澤火革',order:['澤','火']},
  {idx:5,zh:'家人',sub:'風火家人',order:['風','火']},
  {idx:6,zh:'睽',sub:'火澤睽',order:['火','澤']},
  {idx:7,zh:'習坎',sub:'坎為水',order:['水','水']},
  {idx:8,zh:'渙',sub:'風水渙',order:['風','水']}
];
/* 預設八段咒文（後台可改 G.bagua.incantations[0..7]） */
var BAGUA_DEFAULT_INC=[
  '澤畔有山，山色無言。\n感之以誠，應之以顫。\n目所未觸，心已先亂。\n此為咸始，動而未言。',
  '山下有水，行而不知所往。\n蒙者非暗，是光未至之際。\n問之不答，答之又問。\n兩岸皆霧，渡口無人掌燈。',
  '澤氣升騰，直衝九天。\n夬者，決也，五陽逼一陰於頂。\n此言一出，無可追回。\n天若有答，便是晴；天若無聲，亦已應。',
  '澤中生火，水火不容卻仍相擁。\n革者，舊皮脫盡，新色方顯。\n從此山河改色，日月換位。\n燒至澤底，燙仍不知。',
  '風入火中，火憑風勢，風藉火明。\n家者，各有其位，各守其則。\n灶有火餘溫，窗有穿堂風。\n親近者，最易為細故所傷。',
  '火，性上而炎，澤性潤下，背道而馳。\n睽者，同根而異向，相識而相違。\n昨日之澤，今日之火。\n燒的是同一片。',
  '水覆於水，險摞於險。\n兩淵相對，緘口不言。\n沉默卻非無話可說。\n水外仍是水，無岸可渡。',
  '風起於水上，萬紋皆起。\n渙者非滅，為形將盡而質猶存。\n一切離散之物，終將凝聚。\n此後，水不盡，風不散。'
];
var bagua={layer:0,step:0,phase:1,hintTimer:null,incTimer:null,active:false};

function stageBagua(){
  bagua={layer:0,step:0,phase:1,hintTimer:null,incTimer:null,active:true};
  document.getElementById('stage-bagua').classList.add('on');
  /* 隱藏對話框＋道具欄 */
  document.getElementById('inv-bar').style.display='none';
  document.getElementById('inv-panel').classList.remove('on');
  /* 渲染八卦輪 */
  renderBaguaWheel();
  updateBaguaProgress();
  /* 燈泡：15 秒後出現（不需購買，到時自然顯現） */
  var btn=document.getElementById('bagua-hint-btn');btn.classList.remove('on');
  if(bagua.hintTimer)clearTimeout(bagua.hintTimer);
  bagua.hintTimer=setTimeout(function(){btn.classList.add('on');},15000);
  /* 啟動咒文閃現迴圈 */
  startIncantationLoop();
}

/* 用 SVG 畫八卦三爻（pat 為 [上爻, 中爻, 下爻]，1=陽長橫、0=陰短橫） */
function trigramSvg(pat){
  /* viewBox 100×60，三條線分別在 y=8,28,48；陽爻 width=90、陰爻兩段 width=38 中間留 14 空隙 */
  var svg='<svg class="bg-yao-svg" viewBox="0 0 100 60" preserveAspectRatio="xMidYMid meet">';
  pat.forEach(function(yang,i){
    var y=8+i*20;
    if(yang){
      svg+='<rect x="5" y="'+y+'" width="90" height="9" rx="1.5"/>';
    }else{
      svg+='<rect x="5"  y="'+y+'" width="38" height="9" rx="1.5"/>';
      svg+='<rect x="57" y="'+y+'" width="38" height="9" rx="1.5"/>';
    }
  });
  svg+='</svg>';
  return svg;
}

function renderBaguaWheel(){
  var wheel=document.getElementById('bagua-wheel');
  /* 移除舊的卦元件，但保留 SVG（octagon 外框） */
  Array.from(wheel.querySelectorAll('.bg-trigram')).forEach(function(el){el.remove();});
  TRIGRAMS.forEach(function(tg){
    var d=document.createElement('div');
    d.className='bg-trigram';d.id='bg-tg-'+tg.key;
    d.dataset.pos=tg.pos;
    d.onclick=(function(name){return function(){tapTrigram(name);};})(tg.name);
    /* 預先放預設爻線（SVG），再嘗試讀 asset 取代 */
    d.innerHTML=trigramSvg(tg.pat);
    wheel.appendChild(d);
    /* 後台若上傳了該卦的圖（key=bagua-tg-{key}），用圖取代爻線；找不到就保留 SVG */
    assetURL('bagua-tg-'+tg.key,function(url){
      if(url){d.innerHTML='<img src="'+url+'" alt="'+tg.cn+'">';return;}
      /* 試試 assets/images/bagua-tg-xxx.png */
      var test=new Image();
      test.onload=function(){d.innerHTML='<img src="assets/images/bagua-tg-'+tg.key+'.png" alt="'+tg.cn+'">';};
      test.onerror=function(){};
      test.src='assets/images/bagua-tg-'+tg.key+'.png';
    });
  });
}

function updateBaguaProgress(){
  var lv=BAGUA_LAYERS[bagua.layer];
  var p=document.getElementById('bagua-progress');
  if(!lv){p.textContent='';return;}
  p.textContent='第 '+lv.idx+' 層 ／ 共 8 層';
}

function tapTrigram(name){
  if(!bagua.active||bagua.locked)return;
  var lv=BAGUA_LAYERS[bagua.layer];
  if(!lv){return;}
  var expected=lv.order[bagua.step];
  if(name!==expected){
    return baguaWrong();
  }
  bagua.locked=true;
  /* 找到對應 trigram element 並標記為 torn */
  var tg=TRIGRAMS.find(function(t){return t.name===name;});
  var el=document.getElementById('bg-tg-'+tg.key);
  if(el)el.classList.add('torn');
  setTimeout(function(){
    if(bagua.step===0){
      /* 第一個對 → 全部復原（讓玩家點第二個正確的） */
      restoreAllTrigrams();
      bagua.step=1;
      bagua.locked=false;
    }else{
      /* 第二個對 → 藍光 3 秒 → 下一層（或勝利） */
      bagua.step=0;bagua.layer++;
      if(bagua.layer>=BAGUA_LAYERS.length){
        baguaWin();
      }else{
        blueFlashThenNext();
      }
    }
  },420);
}

function restoreAllTrigrams(){
  TRIGRAMS.forEach(function(tg){
    var el=document.getElementById('bg-tg-'+tg.key);if(el)el.classList.remove('torn');
  });
}

function baguaWrong(){
  bagua.locked=true;
  var stage=document.getElementById('stage-bagua');
  var flash=document.getElementById('bagua-flash');
  flash.className='red';
  stage.classList.add('shake');
  setTimeout(function(){
    flash.className='';
    stage.classList.remove('shake');
    /* 全部歸零：所有撕開的爻復原、回第一層、咒文回第一階段 */
    restoreAllTrigrams();
    bagua.layer=0;bagua.step=0;bagua.phase=1;
    updateBaguaProgress();
    clearIncCellTimers();
    if(bagua.incTimer){clearTimeout(bagua.incTimer);bagua.incTimer=null;}
    startIncantationLoop();
    bagua.locked=false;
  },1000);
}

function clearIncCellTimers(){
  if(typeof _incCellTimers!=='undefined'){
    _incCellTimers.forEach(function(t){if(t)clearTimeout(t);});
    _incCellTimers=[];
  }
}

function blueFlashThenNext(){
  var flash=document.getElementById('bagua-flash');
  flash.className='blue';
  setTimeout(function(){
    flash.className='';
    restoreAllTrigrams();
    /* 階段更新：layers 0-2 = phase1（八段全顯）、其餘走 phase2（隨機閃現） */
    var newPhase=bagua.layer<=2?1:2;
    if(newPhase!==bagua.phase){
      bagua.phase=newPhase;
      clearIncCellTimers();
      startIncantationLoop();
    }
    updateBaguaProgress();
    bagua.locked=false;
  },3000);
}

function baguaWin(){
  bagua.active=false;
  clearIncCellTimers();
  if(bagua.hintTimer){clearTimeout(bagua.hintTimer);bagua.hintTimer=null;}
  closeBaguaIncantation();
  var stage=document.getElementById('stage-bagua');
  /* 1. 八個卦交錯淡出（總計 ~0.8 秒） */
  TRIGRAMS.forEach(function(tg,i){
    setTimeout(function(){
      var el=document.getElementById('bg-tg-'+tg.key);if(el)el.classList.add('torn');
    },i*100);
  });
  /* 2. 卦淡出後跳出「封印已解」字樣（1.6 秒動畫，自會 fadeOut） */
  setTimeout(function(){
    var old=document.getElementById('bagua-win-text');if(old)old.remove();
    var div=document.createElement('div');
    div.id='bagua-win-text';div.textContent='封印已解';
    stage.appendChild(div);
  },1000);
  /* 3. 封印已解動畫結束後，整個 stage 淡出，並前進到下一段劇情 */
  setTimeout(function(){stage.classList.add('fading');},2500);
  setTimeout(function(){
    stage.classList.remove('on');
    stage.classList.remove('fading');
    var win=document.getElementById('bagua-win-text');if(win)win.remove();
    /* 八卦輪復原（為下次萬一再進來預備） */
    TRIGRAMS.forEach(function(tg){
      var el=document.getElementById('bg-tg-'+tg.key);if(el)el.classList.remove('torn');
    });
    /* 還原 SVG（移除上一版可能殘留的發光樣式） */
    var svg=stage.querySelector('.bagua-octagon-svg');if(svg)svg.style.filter='';
    document.getElementById('inv-bar').style.display='';
    /* 解鎖獎勵：透過 run() 讓腳本的 {t:'item',id:'slider1'} 事件接管 → 觸發中央揭示＋黑屏回憶 */
    run();
  },3050);
}

function getIncantations(){
  var arr=(G.bagua&&Array.isArray(G.bagua.incantations))?G.bagua.incantations:BAGUA_DEFAULT_INC;
  return BAGUA_DEFAULT_INC.map(function(d,i){return (arr[i]&&arr[i].length)?arr[i]:d;});

/* 建立九宮格（3+3+2）：8 個 .bg-inc-block 一次建好，永遠存在；獨立 timer 控制每篇的 on/off */
function buildIncantationGrid(){
  var content=document.getElementById('bagua-inc-content');
  if(content.childElementCount===8)return; /* 已建好就不重建（避免閃爍重置） */
  var inc=getIncantations();
  content.innerHTML=inc.map(function(t,i){
    return '<div class="bg-inc-block" id="bg-inc-'+i+'" data-no="'+(i+1)+'">'
      +'<span class="bg-inc-no">第 '+(i+1)+' 層</span>'
      +'<span class="bg-inc-text">'+esc(t)+'</span>'
      +'</div>';
  }).join('');
}

/* 階段 → 每篇獨立隨機顯示／隱藏的時間範圍（毫秒）
   原本第 3 階段（layer 7-8）有毛玻璃 + 卦名替換成？，因為太難解已移除，
   layer 4-8 一律走 phase 2（亂序、隨機閃現，但內容清楚不模糊） */
function getIncTimings(phase){
  if(phase===1)return {showMin:5000,showMax:8000,gapMin:1500,gapMax:3500};
  return                {showMin:2000,showMax:4000,gapMin:4000,gapMax:8000};
}

/* 為每篇咒文獨立排程「顯示一段時間 → 隱藏一段時間 → 再顯示」迴圈 */
var _incCellTimers=[];
function scheduleIncCell(i){
  if(!bagua.active)return;
  var cell=document.getElementById('bg-inc-'+i);
  if(!cell)return;
  var t=getIncTimings(bagua.phase);
  var inc=getIncantations();
  var textEl=cell.querySelector('.bg-inc-text');
  if(textEl)textEl.textContent=inc[i];
  cell.classList.remove('blur');
  cell.classList.add('on');
  var showDur=t.showMin+Math.random()*(t.showMax-t.showMin);
  _incCellTimers[i]=setTimeout(function(){
    if(!bagua.active)return;
    cell.classList.remove('on');
    var gap=t.gapMin+Math.random()*(t.gapMax-t.gapMin);
    _incCellTimers[i]=setTimeout(function(){scheduleIncCell(i);},gap);
  },showDur);
}

function startIncantationLoop(){
  /* 取消舊計時器 */
  _incCellTimers.forEach(function(t){if(t)clearTimeout(t);});
  _incCellTimers=[];
  /* 確保卷軸 DOM 已建立（即使尚未打開卷軸，也要事先建好讓計時繼續跑） */
  buildIncantationGrid();
  /* 為每篇分別排程，初始 hide 後錯開首次顯示 */
  for(var i=0;i<8;i++){
    var cell=document.getElementById('bg-inc-'+i);
    if(cell)cell.classList.remove('on');
    (function(idx){
      var initialDelay=Math.random()*1500;
      _incCellTimers[idx]=setTimeout(function(){scheduleIncCell(idx);},initialDelay);
    })(i);
  }
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ══ Switchboard（跳線版：先選跳線 → 插發話孔 → 選另一跳線 → 插受話孔 → 開始通話） ══ */
var sbState={callIdx:0,step:0,selectedCord:null,pluggedFrom:false,pluggedTo:false};

function stageSwitchboard(){
  if(!G.calls||!G.calls.length){run();return;}
  var sb=(G.stages&&G.stages.switchboard)||{};
  /* 發話/受話 標籤 */
  var lbls=document.querySelectorAll('#call-banner .cb-label');
  if(lbls[0])lbls[0].textContent=sb.fromLabel||'發話';
  if(lbls[1])lbls[1].textContent=sb.toLabel||'受話';
  /* 開始通話按鈕文字 */
  document.getElementById('sb-talk-btn').textContent='開始通話';
  document.getElementById('stage-switchboard').classList.add('on');
  loadCall(0);
}
function loadCall(idx){
  sbState={callIdx:idx,step:0,selectedCord:null,pluggedFrom:false,pluggedTo:false};
  var call=G.calls[idx];if(!call){finishSwitchboard();return;}
  var caller=(G.jacks||[]).find(function(j){return j.id===call.fromId;})
            ||{name:call.fromName||'',num:call.fromNum||''};
  var target=(G.jacks||[]).find(function(j){return j.id===call.toId;})
            ||{name:call.toName||'',num:call.toNum||''};
  document.getElementById('call-banner').className='call-banner';
  document.getElementById('cb-from-num').textContent=(caller.num||'')+' '+(caller.name||'');
  document.getElementById('cb-to-num').textContent=(target.num||'')+' '+(target.name||'');
  document.getElementById('sb-progress').textContent='第 '+(idx+1)+' ／ '+G.calls.length+' 通';
  buildJacks(call);buildCords();
  var tb=document.getElementById('sb-talk-btn');tb.disabled=false;tb.classList.remove('active');
  document.getElementById('sb-dialog-box').innerHTML='';
  document.getElementById('sb-finish-btn').style.display='none';
}
function buildJacks(call){
  var grid=document.getElementById('sb-jacks');grid.innerHTML='';
  (G.jacks||[]).forEach(function(j){
    var div=document.createElement('div');
    div.className='sb-jack'+(j.id===call.fromId?' ringing':'');
    div.id='sbj-'+j.id;
    div.innerHTML='<div class="sb-jack-hole"></div><div class="sb-jack-name">'+(j.name||'')+'<br>'+(j.num||'')+'</div>';
    div.onclick=(function(jid){return function(){jackClicked(jid);};})(j.id);
    grid.appendChild(div);
  });
}
function buildCords(){
  var sb=(G.stages&&G.stages.switchboard)||{};
  var pre=sb.cordPrefix!=null?sb.cordPrefix:'跳線 ';
  document.getElementById('sb-cords').innerHTML=['A','B'].map(function(l){
    return '<div class="sb-cord" id="cord-'+l+'" onclick="cordClicked(\''+l+'\')">'
      +'<div class="sb-cord-plug"></div><div class="sb-cord-wire"></div>'
      +'<div class="sb-cord-name">'+pre+l+'</div></div>';
  }).join('');
}
function cordClicked(id){
  if(sbState.step!==0&&sbState.step!==2){return;}
  if(document.getElementById('cord-'+id).classList.contains('used'))return;
  sbState.selectedCord=id;
  document.querySelectorAll('.sb-cord').forEach(function(c){c.classList.remove('selected');});
  document.getElementById('cord-'+id).classList.add('selected');
  sbState.step=sbState.step===0?1:3;
}
function jackClicked(jid){
  var call=G.calls[sbState.callIdx];
  if(sbState.step===1){
    if(jid===call.fromId){
      sbState.pluggedFrom=true;
      document.getElementById('sbj-'+jid).className='sb-jack plugged';
      var c=document.getElementById('cord-'+sbState.selectedCord);c.classList.add('used');c.classList.remove('selected');
      sbState.selectedCord=null;sbState.step=2;
    }else flashWrong(jid);
  }else if(sbState.step===3){
    if(jid===call.toId){
      sbState.pluggedTo=true;
      document.getElementById('sbj-'+jid).className='sb-jack plugged';
      var c=document.getElementById('cord-'+sbState.selectedCord);c.classList.add('used');c.classList.remove('selected');
      sbState.step=4;
      document.getElementById('call-banner').className='call-banner connected';
    }else flashWrong(jid);
  }
}
function flashWrong(jid){
  var el=document.getElementById('sbj-'+jid);if(!el)return;
  el.classList.add('wrong-flash');
  setTimeout(function(){el.classList.remove('wrong-flash');},600);
}
function pressTalk(){
  if(sbState.step!==4)return;
  sbState.step=5;
  var tb=document.getElementById('sb-talk-btn');tb.classList.add('active');tb.disabled=true;
  var call=G.calls[sbState.callIdx],di=0;
  var delay=((G.stages&&G.stages.switchboard&&G.stages.switchboard.dialogDelay)||2400);
  function next(){
    if(di>=(call.dialogs||[]).length){callDone();return;}
    var d=call.dialogs[di++];
    addSbMsg(d.who||'',d.text||'');
    setTimeout(next,delay);
  }
  next();
}
function callDone(){
  var call=G.calls[sbState.callIdx];
  document.getElementById('sbj-'+call.fromId).className='sb-jack correct';
  document.getElementById('sbj-'+call.toId).className='sb-jack correct';
  document.getElementById('call-banner').className='call-banner done';
  var sb=(G.stages&&G.stages.switchboard)||{};
  var isLast=(sbState.callIdx===G.calls.length-1);
  if(isLast){
    /* 最後一通：不顯示行內按鈕；劇情跑完後黑屏 → 在黑屏上顯示結束作業 → 點擊 → 黑 1 秒 → 進下一段 */
    document.getElementById('sb-finish-btn').style.display='none';
    setTimeout(function(){_sbLastCallCeremony(sb.doneBtn||'結束作業');},1200);
  }else{
    var btn=document.getElementById('sb-finish-btn');
    btn.style.display='block';
    btn.textContent=sb.nextBtn||'下一通';
  }
}
function _sbLastCallCeremony(label){
  /* 先把交換機關掉，否則 blackout（z-index:56）會被 stage-switchboard（z-index:70）蓋住，
     看起來就「卡住、沒黑屏」 */
  document.getElementById('stage-switchboard').classList.remove('on');
  sbState.callIdx=0;
  var bo=document.getElementById('blackout');
  bo.classList.add('on');
  setTimeout(function(){
    var existed=document.getElementById('sb-final-btn');if(existed)existed.remove();
    var btn=document.createElement('button');
    btn.id='sb-final-btn';
    btn.textContent=label||'結束作業';
    btn.style.cssText='position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);'
      +'padding:14px 42px;background:rgba(20,14,8,.85);border:1px solid var(--gold);'
      +'color:#fff;font-family:\'Shippori Mincho\',\'Noto Serif TC\',serif;'
      +'font-size:1.15em;font-weight:700;letter-spacing:.4em;cursor:pointer;border-radius:2px;'
      +'animation:blink 1.6s ease-in-out infinite;z-index:60;';
    btn.onclick=function(){
      btn.remove();
      setTimeout(function(){
        bo.classList.remove('on');
        run();
      },1000);
    };
    bo.appendChild(btn);
  },2000);
}
function nextCall(){
  var next=sbState.callIdx+1;
  if(next>=G.calls.length){finishSwitchboard();}
  else loadCall(next);
}
function finishSwitchboard(){
  document.getElementById('stage-switchboard').classList.remove('on');
  sbState.callIdx=0;
  run();
}
function addSbMsg(who,text){
  /* 單行替換：不再累積、不再滑動，每次直接覆蓋整個對白區 */
  var box=document.getElementById('sb-dialog-box');if(!box)return;

    +'<div class="sb-msg-text">'+String(text||'').replace(/\n/g,'<br>')+'</div>';
}

/* stage 2 photo（純支付用，不顯示提示或答案） */
var _photoRefKey='stage2-ref';  /* 預設 — 第二章拍照辨識；photo-final 會切換 */
function stagePhoto(){
  document.getElementById('photo-hint').textContent='';
  document.getElementById('photo-result').textContent='';
  document.getElementById('stage-photo').classList.add('on');
}
function onPhotoUpload(input){
  var file=input.files[0];if(!file)return;
  document.getElementById('photo-result').textContent='比對中…';
  loadAsset(_photoRefKey||'stage2-ref',function(refBlob){
    if(!refBlob){setTimeout(photoSuccess,800);return;}
    compareImages(file,refBlob,function(score){
      if(score>=(G.stage2&&G.stage2.threshold||70))photoSuccess();
      else document.getElementById('photo-result').textContent='相似度不足（'+score+'%），請再試一次。';
    });
  });
  input.value='';
}
function compareImages(a,b,cb){
  function toData(blob,done){
    var img=new Image(),c=document.createElement('canvas');c.width=c.height=64;
    img.onload=function(){c.getContext('2d').drawImage(img,0,0,64,64);done(c.getContext('2d').getImageData(0,0,64,64).data);};
    img.src=URL.createObjectURL(blob);
  }
  toData(a,function(da){toData(b,function(db){
    var sum=0;
    for(var i=0;i<da.length;i+=4){
      var dr=da[i]-db[i],dg=da[i+1]-db[i+1],db2=da[i+2]-db[i+2];
      sum+=Math.sqrt(dr*dr+dg*dg+db2*db2);
    }
    cb(Math.max(0,Math.round(100-sum/(da.length/4)/4.41)));
  });});
}
function photoSuccess(){
  /* 拍照頁只顯示「辨識完成」中性訊息，絕對不在此頁秀出答案 */
  document.getElementById('photo-result').textContent='辨識完成';
  setTimeout(function(){
    document.getElementById('stage-photo').classList.remove('on');
    _photoRefKey='stage2-ref';  /* 重置 ref */
    if(_inHintFlow){
      /* 進到答案揭露頁（分離於拍照頁） */
      showHintReveal();
    }else{
      run();
    }
  },900);
}

/* 提示揭露頁：購得線索照片 → 入道具欄 → 鎖上商城（購買上限 1 次） */
function showHintReveal(){
  var prefix=(G.stage2&&G.stage2.hintPrefix)||'您購得的線索';
  document.getElementById('hr-prefix').textContent=prefix;
  var img=document.getElementById('hr-img');
  assetURLOrPath('hint-photo','assets/images/hint-photo.jpg',function(url){
    if(url){img.src=url;img.style.display='block';}
    else{img.removeAttribute('src');img.style.display='none';}
  });
  document.getElementById('hint-reveal').classList.add('on');
  addInventory('hint-photo','線索照片','📷','hint-photo');
  /* 標記為已購買、永久鎖商城 */
  _hintPurchased=true;
  try{localStorage.setItem(HINT_FLAG_KEY,'1');}catch(e){}
  var bulb=document.getElementById('hint-bulb');if(bulb)bulb.classList.remove('on');
  if(_hintTimer){clearTimeout(_hintTimer);_hintTimer=null;}
}
function closeHintReveal(){
  document.getElementById('hint-reveal').classList.remove('on');
  var inp=document.getElementById('hg-input');
  if(inp){try{inp.focus();}catch(e){}}
}

/* 鎖住頁輸入：Enter 比對 hintAnswer */
function hgKey(e){
  if(e.key!=='Enter')return;
  var inp=document.getElementById('hg-input');
  var ans=((G.stage2&&G.stage2.hintAnswer)||'').trim();
  var val=(inp.value||'').trim();
  if(!ans){
    /* 未設定答案 → 任意輸入皆可過關（避免卡死） */
    if(val){unlockHintGate();return;}
  }
  if(val===ans){unlockHintGate();return;}
  /* 答錯：shake 一下 */
  inp.classList.remove('shake');void inp.offsetWidth;inp.classList.add('shake');
}
function unlockHintGate(){
  closeHintGate();
  /* 解開密碼 → 直接進壁龕（停留 G.stages.niche.duration 秒）→ 八卦封印關。
     不論腳本下一個事件是什麼，都先強制執行這段流程；流程結束後再回到原本的 SCRIPT 流。 */
  setTimeout(function(){
    /* ch2 腳本在 hint-gate 後本來就排好 niche→bagua→旁白。
       這裡只要 run() 讓它照順序播一次即可——
       千萬不要再直接呼叫 stageNiche() 或硬插 bagua，否則 niche/bagua 會重播。
       只有舊的自訂腳本後面完全沒有 niche/bagua 時，才補插一組。 */
    var hasSeq=false;
    for(var i=_ptr;i<Math.min(SCRIPT.length,_ptr+6);i++){
      var e=SCRIPT[i];
      if(e&&e.t==='stage'&&(e.id==='niche'||e.id==='bagua')){hasSeq=true;break;}
    }
    if(!hasSeq){
      SCRIPT.splice(_ptr,0,{t:'stage',id:'niche'},{t:'stage',id:'bagua'});
    }
    run();
  },200);
}

/* ══ 雙重同步：BroadcastChannel + storage 事件
   後台儲存後同時透過 BC 推 reload 訊息（同瀏覽器分頁）+ localStorage 變動觸發 storage 事件
   （任何同 origin 的其他分頁都收得到，比 BC 更可靠）。 ══ */
function _liveSyncReload(){
  loadGameData();applyAppear();buildScript();
  applyImageAssets(function(){});
  loadAllAudio(function(){});
  _applyDevVisibility();
  if(typeof devUpdateStatus==='function')devUpdateStatus();
}
try{
  var _bc=new BroadcastChannel(BC_NAME);
  _bc.onmessage=function(e){
    var d=e.data;
    if(d.type==='reload'){_liveSyncReload();}
    else if(d.type==='asset-update'){
      var k=d.key;
      if(k==='music'||k==='ring'||k==='ambient'||k==='storm'||k==='office'||
         (G.customAudio&&G.customAudio.some(function(a){return a.key===k;}))){
        loadAllAudio(function(){});
      }else{
        applyImageAssets(function(){});
      }
    }
  };
}catch(e){}
/* storage event 是 BroadcastChannel 失靈時的後備：當另一個分頁／視窗修改 localStorage[LS_KEY]，
   本頁會收到 storage 事件並 reload */
window.addEventListener('storage',function(e){
  if(e.key===LS_KEY){
    _liveSyncReload();
  }
});

/* ══ Init ══ */
var _gameStarted=false;
function _startGame(){
  if(_gameStarted)return;
  _gameStarted=true;
  var ld=document.getElementById('loading');
  if(ld){ld.style.opacity='0';setTimeout(function(){ld.style.display='none';},520);}
  /* 掛載互動解鎖音訊（click + touchstart） */
  function _unlock(){_unlockAudio();}
  document.getElementById('game').addEventListener('click',    _unlock,{once:true,passive:true});
  document.getElementById('game').addEventListener('touchstart',_unlock,{once:true,passive:true});
  renderInventory();
  buildScript();
  run();
}
/* ══ Dev Toolbar ══ */
function _devEnabled(){return !(G&&G.dev&&G.dev.show===false);}
function _applyDevVisibility(){
  var on=_devEnabled();
  var t=document.getElementById('dev-toggle');
  var b=document.getElementById('dev-bar');
  if(t)t.style.display=on?'':'none';
  if(b)b.style.display=on?'':'none';
  if(!on&&b)b.classList.add('hidden');
}
function devShow(){
  if(!_devEnabled())return;
  document.getElementById('dev-toggle').style.display='none';
  document.getElementById('dev-bar').classList.remove('hidden');
  devUpdateStatus();
}
function devHide(){
  document.getElementById('dev-toggle').style.display=_devEnabled()?'':'none';
  document.getElementById('dev-bar').classList.add('hidden');
}
function devUpdateStatus(){
  var el=document.getElementById('dev-status');if(!el)return;
  var ev=SCRIPT[_ptr-1]||SCRIPT[_ptr]||{};
  var t=ev.t||'?',extra='';
  if(t==='chapter')extra=' '+(ev.main||'');
  else if(t==='stage')extra=' #'+ev.id;
  else if(t==='line')extra=' '+(ev.who||'');
  el.textContent='ptr='+_ptr+'/'+SCRIPT.length+' ['+t+extra+']';
}
function devHideAllStages(){
  ['stage-phone-ring','stage-switchboard','stage-map','stage-photo',
   'stage-hint-gate','stage-hint-shop','stage-niche','stage-bagua','stage-puzzle','stage-sortbins','stage-sortbins2','stage-brickmold','stage-dreamwalk','stage-klotski','stage-phylock',
   'hint-reveal','image-ev','ch-card','blackout','curtain'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.classList.remove('on');
  });
  ['hint-bulb','hint-confirm','bagua-hint-btn','bagua-incantation','bagua-hint-view','puzzle-rules-view','puzzle-photo-reveal',
   'inv-panel','inv-viewer'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.classList.remove('on');
  });
  /* 道具欄要再顯示回來（之前 stageBagua 把它隱藏） */
  var ib=document.getElementById('inv-bar');if(ib)ib.style.display='';
  /* 取消所有 timer */
  if(typeof _nicheTimer!=='undefined'&&_nicheTimer){clearTimeout(_nicheTimer);_nicheTimer=null;}
  if(typeof _hintTimer!=='undefined'&&_hintTimer){clearTimeout(_hintTimer);_hintTimer=null;}
  if(bagua&&bagua.incTimer){clearTimeout(bagua.incTimer);bagua.incTimer=null;}
  if(bagua&&bagua.hintTimer){clearTimeout(bagua.hintTimer);bagua.hintTimer=null;}
  if(bagua)bagua.active=false;
  _waiting=false;_inHintFlow=false;
  if(_lockTimer){clearTimeout(_lockTimer);_lockTimer=null;}
  hideDialog();
  /* 停掉所有環境音；保留背景音樂 */
  stopAudio('rain');stopAudio('ring');
  /* 雨視覺也關掉 */
  var rain=document.getElementById('rain');if(rain)rain.classList.remove('on');
}
function devSkip(){
  devHideAllStages();
  /* 若正在等對白，直接放行；否則前進一個事件 */
  setTimeout(function(){run();devUpdateStatus();},20);
}
function devSkipChapter(){
  devHideAllStages();
  while(_ptr<SCRIPT.length&&SCRIPT[_ptr]&&SCRIPT[_ptr].t!=='chapter')_ptr++;
  if(_ptr<SCRIPT.length)_ptr++; /* 跳過該章節卡本身，從章節內容開始 */
  setTimeout(function(){run();devUpdateStatus();},20);
}
function devJumpTo(target){
  if(!target)return;
  devHideAllStages();
  var sel=document.getElementById('dev-jump');if(sel)sel.value='';
  /* ch1..ch11：跳到該章節第一個事件 */
  if(/^ch([1-9]|1[01])$/.test(target)){
    var base=0,target_ptr=0;
    ['ch1','ch2','ch3','ch4','ch5','ch6','ch7','ch8','ch9','ch10','ch11'].forEach(function(k){
      if(k===target)target_ptr=base;
      if(Array.isArray(G[k]))base+=G[k].length;
    });
    _ptr=target_ptr;
    /* 跳過 ch2 之後的章節 → 自動標記提示商城已購買，避免回頭被卡 */
    var chNum=parseInt(target.slice(2),10);
    if(chNum>=3){
      _hintPurchased=true;
      try{localStorage.setItem(HINT_FLAG_KEY,'1');}catch(e){}
    }
    setTimeout(function(){run();devUpdateStatus();},20);
    return;
  }
  /* 直接觸發單一舞台 */
  if(target==='hint-shop'){stageHintShop();devUpdateStatus();return;}
  if(target==='photo'){stagePhoto();_inHintFlow=false;devUpdateStatus();return;}
  /* 找到該舞台事件在 SCRIPT 中的位置，把 _ptr 設到「之後」，
     這樣舞台結束 run() 會接續正確劇情，不會回頭到 ch1 序章暴雨 */
  buildScript();
  for(var i=0;i<SCRIPT.length;i++){
    var ev=SCRIPT[i];
    if(ev&&ev.t==='stage'&&ev.id===target){_ptr=i+1;break;}
  }
  /* 跳過鎖住頁時自動標記提示商城已購買 */
  if(target==='hint-gate'){_hintPurchased=false;try{localStorage.removeItem(HINT_FLAG_KEY);}catch(e){}}
  /* 跳過 niche/bagua（多半在第三章）→ 標記前面的 hint-gate 商城已通關，避免回去卡住 */
  if(target==='niche'||target==='bagua'||target==='puzzle'||target==='sortbins'||target==='sortbins2'||target==='brickmold'){
    _hintPurchased=true;try{localStorage.setItem(HINT_FLAG_KEY,'1');}catch(e){}
  }
  setTimeout(function(){launchStage(target);devUpdateStatus();},20);
}
function devResetHint(){
  try{localStorage.removeItem(HINT_FLAG_KEY);}catch(e){}
  _hintPurchased=false;
  showInfoModal('提示商城已重置','下一次進入鎖住頁，10 秒後燈泡會再出現。');
}
/* ══ 通用框框：取代瀏覽器 alert，統一視覺風格 ══ */
function showInfoModal(title,body){
  document.getElementById('im-title').textContent=String(title||'');
  document.getElementById('im-body').textContent=String(body||'');
  document.getElementById('info-modal').classList.add('on');
}
function closeInfoModal(){
  document.getElementById('info-modal').classList.remove('on');
}
/* 點背景關閉 + Esc 關閉 */
(function(){
  var m=document.getElementById('info-modal');
  if(m){
    m.addEventListener('click',function(ev){if(ev.target===m)closeInfoModal();});
  }
  document.addEventListener('keydown',function(ev){
    if(ev.key==='Escape'&&document.getElementById('info-modal').classList.contains('on'))closeInfoModal();
  });
})();
function devReset(){
  if(!confirm('清空遊戲狀態並重新載入？\n（只清 localStorage，圖片音訊保留；要重灌素材請按「重新匯入素材」）'))return;
  try{
    localStorage.removeItem(LS_KEY);
    localStorage.removeItem(HINT_FLAG_KEY);
  }catch(e){}
  /* 不再刪 IDB，保留所有已匯入的圖片／音訊資產 */
  location.reload();
  return;
  /* 以下保留為 dead code，避免改動下方的 try-catch 結構 */
  try{
    var req=indexedDB.deleteDatabase(IDB_NAME);
    req.onsuccess=req.onerror=req.onblocked=function(){location.reload();};
    /* 萬一一直沒回應，2 秒後強制重整 */
    setTimeout(function(){location.reload();},2000);
  }catch(e){location.reload();}
}
function devReimportAssets(){
  if(!confirm('清掉 IndexedDB 圖片／音訊快取，重新從 assets/ 資料夾匯入？\n（劇情資料不受影響）'))return;
  try{
    var req=indexedDB.deleteDatabase(IDB_NAME);
    req.onsuccess=req.onerror=req.onblocked=function(){location.reload();};
    setTimeout(function(){location.reload();},2000);
  }catch(e){location.reload();}
}

function init(){
  loadGameData();
  applyAppear();
  _applyDevVisibility();

  console.log('[init] starting; t=0');
  var t0=Date.now();
  /* 雙保險：不論 bootstrap 結果，最多 6 秒一定要進遊戲，避免卡在「載入中…」 */
  var _safetyTimer=setTimeout(function(){
    if(_gameStarted)return;
    console.warn('[init] safety timeout fired ('+(Date.now()-t0)+'ms): force start');
    runFx('rainOn');setSceneDirect('phonebooth');
    loadAllAudio(function(){});
    applyImageAssets(function(){}); /* fallback 會直接走 assets/ 路徑 */
    _startGame();
  },6000);

  /* 先嘗試從 assets/ 自動匯入資源（不阻塞畫面） */
  bootstrapAssets(function(){
    console.log('[init] bootstrap done at '+(Date.now()-t0)+'ms');
    runFx('rainOn');
    setSceneDirect('phonebooth');

    /* 音訊在背景非同步載入，不阻塞遊戲啟動 */
    loadAllAudio(function(){
      if(_audioUnlocked&&_audioEls['music']&&_musicPending){
        _musicPending=false;_doPlay('music',true);
      }
    });

    /* 圖片載入完即啟動，最多等 2.5 秒 */
    var _imgTimer=setTimeout(function(){clearTimeout(_safetyTimer);_startGame();},2500);
    applyImageAssets(function(){
      clearTimeout(_imgTimer);clearTimeout(_safetyTimer);_startGame();
    });
  });
}
init();
</script>
