/* 每次 migrateGameData 都跑的修復器（idempotent）：
   - ch2 在 bagua 後補 slider1 item
   - ch3 在 puzzle 後補 slider2 item
   - ch4 確保有 sortbins 和 sortbins2 stage
   - ch5 確保有 brickmold stage（在 slider5 item 前）
   - 章節 sub 欄位若是我之前自取的「俗名」一律清掉，留給使用者在後台填 */
function _normalizeSliderItems(){
  var changed=false;
  /* ch2 → slider1（強制放在章末，且只能有一個） */
  if(Array.isArray(G.ch2)){
    var beforeC2=JSON.stringify(G.ch2);
    /* 移除所有 slider1 */
    for(var ic2=G.ch2.length-1;ic2>=0;ic2--){
      if(G.ch2[ic2]&&G.ch2[ic2].t==='item'&&G.ch2[ic2].id==='slider1')G.ch2.splice(ic2,1);
    }
    /* push 到章末 */
    G.ch2.push({t:'item',id:'slider1',name:'滑塊・一',icon:'🪨',asset:'slider1'});
    if(JSON.stringify(G.ch2)!==beforeC2)changed=true;
  }
  /* ch3 → slider2（強制放在章末） */
  if(Array.isArray(G.ch3)){
    var beforeC3=JSON.stringify(G.ch3);
    for(var ic3=G.ch3.length-1;ic3>=0;ic3--){
      if(G.ch3[ic3]&&G.ch3[ic3].t==='item'&&G.ch3[ic3].id==='slider2')G.ch3.splice(ic3,1);
    }
    G.ch3.push({t:'item',id:'slider2',name:'滑塊・二',icon:'🪨',asset:'slider2'});
    if(JSON.stringify(G.ch3)!==beforeC3)changed=true;
  }
  /* ch4 → sortbins + sortbins2（每個必須在對應的 slider 之前） */
  if(Array.isArray(G.ch4)){
    var hasSB1=G.ch4.some(function(ev){return ev&&ev.t==='stage'&&ev.id==='sortbins';});
    if(!hasSB1){
      var idxS3=G.ch4.findIndex(function(ev){return ev&&ev.t==='item'&&ev.id==='slider3';});
      G.ch4.splice(idxS3>=0?idxS3:G.ch4.length,0,{t:'stage',id:'sortbins'});
      changed=true;
    }
    var hasSB2=G.ch4.some(function(ev){return ev&&ev.t==='stage'&&ev.id==='sortbins2';});
    if(!hasSB2){
      var idxS4=G.ch4.findIndex(function(ev){return ev&&ev.t==='item'&&ev.id==='slider4';});
      G.ch4.splice(idxS4>=0?idxS4:G.ch4.length,0,{t:'stage',id:'sortbins2'});
      changed=true;
    }
  }
  /* ch5 → brickmold（必須在 slider5 之前） */
  if(Array.isArray(G.ch5)){
    var hasBM=G.ch5.some(function(ev){return ev&&ev.t==='stage'&&ev.id==='brickmold';});
    var hasS5=G.ch5.some(function(ev){return ev&&ev.t==='item'&&ev.id==='slider5';});
    if(!hasBM){
      if(hasS5){
        var idxS5=G.ch5.findIndex(function(ev){return ev&&ev.t==='item'&&ev.id==='slider5';});
        G.ch5.splice(idxS5,0,{t:'stage',id:'brickmold'});
        changed=true;
      }else{
        /* 連 slider5 都沒有 → 整個重建 ch5 為最簡 brickmold 流程（章節名留空給使用者填） */
        G.ch5=[
          {t:'chapter',jp:'第五章',main:'執念之四',sub:''},
          {t:'narr',text:'（這裡寫進入第四個執念場景的旁白）'},
          {t:'stage',id:'brickmold'},
          {t:'narr',text:'（這裡寫解開後的過渡旁白）'},
          {t:'item',id:'slider5',name:'滑塊・五',icon:'🪨',asset:'slider5'}
        ];
        changed=true;
      }
    }
  }
  /* ch6 → 夢境探索完成 → 同時拿到 slider6/7/8 + 1908 字條 */
  if(Array.isArray(G.ch6)){
    var hasDW6=G.ch6.some(function(ev){return ev&&ev.t==='stage'&&ev.id==='dreamwalk';});
    var has1908=G.ch6.some(function(ev){return ev&&ev.t==='blackout'&&ev.text==='1908';});
    if(!hasDW6||!has1908){
      G.ch6=[
        {t:'chapter',jp:'第六章',main:'執念之五',sub:''},
        {t:'narr',text:'印花的紋路還留在指尖。\n語嫣抬起頭，看見眼前的車站慢慢失去了輪廓。'},
        {t:'narr',text:'紅磚的牆、洗石子的飾帶、黑瓦的屋簷——\n一塊一塊被光暈柔化，像是泡在水裡的舊照片。'},
        {t:'narr',text:'她感到雙腳離地。\n或者該說，地板鬆軟得像棉花，把她整個托起來。'},
        {t:'line',who:'語嫣',text:'這是……夢？'},
        {t:'narr',text:'四面八方響起腳步聲、報票聲、汽笛聲，\n但所有聲音都像隔著一層水。'},
        {t:'narr',text:'她閉上眼。\n再睜開時——眼前一片漆黑。'},
        {t:'blackout',text:'夢境之中',duration:2000},
        {t:'stage',id:'dreamwalk'},
        {t:'narr',text:'走過所有的空間，所有的記憶都被翻動一遍。\n夢境的邊緣開始消散。'},
        {t:'narr',text:'她回過神，掌心一連落下三塊滑塊——\n同時溫熱，像三枚剛從爐火裡撿出來的銅錢。'},
        {t:'item',id:'slider6',name:'滑塊・六',icon:'🪨',asset:'slider6'},
        {t:'item',id:'slider7',name:'滑塊・七',icon:'🪨',asset:'slider7'},
        {t:'item',id:'slider8',name:'滑塊・八',icon:'🪨',asset:'slider8'},
        {t:'narr',text:'掌心攤開——\n三塊滑塊之間，飄落一張小小的字條。'},
        {t:'blackout',text:'1908',duration:3200},
        {t:'narr',text:'她念出來：「一九〇八」。'},
        {t:'line',who:'語嫣',text:'⋯⋯這是密碼。'}
      ];
      changed=true;
    }
  }
  /* ch7：終局關卡鏈 — phylock（密碼）→ klotski（華容道）→ 旁白 → photo（拍照辨識） */
  if(Array.isArray(G.ch7)){
    var hasPLk=G.ch7.some(function(ev){return ev&&ev.t==='stage'&&ev.id==='phylock';});
    var hasKL=G.ch7.some(function(ev){return ev&&ev.t==='stage'&&ev.id==='klotski';});
    if(!hasPLk||!hasKL){
      G.ch7=[
        {t:'chapter',jp:'第七章',main:'最後一道機關',sub:''},
        {t:'narr',text:'語嫣低頭看著掌心的字條。\n月台底下傳來一聲低沉的響——像是有什麼從地底打開了。'},
        {t:'narr',text:'她跟著聲音走，在一根銅柱旁邊找到一個黑色金屬盒。\n盒蓋上刻著一個鑰匙孔，旁邊四個小小的方格。'},
        {t:'line',who:'語嫣',text:'⋯⋯輸入密碼。'},
        {t:'stage',id:'phylock'},
        {t:'narr',text:'喀的一聲，盒蓋鬆開。\n裡面是一塊黑色的木板，板上嵌著八塊雕花磚——但全部錯位了。'},
        {t:'line',who:'語嫣',text:'⋯⋯華容道？'},
        {t:'stage',id:'klotski'},
        {t:'narr',text:'她按下「我已經完成了」。\n但盒子並沒有打開。'},
        {t:'line',who:'語嫣',text:'⋯⋯怎麼沒動靜？'},
        {t:'narr',text:'她盯著盒子，盯著八塊磚，盯著自己的手。'},

function _normalizeDream(){

  var oldIds=['ticket','reticket','wait1','wait2','wait3'];
  var hasOld=oldIds.some(function(o){return ids.indexOf(o)>=0;});
  var hasLobby=ids.indexOf('lobby')>=0;
  var hasP1=ids.indexOf('platform1')>=0;
  var hasP2=ids.indexOf('platform2')>=0;
  if(hasOld||!hasLobby||!hasP1||!hasP2){
    G.dream=JSON.parse(JSON.stringify(_DEFAULT_DREAM));
    return true;

  /* 若某區沒有 slips 欄位 → 補預設 */
  var changed=false;

    if(!Array.isArray(z.slips)||z.slips.length===0){
      var def=_DEFAULT_DREAM.zones.find(function(d){return d.id===z.id;});
      if(def){z.slips=JSON.parse(JSON.stringify(def.slips));changed=true;}
    }

/* ══ Audio System（HTML5 <audio>，無 AudioContext，無 PCM 記憶體問題）══ */
var _audioEls={};        // key → HTMLAudioElement
var _audioBlobURLs={};   // key → Object URL（供清除用）
var _audioUnlocked=false;// 使用者已互動過
var _musicPending=false; // 音樂在解鎖前就被要求播放
var _pendingAudio={};    // key→{loop:bool} 所有解鎖前要求播放的音訊

function loadAllAudio(cb){
  /* music = 預設背景樂（循環）；ring = 電話鈴聲；其餘自訂音效由事件觸發（不循環為主） */
  var keys=['music','ring'];
  if(G.customAudio)G.customAudio.forEach(function(a){if(a.key)keys.push(a.key);});
  var n=keys.length,done=0;
  if(!n){if(cb)cb();return;}
  /* 固定 key 才能用 disk fallback，自訂 key 沒檔不要硬建空元素（會 404 害 play 失敗） */
  var FIXED_AUDIO_KEYS={music:1,ring:1};
  function makeAudio(key,src){
    if(_audioEls[key])try{_audioEls[key].pause();}catch(e){}
    var el=document.createElement('audio');
    el.preload='none';
    el.src=src;
    _audioEls[key]=el;
    if(key==='music'){
      _musicPending=true;
      _pendingAudio['music']={loop:true};
      if(_audioUnlocked){_musicPending=false;delete _pendingAudio['music'];_doPlay('music',true);}
    }
  }
  keys.forEach(function(key){
    loadAsset(key,function(blob){
      if(blob){
        if(_audioBlobURLs[key])URL.revokeObjectURL(_audioBlobURLs[key]);
        var url=URL.createObjectURL(blob);
        _audioBlobURLs[key]=url;
        makeAudio(key,url);
      }else if(FIXED_AUDIO_KEYS[key]){
        /* 只在固定 key（music/ring）IDB 沒有時用 disk fallback */
        makeAudio(key,'assets/audio/'+key+'.mp3');
      }
      /* 自訂 key 沒檔 → 不建元素；事件觸發時 playAudio 會早退（_audioEls[key] 不存在） */
      if(++done===n&&cb)cb();
    });
  });
}
/* 任何音訊播放時，最多只播 10 分鐘；循環音訊到 10 分鐘自動回到 0 重播；
   非循環到 10 分鐘自動停止。檔案本身不會被改，純粹是播放邏輯。 */
var AUDIO_MAX_SEC=600; // 10 分鐘
function _doPlay(key,loop){
  var el=_audioEls[key];if(!el)return;
  el.loop=!!loop;
  try{el.currentTime=0;}catch(e){}
  /* 只掛一次 timeupdate cap 監聽器 */
  if(!el._capBound){
    el._capBound=true;
    el.addEventListener('timeupdate',function(){
      if(el.currentTime>=AUDIO_MAX_SEC){
        if(el.loop){try{el.currentTime=0;}catch(e){}}
        else{
          el.pause();try{el.currentTime=0;}catch(e){}
          /* 觸發 ended：non-loop 撞 10 分鐘上限時也讓 storm/office 的 ended 邏輯接回 ambient */
          el.dispatchEvent(new Event('ended'));
        }
      }
    });
  }
  var p=el.play();
  if(p&&p.catch)p.catch(function(e){console.warn('play blocked:',key,e);});
}
function _unlockAudio(){
  if(_audioUnlocked)return;
  _audioUnlocked=true;
  /* 播放所有在解鎖前就排隊的音訊（音樂、雨聲、自訂…） */
  var pending=_pendingAudio;_pendingAudio={};_musicPending=false;
  Object.keys(pending).forEach(function(k){if(_audioEls[k])_doPlay(k,pending[k].loop);});
}
function playAudio(key,loop){
  if(!_audioUnlocked){
    _pendingAudio[key]={loop:!!loop};
    if(key==='music')_musicPending=true;
    return;
  }
  if(!_audioEls[key]){console.warn('playAudio: key not loaded:',key);return;}
  _doPlay(key,!!loop);
}
function stopAudio(key){
  delete _pendingAudio[key];
  if(key==='music')_musicPending=false;
  var el=_audioEls[key];if(!el)return;
  el.pause();try{el.currentTime=0;}catch(e){}
}
function stopAllAudio(){
  _pendingAudio={};_musicPending=false;
  Object.keys(_audioEls).forEach(function(k){
    var el=_audioEls[k];if(!el)return;
    el.pause();try{el.currentTime=0;}catch(e){}
  });
}
function startMusic(){
  if(!_audioEls['music']){_musicPending=true;_pendingAudio['music']={loop:true};return;}
  if(!_audioUnlocked){_musicPending=true;_pendingAudio['music']={loop:true};return;}
  _doPlay('music',true);
}
function playRing(){if(_audioUnlocked&&_audioEls['ring'])_doPlay('ring',true);}
function stopRing(){stopAudio('ring');}

/* ══ Sprites ══ */
var _sprites={};
function getSpriteLayout(id){
  return (G.spriteLayout&&G.spriteLayout[id])||{x:50,yBottom:0,w:35};
}
function applyLayout(el,id){
  var l=getSpriteLayout(id);
  el.style.left=l.x+'%';
  el.style.bottom=(l.yBottom||0)+'%';
  el.style.width=(l.w||35)+'%';
  el.style.transform='none';
}
function spriteFallbackPath(id){
  /* 立繪 / 道具圖：找不到 IDB 的話試 png 再試 jpg（兩種常用副檔名） */
  return ['png','jpg','jpeg','webp'].map(function(ext){return 'assets/images/'+id+'.'+ext;});
}
function showSprite(id){
  if(_sprites[id]){
    _sprites[id].style.opacity='1';
    applyLayout(_sprites[id],id);
    return;
  }
  assetURL(id,function(url){
    var fallbacks=url?[url]:spriteFallbackPath(id);
    var d=document.createElement('div');
    d.className='sprite';d.id='spr-'+id;d.style.opacity='0';
    applyLayout(d,id);
    var img=document.createElement('img');
    /* 一個一個試，找到就用 */
    var idx=0;
    img.onerror=function(){idx++;if(idx<fallbacks.length){img.src=fallbacks[idx];}};
    img.src=fallbacks[0];
    img.onload=function(){d.style.opacity='1';};
    d.appendChild(img);
    document.getElementById('sprites').appendChild(d);
    _sprites[id]=d;
  });
}
function hideSprite(id){if(_sprites[id])_sprites[id].style.opacity='0';}

/* ══ Script Engine ══ */
var SCRIPT=[],_ptr=0,_waiting=false,_dlgTime=0;

function buildScript(){
  SCRIPT=[];
  ['ch1','ch2','ch3','ch4','ch5','ch6','ch7','ch8','ch9','ch10','ch11'].forEach(function(k){
    if(G[k]&&G[k].length)SCRIPT=SCRIPT.concat(G[k]);
  });
  for(var k in G.extraChapters){
    if(G.extraChapters.hasOwnProperty(k))SCRIPT=SCRIPT.concat(G.extraChapters[k]);
  }
}

function run(){
  if(_ptr>=SCRIPT.length){
    showDialog('','……（故事進行中，敬請期待）',true);
    if(typeof devUpdateStatus==='function')devUpdateStatus();
    return;
  }
  var ev=SCRIPT[_ptr++];
  if(typeof devUpdateStatus==='function')devUpdateStatus();
  processEv(ev);
}

function processEv(ev){
  var t=ev.t;
  if(t==='narr'){
    showDialog('',ev.text||'',true);
  }else if(t==='line'){
    showDialog(ev.who||'',ev.text||'',false);
  }else if(t==='chapter'){
    hideDialog();showChCard(ev.jp,ev.main,ev.sub);
  }else if(t==='show'){
    showSprite(ev.id);run();
  }else if(t==='hide'){
    hideSprite(ev.id);run();
  }else if(t==='bg'){
    hideDialog();setScene(ev.scene,function(){run();});
  }else if(t==='fx'){
    runFx(ev.fn);run();
  }else if(t==='blackout'){
    hideDialog();doBlackout(ev.text,ev.duration||2500,function(){run();});
  }else if(t==='end'){
    /* 故事結束：黑屏 + 「The End」字樣，永久停留 */
    hideDialog();
    var bo=document.getElementById('blackout');
    var bt=document.getElementById('blackout-text');
    bo.classList.add('on','theend');
    bt.textContent=ev.text||'The End';
    bt.classList.add('on');
    /* 不呼叫 run() — 故意停在這裡 */
  }else if(t==='audio'){
    handleAudioEv(ev);run();
  }else if(t==='item'){
    /* 滑塊：先在中央現身 → 點擊進入黑屏回憶 → 結束後入道具欄 + 接續 */
    if(ev.id&&/^slider\d+$/.test(ev.id)){
      triggerSliderReveal(ev,function(){run();});
    }else{
      addInventory(ev.id,ev.name,ev.icon,ev.asset);run();
    }
  }else if(t==='image'){
    hideDialog();showImageEv(ev.asset||ev.id,ev.duration||3000,ev.fade||300,function(){run();});
  }else if(t==='wait'){
    setTimeout(run,ev.ms||1000);
  }else if(t==='stage'){
    hideDialog();launchStage(ev.id);
  }else{
    run();
  }
}

/* ══ 滑塊揭示 + 黑屏回憶 ══ */
var _memState={active:false,events:[],idx:0,onDone:null};
function triggerSliderReveal(itemEv,onDone){
  var memData=(G.memories&&G.memories[itemEv.id])||{};
  var imgKey=memData.imageKey||('mem-'+itemEv.id);
  var sr=document.getElementById('slider-reveal');
  var iconEl=document.getElementById('sr-tile-icon');
  var nameEl=document.getElementById('sr-tile-name');
  /* 試著用自訂圖；找不到就用 emoji */
  iconEl.innerHTML=itemEv.icon||'🪨';
  if(typeof assetURLOrPath==='function'){
    assetURLOrPath(imgKey,'',function(url){
      if(url)iconEl.innerHTML='<img src="'+url+'" alt="">';
    });
  }
  nameEl.textContent=itemEv.name||itemEv.id;
  sr.classList.add('on');
  hideDialog();
  var clicked=false;
  sr.onclick=function(){
    if(clicked)return;clicked=true;
    sr.classList.remove('on');
    sr.onclick=null;
    /* 進入回憶：保留底層場景＋立繪，只蓋一層灰色半透明蒙板 */
    var memBg=document.getElementById('memory-bg');
    /* 自動把 語嫣 + 雁淇 兩個立繪叫出來（回憶內必呈現） */
    try{
      if(typeof showSprite==='function'){
        showSprite('sp-yuyan-1908');
        showSprite('sp-yanqi');
      }
    }catch(e){}
    memBg.classList.add('on');
    setTimeout(function(){
      _memState.events=Array.isArray(memData.events)&&memData.events.length
        ?memData.events.slice()
        :[{t:'narr',text:'（回憶尚未撰寫；後台「回憶」頁可填入這塊滑塊的回憶劇情。）'}];
      _memState.idx=0;
      _memState.active=true;
      _memState.onDone=function(){
        /* 結束時畫面閃爍，再淡出灰蒙板 */
        memBg.classList.add('flicker');
        setTimeout(function(){
          memBg.classList.remove('flicker','on');
          /* 收起雁淇立繪（語嫣留著繼續主劇情） */
          try{if(typeof hideSprite==='function')hideSprite('sp-yanqi');}catch(e){}
          addInventory(itemEv.id,itemEv.name,itemEv.icon,itemEv.asset);
          if(onDone)onDone();
        },1200);
      };
      memoryAdvance();
    },650);
  };
}
function memoryAdvance(){
  if(!_memState.active)return;
  if(_memState.idx>=_memState.events.length){
    _memState.active=false;
    hideDialog();
    var done=_memState.onDone;_memState.onDone=null;
    if(done)done();
    return;
  }
  var ev=_memState.events[_memState.idx++];
  if(!ev){memoryAdvance();return;}
  if(ev.t==='narr'){showDialog('',ev.text||'',true);}
  else if(ev.t==='line'){showDialog(ev.who||'',ev.text||'',false);}
  else if(ev.t==='show'){
    try{if(typeof showSprite==='function'&&ev.id)showSprite(ev.id);}catch(e){}
    memoryAdvance();
  }
  else if(ev.t==='hide'){
    try{if(typeof hideSprite==='function'&&ev.id)hideSprite(ev.id);}catch(e){}
    memoryAdvance();
  }
  else if(ev.t==='wait'){
    setTimeout(memoryAdvance,ev.ms||800);
  }
  else{memoryAdvance();}
}

/* ── Blackout ── */
function doBlackout(text,dur,cb){
  var bo=document.getElementById('blackout'),bt=document.getElementById('blackout-text');
  bo.classList.remove('theend');  /* 一般 blackout 不是 The End */
  bt.textContent=text||'';
  bo.classList.add('on');
  setTimeout(function(){bt.classList.add('on');},500);
  setTimeout(function(){bt.classList.remove('on');},dur-600);
  setTimeout(function(){bo.classList.remove('on');if(cb)cb();},dur);
}

function handleAudioEv(ev){
  if(ev.action==='play')       playAudio(ev.key,ev.loop===true||ev.loop==='true');
  else if(ev.action==='stop')  stopAudio(ev.key);
  else if(ev.action==='stopAll') stopAllAudio();
}

function getSortbinsHelp(){
  var d=G.sortbins||_DEFAULT_SORTBINS;
  return d.help||_DEFAULT_SORTBINS.help;
}

function stageSortbins(){
  var data=G.sortbins||_DEFAULT_SORTBINS;
  /* 兼容舊資料：若還是舊格式（slips 沒對應 schedule），就現場合成一份 schedule */
  var schedule=Array.isArray(data.schedule)&&data.schedule.length
    ?data.schedule
    :(Array.isArray(data.slips)?data.slips.map(function(s,i){
        return {no:String(i+1),line:s.binId,via:s.text};
      }):[]);
  if(!data.bins||!data.bins.length||!schedule.length){
    run();return;
  }
  sbinsState.active=true;
  sbinsState.errors=0;
  sbinsState.maxErrors=Number(data.maxErrors)||2;
  /* 由 schedule 衍生紙條（每個 schedule 一張班次紙條） */
  sbinsState.slips=schedule.map(function(s,i){
    return {idx:i,text:String(s.no)+' 次',binId:s.line,placed:null};
  });
  /* 洗牌 */
  for(var i=sbinsState.slips.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=sbinsState.slips[i];sbinsState.slips[i]=sbinsState.slips[j];sbinsState.slips[j]=t;
  }
  document.getElementById('sb-title').textContent=data.title||_DEFAULT_SORTBINS.title;
  /* 渲染時刻表參考 */
  var refEl=document.getElementById('sb-schedule');
  if(refEl){
    var html='<div class="sb-sched-head">明治四十一年 列車時刻表（節錄）</div>';
    html+='<div class="sb-sched-body">';
    /* 不依 line 排序，按原順序顯示，避免直接洩底 */
    schedule.forEach(function(s){
      html+='<div class="sb-sched-row">'
        +'<span class="sb-sched-no">'+esc(String(s.no))+' 次</span>'
        +'<span class="sb-sched-via">'+esc(String(s.via||''))+'</span>'
        +'</div>';
    });
    html+='</div>';
    refEl.innerHTML=html;
  }
  /* 渲染 bins */
  var binsEl=document.getElementById('sb-bins');binsEl.innerHTML='';
  data.bins.forEach(function(b){
    var div=document.createElement('div');
    div.className='sb-bin';
    div.dataset.binId=b.id;
    div.innerHTML='<div class="sb-bin-label">'+esc(b.label)+'</div>'
      +'<div class="sb-bin-slot" id="sb-slot-'+b.id+'"></div>';
    binsEl.appendChild(div);
  });
  /* 渲染 slips 到 pool */
  var poolEl=document.getElementById('sb-pool');poolEl.innerHTML='';
  sbinsState.slips.forEach(function(s){
    var el=document.createElement('div');
    el.className='sb-slip';
    el.dataset.idx=s.idx;
    el.textContent=s.text;
    _attachSlipDrag(el);
    poolEl.appendChild(el);
  });
  refreshSortbinsProgress();
  refreshSortbinsErrors();
  document.getElementById('stage-sortbins').classList.add('on');
  document.getElementById('inv-bar').style.display='none';
  hideDialog();
}
function _sbinsGetPos(ev){
  if(ev.touches&&ev.touches.length)return {x:ev.touches[0].clientX,y:ev.touches[0].clientY};
  return {x:ev.clientX,y:ev.clientY};
}
function _attachSlipDrag(el){
  var start=function(ev){
    if(!sbinsState.active)return;
    if(el.classList.contains('placed'))return;
    ev.preventDefault();
    var pos=_sbinsGetPos(ev);
    _sbinsStartDrag(el,pos.x,pos.y);
  };
  el.addEventListener('mousedown',start);
  el.addEventListener('touchstart',start,{passive:false});
}
function _sbinsStartDrag(el,x,y){
  var rect=el.getBoundingClientRect();
  sbinsState.dragEl=el;
  sbinsState.dragOffX=x-rect.left;
  sbinsState.dragOffY=y-rect.top;
  /* 把寬高鎖定再 detach 到 body 自由移動 */
  el.style.width=rect.width+'px';
  el.style.height=rect.height+'px';
  el.classList.add('flying');
  el.style.left=rect.left+'px';
  el.style.top=rect.top+'px';
  document.body.appendChild(el);
}
function _sbinsMoveDrag(x,y){
  var el=sbinsState.dragEl;if(!el)return;
  el.style.left=(x-sbinsState.dragOffX)+'px';
  el.style.top=(y-sbinsState.dragOffY)+'px';
  var bin=_sbinsFindBinAt(x,y);
  document.querySelectorAll('#stage-sortbins .sb-bin').forEach(function(b){b.classList.remove('over');});
  if(bin)bin.classList.add('over');
}
function _sbinsEndDrag(x,y){
  var el=sbinsState.dragEl;if(!el)return;
  document.querySelectorAll('#stage-sortbins .sb-bin').forEach(function(b){b.classList.remove('over');});
  el.classList.remove('flying');
  el.style.left='';el.style.top='';el.style.width='';el.style.height='';
  var bin=_sbinsFindBinAt(x,y);
  var idx=parseInt(el.dataset.idx,10);
  var slip=sbinsState.slips.find(function(s){return s.idx===idx;});
  if(bin&&slip){
    var binId=bin.dataset.binId;
    if(binId===slip.binId){
      slip.placed=binId;
      el.classList.add('placed');
      document.getElementById('sb-slot-'+binId).appendChild(el);
      refreshSortbinsProgress();
      if(_sbinsAllPlaced())sortbinsWin();
    }else{
      /* 放錯：紅閃 → 退回 pool + 錯誤計數 +1 */
      el.classList.add('wrong-flash');
      setTimeout(function(){el.classList.remove('wrong-flash');},420);
      document.getElementById('sb-pool').appendChild(el);
      sbinsState.errors++;
      refreshSortbinsErrors();
      if(sbinsState.errors>=sbinsState.maxErrors){
        _sbinsReshuffleAll();
      }
    }
  }else{
    /* 沒在 bin 裡 → 退回 pool（不算錯） */
    document.getElementById('sb-pool').appendChild(el);
  }
  sbinsState.dragEl=null;
}
function _sbinsFindBinAt(x,y){
  var bins=document.querySelectorAll('#stage-sortbins .sb-bin');
  for(var i=0;i<bins.length;i++){
    var r=bins[i].getBoundingClientRect();
    if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)return bins[i];
  }
  return null;
}
function _sbinsAllPlaced(){
  return sbinsState.slips.every(function(s){return s.placed!==null;});
}
function refreshSortbinsProgress(){
  var done=sbinsState.slips.filter(function(s){return s.placed!==null;}).length;
  var total=sbinsState.slips.length;
  var p=document.getElementById('sb-progress');
  if(p)p.textContent='已歸納 '+done+' ／ '+total;
}
function refreshSortbinsErrors(){
  var p=document.getElementById('sb-errors');
  if(!p)return;
  var max=sbinsState.maxErrors||2;
  p.textContent='錯誤 '+sbinsState.errors+' ／ '+max;
}
function _sbinsReshuffleAll(){
  /* 整關重置：所有 slip 回池子 + 重新洗牌 + 錯誤歸零 + 全螢幕震紅 */
  var flash=document.getElementById('sb-flash');
  if(flash){
    flash.classList.add('shake');
    setTimeout(function(){flash.classList.remove('shake');},700);
  }
  sbinsState.errors=0;
  /* 把所有 slip 標記回未放置 */
  sbinsState.slips.forEach(function(s){s.placed=null;});
  /* 重新洗牌 */
  for(var i=sbinsState.slips.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=sbinsState.slips[i];sbinsState.slips[i]=sbinsState.slips[j];sbinsState.slips[j]=t;
  }
  /* 清空 bin 內現有紙條 + pool，然後全部重畫到 pool */
  document.querySelectorAll('#stage-sortbins .sb-bin-slot').forEach(function(slot){slot.innerHTML='';});
  var poolEl=document.getElementById('sb-pool');poolEl.innerHTML='';
  sbinsState.slips.forEach(function(s){
    var el=document.createElement('div');
    el.className='sb-slip';
    el.dataset.idx=s.idx;
    el.textContent=s.text;
    _attachSlipDrag(el);
    poolEl.appendChild(el);
  });
  refreshSortbinsProgress();
  refreshSortbinsErrors();
}
function sortbinsWin(){
  sbinsState.active=false;
  var stage=document.getElementById('stage-sortbins');
  setTimeout(function(){
    var old=document.getElementById('sb-win-text');if(old)old.remove();
    var div=document.createElement('div');
    div.id='sb-win-text';div.textContent='歸納完成';
    stage.appendChild(div);
  },600);
  setTimeout(function(){stage.style.transition='opacity .8s';stage.style.opacity='0';},2200);
  setTimeout(function(){
    stage.classList.remove('on');
    stage.style.opacity='';stage.style.transition='';
    var w=document.getElementById('sb-win-text');if(w)w.remove();
    document.getElementById('inv-bar').style.display='';
    run();
  },3050);
}
/* document-level move/end 一次掛上即可（idempotent） */
if(!window._sbinsDocBound){
  window._sbinsDocBound=true;
  document.addEventListener('mousemove',function(ev){
    if(sbinsState.dragEl)_sbinsMoveDrag(ev.clientX,ev.clientY);
  });
  document.addEventListener('touchmove',function(ev){
    if(!sbinsState.dragEl)return;
    ev.preventDefault();
    if(ev.touches.length)_sbinsMoveDrag(ev.touches[0].clientX,ev.touches[0].clientY);
  },{passive:false});
  document.addEventListener('mouseup',function(ev){
    if(sbinsState.dragEl)_sbinsEndDrag(ev.clientX,ev.clientY);
  });
  document.addEventListener('touchend',function(ev){
    if(!sbinsState.dragEl)return;
    var t=ev.changedTouches&&ev.changedTouches[0];
    if(t)_sbinsEndDrag(t.clientX,t.clientY);
  });
}

/* ══ Sortbins2（歸納關 B：山線/海線 → 站名） ══
   - 兩張線別紙條（dock 中固定位）+ 滿地站名
   - 拖線到正確站 → 站消失（紙條彈回 dock）
   - 拖到錯站 → 該站紅閃 + error +1；紙條彈回 dock
   - 錯滿 maxErrors → 全螢幕震盪 + 站名重新打散位置 + 錯誤歸零
   - 全部站消失 → win → run() */
function getSortbins2Help(){
  var d=G.sortbins2||_DEFAULT_SORTBINS2;
  return d.help||_DEFAULT_SORTBINS2.help;
}
function stageSortbins2(){
  var data=G.sortbins2||_DEFAULT_SORTBINS2;
  if(!data.lines||!data.lines.length||!data.stations||!data.stations.length){
    run();return;
  }
  sbins2State.active=true;
  sbins2State.stations=data.stations.map(function(s,i){
    return {idx:i,name:s.name,line:s.line,removed:false};
  });
  sbins2State.errors=0;
  sbins2State.maxErrors=Number(data.maxErrors)||2;
  document.getElementById('sb2-title').textContent=data.title||_DEFAULT_SORTBINS2.title;
  /* 渲染 dock：每條線一張紙條 */
  var dock=document.getElementById('sb2-dock');dock.innerHTML='';
  data.lines.forEach(function(l){
    var slot=document.createElement('div');
    slot.className='sb2-line-slot';
    slot.dataset.lineId=l.id;
    slot.innerHTML='<div class="sb2-line-label">線別紙條</div>';
    var slip=document.createElement('div');
    slip.className='sb2-line-slip';
    slip.dataset.lineId=l.id;
    slip.textContent=l.label;
    _attachLineSlipDrag(slip);
    slot.appendChild(slip);
    dock.appendChild(slot);
  });
  /* 渲染站名（隨機散布在 board） */
  _sbins2RenderStations();
  refreshSortbins2Progress();
  refreshSortbins2Errors();
  document.getElementById('stage-sortbins2').classList.add('on');
  document.getElementById('inv-bar').style.display='none';
  hideDialog();
}
function _sbins2RenderStations(){
  var board=document.getElementById('sb2-board');board.innerHTML='';
  /* 等下一幀讓 board 有寬高再放 */
  setTimeout(function(){
    var rect=board.getBoundingClientRect();
    var W=rect.width,H=rect.height;
    var placed=[];
    sbins2State.stations.forEach(function(s){
      if(s.removed)return;
      var el=document.createElement('div');
      el.className='sb2-station';
      el.dataset.idx=s.idx;
      el.textContent=s.name;
      board.appendChild(el);
      /* 放隨機位置：嘗試避開已放的元素，最多 25 次 */
      var w=120,h=44;
      var x=0,y=0,ok=false;
      for(var t=0;t<25;t++){
        x=Math.random()*Math.max(10,W-w-10)+5;
        y=Math.random()*Math.max(10,H-h-10)+5;
        ok=true;
        for(var k=0;k<placed.length;k++){
          var p=placed[k];
          if(Math.abs(p.x-x)<w&&Math.abs(p.y-y)<h+6){ok=false;break;}
        }
        if(ok)break;
      }
      placed.push({x:x,y:y});
      el.style.left=x+'px';
      el.style.top=y+'px';
    });
  },20);
}
function _attachLineSlipDrag(el){
  var start=function(ev){
    if(!sbins2State.active)return;
    ev.preventDefault();
    var pos=_sbinsGetPos(ev);
    _sbins2StartDrag(el,pos.x,pos.y);
  };
  el.addEventListener('mousedown',start);
  el.addEventListener('touchstart',start,{passive:false});
}
function _sbins2StartDrag(el,x,y){
  var rect=el.getBoundingClientRect();
  /* 在原位放一個佔位，拖完彈回 */
  var placeholder=document.createElement('div');
  placeholder.style.width=rect.width+'px';
  placeholder.style.height=rect.height+'px';
  placeholder.dataset.lineHolder=el.dataset.lineId;
  el.parentNode.insertBefore(placeholder,el);
  el._placeholder=placeholder;
  sbins2State.dragEl=el;
  sbins2State.dragLineId=el.dataset.lineId;
  sbins2State.dragOffX=x-rect.left;
  sbins2State.dragOffY=y-rect.top;
  el.style.width=rect.width+'px';
  el.style.height=rect.height+'px';
  el.style.left=rect.left+'px';
  el.style.top=rect.top+'px';
  el.classList.add('flying');
  document.body.appendChild(el);
}
function _sbins2MoveDrag(x,y){
  var el=sbins2State.dragEl;if(!el)return;
  el.style.left=(x-sbins2State.dragOffX)+'px';
  el.style.top=(y-sbins2State.dragOffY)+'px';
  /* highlight 站名 */
  var hover=_sbins2FindStationAt(x,y);
  document.querySelectorAll('#sb2-board .sb2-station').forEach(function(s){
    s.classList.remove('over-mountain','over-coast');
  });
  if(hover){
    hover.classList.add(sbins2State.dragLineId==='mountain'?'over-mountain':'over-coast');
  }
}
function _sbins2EndDrag(x,y){
  var el=sbins2State.dragEl;if(!el)return;
  document.querySelectorAll('#sb2-board .sb2-station').forEach(function(s){
    s.classList.remove('over-mountain','over-coast');
  });
  var hover=_sbins2FindStationAt(x,y);
  var lineId=sbins2State.dragLineId;
  /* 把 slip 還回 dock 原位 */
  el.classList.remove('flying');
  el.style.left='';el.style.top='';el.style.width='';el.style.height='';
  if(el._placeholder&&el._placeholder.parentNode){
    el._placeholder.parentNode.replaceChild(el,el._placeholder);
    el._placeholder=null;
  }
  sbins2State.dragEl=null;
  sbins2State.dragLineId='';
  if(!hover)return;
  var idx=parseInt(hover.dataset.idx,10);
  var st=sbins2State.stations.find(function(s){return s.idx===idx;});
  if(!st||st.removed)return;
  if(st.line===lineId){
    /* 正確：站名消失 */
    st.removed=true;
    hover.classList.add('correct');
    setTimeout(function(){if(hover.parentNode)hover.parentNode.removeChild(hover);},420);
    refreshSortbins2Progress();
    if(_sbins2AllRemoved())sortbins2Win();
  }else{
    /* 錯誤：站名紅閃 + 計數 +1 */
    sbins2State.errors++;
    hover.classList.add('wrong-flash');
    setTimeout(function(){hover.classList.remove('wrong-flash');},460);
    refreshSortbins2Errors();
    if(sbins2State.errors>=sbins2State.maxErrors){
      _sbins2Reshuffle();
    }
  }
}
function _sbins2FindStationAt(x,y){
  var stations=document.querySelectorAll('#sb2-board .sb2-station');
  for(var i=0;i<stations.length;i++){
    if(stations[i].classList.contains('correct'))continue;
    var r=stations[i].getBoundingClientRect();
    if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)return stations[i];
  }
  return null;
}
function _sbins2AllRemoved(){
  return sbins2State.stations.every(function(s){return s.removed;});
}
function _sbins2Reshuffle(){
  /* 整關重置：全螢幕震紅 + 所有站名（含已消失的）全部復原並重新打散 + 錯誤歸零 */
  var flash=document.getElementById('sb2-flash');
  if(flash){
    flash.classList.add('shake');
    setTimeout(function(){flash.classList.remove('shake');},700);
  }
  sbins2State.errors=0;
  sbins2State.stations.forEach(function(s){s.removed=false;});
  refreshSortbins2Errors();
  refreshSortbins2Progress();
  setTimeout(function(){_sbins2RenderStations();},500);
}
function refreshSortbins2Progress(){
  var done=sbins2State.stations.filter(function(s){return s.removed;}).length;
  var total=sbins2State.stations.length;
  var p=document.getElementById('sb2-progress');
  if(p)p.textContent='已分配 '+done+' ／ '+total;
}
function refreshSortbins2Errors(){
  var p=document.getElementById('sb2-errors');
  if(!p)return;
  var max=sbins2State.maxErrors||5;
  p.textContent='錯誤 '+sbins2State.errors+' ／ '+max;
}
function sortbins2Win(){
  sbins2State.active=false;
  var stage=document.getElementById('stage-sortbins2');
  setTimeout(function(){
    var old=document.getElementById('sb2-win-text');if(old)old.remove();
    var div=document.createElement('div');
    div.id='sb2-win-text';div.textContent='山海分明';
    stage.appendChild(div);
  },500);
  setTimeout(function(){stage.style.transition='opacity .8s';stage.style.opacity='0';},2100);
  setTimeout(function(){
    stage.classList.remove('on');
    stage.style.opacity='';stage.style.transition='';
    var w=document.getElementById('sb2-win-text');if(w)w.remove();
    document.getElementById('inv-bar').style.display='';
    run();
  },2950);
}
/* document-level move/end 給 sortbins2 用 */
if(!window._sbins2DocBound){

  document.addEventListener('mousemove',function(ev){
    if(sbins2State.dragEl)_sbins2MoveDrag(ev.clientX,ev.clientY);
  });
  document.addEventListener('touchmove',function(ev){

    ev.preventDefault();
    if(ev.touches.length)_sbins2MoveDrag(ev.touches[0].clientX,ev.touches[0].clientY);
  },{passive:false});
  document.addEventListener('mouseup',function(ev){

}

function _bmFindPattern(id){

/* 把多個 pattern svg 合成到同一個 viewBox，做出「融合浮雕」效果 */
function _bmStripSvgWrap(svg){
  var m=svg&&svg.match(/<svg[^>]*>([\s\S]*)<\/svg>/i);
  return m?m[1]:(svg||'');
}
function _bmComboSvg(ids){
  if(!ids||!ids.length)return '';
  if(ids.length===1){
    var p=_bmFindPattern(ids[0]);
    return p?p.svg:'';
  }
  var positions;
  if(ids.length===2)positions=[{x:-22,y:-8,s:0.62},{x:22,y:8,s:0.62}];
  else if(ids.length===3)positions=[{x:-23,y:-10,s:0.55},{x:23,y:-10,s:0.55},{x:0,y:18,s:0.55}];
  else if(ids.length===4)positions=[{x:-22,y:-18,s:0.5},{x:22,y:-18,s:0.5},{x:-22,y:18,s:0.5},{x:22,y:18,s:0.5}];
  else positions=ids.map(function(_,i){return {x:0,y:0,s:0.4};});
  var inner='';
  ids.forEach(function(id,i){
    var pp=_bmFindPattern(id);if(!pp)return;
    var content=_bmStripSvgWrap(pp.svg);
    var pos=positions[i]||positions[0];
    inner+='<g transform="translate('+pos.x+' '+pos.y+') scale('+pos.s+')">'+content+'</g>';
  });
  return '<svg viewBox="-50 -50 100 100" xmlns="http://www.w3.org/2000/svg">'+inner+'</svg>';
}
function _bmCombosMatch(a,b){
  if(!a||!b||a.length!==b.length)return false;
  var sa=a.slice().sort(),sb=b.slice().sort();
  for(var i=0;i<sa.length;i++)if(sa[i]!==sb[i])return false;
  return true;
}

function _bmRenderBenchZone(){
  var content=document.getElementById('bm-zc-bench-content');

        hintTxt='繼續木錘把它壓進去……或它差不多了';
      }else if(s.benchPress>0){
        progTxt='紋路 '+s.benchPressedIds.length+'／'+s.comboNeed+' · 敲 '+s.benchPress+'／'+s.pressNeed;
        hintTxt='繼續敲打';
      }else{
        progTxt='紋路 '+s.benchPressedIds.length+'／'+s.comboNeed+' · 已入模';
        hintTxt='拖木錘來敲打';
      }
    }else{
      if(s.benchPressedIds.length>=s.comboNeed){
        progTxt='紋路 '+s.benchPressedIds.length+'／'+s.comboNeed+' · 完成';
        hintTxt='拖刮板來脫模';
      }else{
        progTxt='紋路 '+s.benchPressedIds.length+'／'+s.comboNeed;
        hintTxt='再雕一個模具來壓';
      }
    }
  }else{
    hintTxt='印花區：先把黏土拖進來';
  }
  content.innerHTML=html;
  if(prog)prog.textContent=progTxt;
  if(hint)hint.textContent=hintTxt;
  if(s.benchTile){
    var tile=content.querySelector('.bm-bench-tile');
    if(tile)_bmAttachItemDrag(tile,'tile','');
  }
}
function _bmShowMsg(text,isError){
  var m=document.getElementById('bm-msg');if(!m)return;
  m.textContent=text;
  m.classList.toggle('err',!!isError);
  m.classList.add('show');
  clearTimeout(m._t);
  m._t=setTimeout(function(){m.classList.remove('show');},1400);
}
function _bmAttachToolDrag(el){
  var start=function(ev){
    if(!brickmoldState.active)return;
    if(el.classList.contains('consumed'))return;
    ev.preventDefault();
    var pos=_sbinsGetPos(ev);
    _bmStartDrag(el,el.dataset.kind||'',el.dataset.designId||'',pos.x,pos.y);
  };
  el.addEventListener('mousedown',start);
  el.addEventListener('touchstart',start,{passive:false});
}
function _bmAttachItemDrag(el,kind,id){
  var start=function(ev){
    if(!brickmoldState.active)return;
    ev.preventDefault();
    var pos=_sbinsGetPos(ev);
    _bmStartDrag(el,kind,id,pos.x,pos.y);
  };
  el.addEventListener('mousedown',start);
  el.addEventListener('touchstart',start,{passive:false});
}
function _bmStartDrag(el,kind,id,x,y){
  var rect=el.getBoundingClientRect();
  brickmoldState.dragEl=el;
  brickmoldState.dragKind=kind;
  brickmoldState.dragId=id;
  brickmoldState.dragOffX=x-rect.left;
  brickmoldState.dragOffY=y-rect.top;
  el.style.width=rect.width+'px';
  el.style.height=rect.height+'px';
  el.style.left=rect.left+'px';
  el.style.top=rect.top+'px';
  el.classList.add('flying');
  document.body.appendChild(el);
}
function _bmMoveDrag(x,y){
  var el=brickmoldState.dragEl;if(!el)return;
  el.style.left=(x-brickmoldState.dragOffX)+'px';
  el.style.top=(y-brickmoldState.dragOffY)+'px';
  ['bm-z-clay','bm-z-mold','bm-z-bench'].forEach(function(zid){
    var z=document.getElementById(zid);if(!z)return;
    var r=z.getBoundingClientRect();
    if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)z.classList.add('target');
    else z.classList.remove('target');
  });
  if(brickmoldState.dragKind==='tile'){
    var indent=document.getElementById('bm-indent');
    if(indent){
      var ir=indent.getBoundingClientRect();
      if(x>=ir.left&&x<=ir.right&&y>=ir.top&&y<=ir.bottom)indent.classList.add('hover');
      else indent.classList.remove('hover');
    }
  }
}
function _bmZoneAt(x,y){
  var ids=['bm-z-clay','bm-z-mold','bm-z-bench'];
  for(var i=0;i<ids.length;i++){
    var z=document.getElementById(ids[i]);if(!z)continue;
    var r=z.getBoundingClientRect();
    if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)return z.dataset.zone;
  }
  return '';
}
function _bmEndDrag(x,y){
  var el=brickmoldState.dragEl;if(!el)return;
  var kind=brickmoldState.dragKind;
  var id=brickmoldState.dragId;
  brickmoldState.dragEl=null;
  brickmoldState.dragKind='';
  brickmoldState.dragId='';
  el.classList.remove('flying');
  if(el.parentNode===document.body)el.parentNode.removeChild(el);
  ['bm-z-clay','bm-z-mold','bm-z-bench'].forEach(function(zid){
    var z=document.getElementById(zid);if(z)z.classList.remove('target');
  });
  var indent=document.getElementById('bm-indent');
  if(indent)indent.classList.remove('hover');
  if(kind==='tile'){
    if(indent){
      var ir=indent.getBoundingClientRect();
      if(x>=ir.left&&x<=ir.right&&y>=ir.top&&y<=ir.bottom){_bmTryFit();return;}
    }
    _bmRenderBenchZone();return;
  }
  var zone=_bmZoneAt(x,y);
  if(zone){_bmHandleDrop(kind,id,zone);}
  _bmRenderTray();
  if(kind==='clay')_bmRenderClayZone();
  if(kind==='mold')_bmRenderMoldZone();
}
function _bmHandleDrop(kind,id,zone){
  var s=brickmoldState;
  if(kind==='shovel'){
    if(zone==='clay'){
      if(s.clayDig>=s.digNeed){_bmShowMsg('已經挖夠了',true);return;}
      s.clayDig++;
      _bmShowMsg('挖土 '+s.clayDig+'／'+s.digNeed);
      _bmRenderClayZone();
      return;
    }
    _bmShowMsg('鏟子要挖在土堆上',true);return;
  }
  if(kind==='water'){
    if(zone==='clay'){
      if(s.clayDig<s.digNeed){_bmShowMsg('土還沒挖夠',true);return;}
      if(s.clayReady||s.clayHasWater){_bmShowMsg('已經和水了',true);return;}
      s.clayHasWater=true;
      _bmRenderClayZone();
      _bmDropAnim('bm-z-clay');
      _bmShowMsg('和水中……');
      setTimeout(function(){
        if(!brickmoldState.active)return;
        s.clayReady=true;
        _bmRenderClayZone();
        _bmShowMsg('黏土成形');
      },900);
      return;
    }
    _bmShowMsg('水……要倒到土上',true);return;
  }
  if(kind==='knife'){
    if(zone==='mold'){
      if(!s.moldDesignId){_bmShowMsg('還沒選設計圖呢',true);return;}
      if(s.moldReady){_bmShowMsg('模具已雕好',true);return;}
      s.moldCarve++;
      var w=document.querySelector('#bm-zc-mold-content .bm-wood');
      if(w){w.classList.remove('bm-shake-h');void w.offsetWidth;w.classList.add('bm-shake-h');}
      if(s.moldCarve>=s.carveNeed){
        s.moldReady=true;
        _bmShowMsg('模具刻好');
      }else{
        _bmShowMsg('刻 '+s.moldCarve+'／'+s.carveNeed);
      }
      _bmRenderMoldZone();
      return;
    }
    _bmShowMsg('雕刻刀要用在木板上',true);return;
  }
  if(kind==='design'){
    if(zone==='mold'){
      if(s.moldCarve>0||s.moldReady){_bmShowMsg('木板已經在刻了，沒法換圖',true);return;}
      s.moldDesignId=id;
      var p=_bmFindPattern(id);
      _bmShowMsg('設計圖：'+(p&&p.label?p.label:id));
      _bmRenderMoldZone();
      return;
    }
    _bmShowMsg('設計圖要放在木板上',true);return;
  }
  if(kind==='mallet'){
    if(zone==='bench'){
      if(!s.benchHasClay){_bmShowMsg('印花區還沒黏土',true);return;}
      if(!s.benchActiveMoldId){_bmShowMsg('印花區沒有模具，敲什麼？',true);return;}
      if(s.benchPress>=s.pressNeed){
        /* 此模具壓滿了，把紋路收起來，清掉 active */
        s.benchPressedIds.push(s.benchActiveMoldId);
        s.benchActiveMoldId='';
        s.benchPress=0;
        if(s.benchPressedIds.length>=s.comboNeed){
          _bmShowMsg('三紋融合——紋路已壓滿');
        }else{
          _bmShowMsg('紋路 '+s.benchPressedIds.length+'／'+s.comboNeed+'：再雕下一個模具');
        }
        _bmRenderBenchZone();
        return;
      }
      s.benchPress++;
      var moldEl=document.querySelector('#bm-zc-bench-content .bm-bench-mold');
      if(moldEl){
        moldEl.classList.remove('pressing');void moldEl.offsetWidth;
        moldEl.classList.add('pressing');
      }
      if(s.benchPress>=s.pressNeed){
        /* 立即把紋路收起來，避免玩家漏一下 */
        s.benchPressedIds.push(s.benchActiveMoldId);
        s.benchActiveMoldId='';
        s.benchPress=0;
        if(s.benchPressedIds.length>=s.comboNeed){
          _bmShowMsg('三紋融合——紋路已壓滿');
        }else{
          _bmShowMsg('紋路 '+s.benchPressedIds.length+'／'+s.comboNeed+'：再雕下一個模具');
        }
      }else{
        _bmShowMsg('敲 '+s.benchPress+'／'+s.pressNeed);
      }
      _bmRenderBenchZone();
      return;
    }
    _bmShowMsg('木錘要敲在印花區',true);return;
  }
  if(kind==='scraper'){
    if(zone==='bench'){
      if(s.benchTile){_bmShowMsg('花磚已脫模',true);return;}
      if(!s.benchHasClay){_bmShowMsg('還沒上黏土',true);return;}
      if(s.benchActiveMoldId){_bmShowMsg('還有模具在壓——太早脫模',true);return;}
      if(s.benchPressedIds.length<s.comboNeed){
        _bmShowMsg('紋路還不夠（'+s.benchPressedIds.length+'／'+s.comboNeed+'）',true);return;
      }
      s.benchTile=true;
      _bmShowMsg('花磚脫模——拖去對位');
      _bmRenderBenchZone();
      return;
    }
    _bmShowMsg('刮板要用在印花區',true);return;
  }
  if(kind==='cloth'){
    _bmShowMsg('抹布……不知道擦哪裡',true);return;
  }
  if(kind==='clay'){
    if(zone==='bench'){
      if(s.benchHasClay){_bmShowMsg('印花區已有黏土',true);return;}
      s.benchHasClay=true;s.clayReady=false;
      s.clayDig=0;s.clayHasWater=false;
      _bmShowMsg('黏土放上印花區');
      _bmRenderClayZone();_bmRenderBenchZone();
      return;
    }
    _bmShowMsg('黏土要放到印花區',true);return;
  }
  if(kind==='mold'){
    if(zone==='bench'){
      if(!s.benchHasClay){_bmShowMsg('印花區還沒黏土',true);return;}
      if(s.benchTile){_bmShowMsg('花磚已脫模，不能再加',true);return;}
      if(s.benchActiveMoldId){_bmShowMsg('上一個模具還在壓——先用木錘敲完',true);return;}
      if(s.benchPressedIds.indexOf(id)>=0){
        _bmShowMsg('這個紋路已經壓過了，要不一樣的',true);return;
      }
      if(s.benchPressedIds.length>=s.comboNeed){
        _bmShowMsg('紋路已經壓滿——該脫模',true);return;
      }
      s.benchActiveMoldId=id;
      s.benchPress=0;
      s.moldReady=false;s.moldDesignId=null;s.moldCarve=0;
      var p=_bmFindPattern(id);
      _bmShowMsg('蓋上「'+(p&&p.label?p.label:id)+'」');
      _bmRenderMoldZone();_bmRenderBenchZone();
      return;
    }
    _bmShowMsg('模具要放到印花區',true);return;
  }
}
function _bmDropAnim(zoneId){
  var z=document.getElementById(zoneId);if(!z)return;
  var d=document.createElement('div');
  d.className='bm-water-drop';
  z.appendChild(d);
  setTimeout(function(){if(d.parentNode)d.parentNode.removeChild(d);},1200);
}
function _bmTryFit(){
  var data=brickmoldState.data;
  var targetIds=Array.isArray(data.targetComboIds)&&data.targetComboIds.length
    ?data.targetComboIds
    :(data.targetPatternId?[data.targetPatternId]:[data.patterns[0].id]);
  if(_bmCombosMatch(brickmoldState.benchPressedIds,targetIds)){
    var indent=document.getElementById('bm-indent');
    indent.innerHTML=_bmComboSvg(brickmoldState.benchPressedIds);
    indent.classList.add('matched');
    brickmoldWin();
    return;
  }
  bmFailFit();
}
function bmFailFit(){
  brickmoldState.errors++;
  refreshBrickmoldErrors();
  var flash=document.getElementById('bm-flash');
  if(flash){
    flash.classList.add('shake');
    setTimeout(function(){flash.classList.remove('shake');},700);
  }
  _bmShowMsg('花紋對不上凹痕……整局重來',true);
  setTimeout(function(){
    _bmResetAllZones();
    if(brickmoldState.errors>=brickmoldState.maxErrors){
      brickmoldState.errors=0;
      refreshBrickmoldErrors();
    }
    _bmRenderClayZone();
    _bmRenderMoldZone();
    _bmRenderBenchZone();
    _bmRenderTray();
  },700);
}
function refreshBrickmoldErrors(){
  var p=document.getElementById('bm-errors');
  if(!p)return;
  var max=brickmoldState.maxErrors||2;
  p.textContent='錯誤 '+brickmoldState.errors+' ／ '+max;
}
function brickmoldWin(){
  brickmoldState.active=false;
  var stage=document.getElementById('stage-brickmold');
  setTimeout(function(){
    var old=document.getElementById('bm-win-text');if(old)old.remove();
    var div=document.createElement('div');
    div.id='bm-win-text';div.textContent='紋路相合';
    stage.appendChild(div);
  },700);
  setTimeout(function(){stage.style.transition='opacity .8s';stage.style.opacity='0';},2300);
  setTimeout(function(){
    stage.classList.remove('on');
    stage.style.opacity='';stage.style.transition='';
    var w=document.getElementById('bm-win-text');if(w)w.remove();
    document.getElementById('inv-bar').style.display='';
    run();
  },3150);
}
if(!window._bmDocBound){
  window._bmDocBound=true;
  document.addEventListener('mousemove',function(ev){
    if(brickmoldState.dragEl)_bmMoveDrag(ev.clientX,ev.clientY);
  });
  document.addEventListener('touchmove',function(ev){
    if(!brickmoldState.dragEl)return;
    ev.preventDefault();
    if(ev.touches.length)_bmMoveDrag(ev.touches[0].clientX,ev.touches[0].clientY);
  },{passive:false});
  document.addEventListener('mouseup',function(ev){
    if(brickmoldState.dragEl)_bmEndDrag(ev.clientX,ev.clientY);
  });
  document.addEventListener('touchend',function(ev){
    if(!brickmoldState.dragEl)return;
    var t=ev.changedTouches&&ev.changedTouches[0];
    if(t)_bmEndDrag(t.clientX,t.clientY);
  });
}

   - 撿正確紙條：進度 +1
   - 撿錯紙條：生命值 -1（共 5 顆心）
   - 心扣滿：黑屏 → 從 ch6 章節卡重新開始
   - 撿齊該區所有正確紙條：可離開區域回外圖
   - 全部 3 區完成：自動 run() 接續主腳本 */

var dwState={
  active:false,
  phase:'outer',   /* 'outer' | 'inside' | 'failed' */
  outer:{pos:{x:1,y:1}},
  inside:{zoneId:'',pos:{x:1,y:1},slipMap:{},picked:{}},
  hearts:5,maxHearts:5,
  zoneState:{},    /* id → {picked:{text:true}, completed:bool} */
  onDone:null,
  data:null
};
function _dwData(){return G.dream||_DEFAULT_DREAM;}
function _dwZoneById(id){
  var zs=_dwData().zones;
  for(var i=0;i<zs.length;i++)if(zs[i].id===id)return zs[i];
  return null;
}
function _dwCorrectTotal(zoneId){
  var z=_dwZoneById(zoneId);if(!z)return 0;
  return (z.slips||[]).filter(function(s){return s.correct;}).length;
}
function _dwAllZonesDone(){
  var zs=_dwData().zones;
  for(var i=0;i<zs.length;i++){
    if(!dwState.zoneState[zs[i].id]||!dwState.zoneState[zs[i].id].completed)return false;
  }
  return true;
}
function stageDreamwalk(){
  dwState.active=true;
  dwState.phase='outer';
  dwState.data=_dwData();
  dwState.maxHearts=Number(dwState.data.maxHearts)||5;
  dwState.hearts=dwState.maxHearts;
  dwState.outer.pos={x:1,y:1};
  dwState.zoneState={};
  dwState.onDone=function(){run();};
  document.getElementById('stage-dreamwalk').classList.add('on');
  document.getElementById('inv-bar').style.display='none';
  hideDialog();
  _dwEnterOuter();
}
function _dwEnterOuter(){
  dwState.phase='outer';
  document.getElementById('dw-mm-title').textContent='夢境位置';
  document.getElementById('dw-progress').classList.remove('show');
  document.getElementById('dw-leave-btn').classList.remove('show');
  _dwHideSlipPopup();
  _dwUpdateEnterBtn();
  _dwRenderHearts();
  _dwRenderMinimap();
  _dwUpdateLabel();
}
function _dwOuterZoneAt(x,y){
  var zs=dwState.data.zones;
  for(var i=0;i<zs.length;i++){
    if(zs[i].mapX===x&&zs[i].mapY===y)return zs[i];
  }
  return null;
}
function dwMove(dx,dy){
  if(!dwState.active)return;
  /* 心扣滿期間不允許動作 */
  if(dwState.phase==='failed')return;
  /* 紙條 popup 顯示中：必須先做選擇 */
  if(dwState.phase==='inside'&&document.getElementById('dw-slip-popup').classList.contains('show'))return;
  var st=(dwState.phase==='inside')?dwState.inside.pos:dwState.outer.pos;
  var gw,gh;
  if(dwState.phase==='inside'){
    var z=_dwZoneById(dwState.inside.zoneId);
    gw=z.gridW;gh=z.gridH;
  }else{
    gw=dwState.data.outerGrid.width;gh=dwState.data.outerGrid.height;
  }
  var nx=st.x+dx,ny=st.y+dy;
  if(nx<1||ny<1||nx>gw||ny>gh){_dwShowMsg('已到邊界',true);return;}
  st.x=nx;st.y=ny;
  _dwRenderMinimap();
  _dwUpdateLabel();
  if(dwState.phase==='outer'){
    _dwUpdateEnterBtn();
  }else{
    /* 內圖：踩到紙條格 → 跳 popup */
    _dwCheckInsideSlip();
  }
}
function _dwUpdateEnterBtn(){
  var btn=document.getElementById('dw-enter-btn');
  if(!btn)return;
  var p=dwState.outer.pos;
  var z=_dwOuterZoneAt(p.x,p.y);
  if(z){
    /* 已完成的區域可重訪但不必再進 */
    var done=dwState.zoneState[z.id]&&dwState.zoneState[z.id].completed;
    btn.textContent=done?('已完成：'+z.name):('進入　'+z.name);
    btn.dataset.zoneId=z.id;
    btn.classList.add('show');
  }else{
    btn.classList.remove('show');
    btn.dataset.zoneId='';
  }
}
function dwEnterZone(){
  var btn=document.getElementById('dw-enter-btn');
  var zid=btn.dataset.zoneId;if(!zid)return;
  var z=_dwZoneById(zid);if(!z)return;
  /* 黑屏切換 → 進入區內 */
  var flash=document.getElementById('dw-flash');
  flash.classList.add('black');
  setTimeout(function(){
    _dwInsideStart(zid);
    setTimeout(function(){flash.classList.remove('black');},100);
  },800);
}
function _dwInsideStart(zoneId){
  dwState.phase='inside';
  dwState.inside.zoneId=zoneId;
  dwState.inside.pos={x:1,y:1};
  if(!dwState.zoneState[zoneId])dwState.zoneState[zoneId]={picked:{},completed:false};
  /* 重新隨機散紙條（已撿過的不再出現） */
  _dwSpawnSlips(zoneId);
  document.getElementById('dw-enter-btn').classList.remove('show');
  document.getElementById('dw-progress').classList.add('show');
  document.getElementById('dw-leave-btn').classList.add('show');
  document.getElementById('dw-mm-title').textContent=_dwZoneById(zoneId).name;
  _dwHideSlipPopup();
  _dwRenderHearts();
  _dwRenderMinimap();
  _dwUpdateLabel();
  _dwUpdateProgress();
  _dwShowMsg('進入：'+_dwZoneById(zoneId).name);
}
function _dwSpawnSlips(zoneId){
  var z=_dwZoneById(zoneId);if(!z)return;
  var picked=dwState.zoneState[zoneId].picked||{};
  /* 過濾掉已撿過的紙條 */
  var pool=(z.slips||[]).filter(function(s){return !picked[s.text];});
  /* 隨機選格子（避開玩家起始位置 (1,1)） */
  var cells=[];
  for(var x=1;x<=z.gridW;x++){
    for(var y=1;y<=z.gridH;y++){
      if(x===1&&y===1)continue;  /* 起始格不放紙條 */
      cells.push({x:x,y:y});
    }
  }
  /* 洗牌 */
  for(var i=cells.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=cells[i];cells[i]=cells[j];cells[j]=t;
  }
  var map={};
  var n=Math.min(pool.length,cells.length);
  for(var k=0;k<n;k++){
    var c=cells[k];
    map[c.x+','+c.y]=pool[k];
  }
  dwState.inside.slipMap=map;
}
function _dwCheckInsideSlip(){
  var p=dwState.inside.pos;
  var key=p.x+','+p.y;
  var slip=dwState.inside.slipMap[key];
  if(slip){
    _dwShowSlipPopup(slip);
  }
}
function _dwShowSlipPopup(slip){
  document.getElementById('dw-sp-text').textContent=slip.text;
  document.getElementById('dw-slip-popup').classList.add('show');
  dwState.inside._pendingSlip=slip;
}
function _dwHideSlipPopup(){
  document.getElementById('dw-slip-popup').classList.remove('show');
  dwState.inside._pendingSlip=null;
}
function dwPickSlip(){
  var slip=dwState.inside._pendingSlip;if(!slip)return;
  var zoneId=dwState.inside.zoneId;
  var p=dwState.inside.pos;
  /* 從格子拿走 */
  delete dwState.inside.slipMap[p.x+','+p.y];
  dwState.zoneState[zoneId].picked[slip.text]=true;
  if(slip.correct){
    _dwShowMsg('撿到正確紙條：'+slip.text);
    _dwUpdateProgress();
    /* 撿齊所有正確 → 完成該區 */
    var total=_dwCorrectTotal(zoneId);
    var pickedCorrect=Object.keys(dwState.zoneState[zoneId].picked)
      .filter(function(t){
        var z=_dwZoneById(zoneId);
        return (z.slips||[]).some(function(s){return s.text===t&&s.correct;});
      }).length;
    if(pickedCorrect>=total){
      dwState.zoneState[zoneId].completed=true;
      setTimeout(function(){_dwShowMsg('「'+_dwZoneById(zoneId).name+'」完成！');},600);
      setTimeout(function(){_dwLeaveZoneAuto();},1800);
    }
  }else{
    _dwShowMsg('錯誤紙條！扣一顆心。',true);
    _dwLoseHeart();
  }
  _dwHideSlipPopup();
  _dwRenderMinimap();
}
function dwSkipSlip(){
  /* 略過：紙條留在格子上，可以再回來 */
  _dwHideSlipPopup();
  _dwShowMsg('略過');
}
function _dwLoseHeart(){
  dwState.hearts--;
  _dwRenderHearts(true);
  var flash=document.getElementById('dw-flash');
  flash.classList.add('red');
  setTimeout(function(){flash.classList.remove('red');},700);
  if(dwState.hearts<=0)_dwFail();
}
function _dwRenderHearts(animate){
  var el=document.getElementById('dw-hearts');
  if(!el)return;
  var max=dwState.maxHearts||5;
  var h=dwState.hearts;
  var html='';
  for(var i=0;i<max;i++){
    var cls='dw-heart'+(i<h?'':' lost');
    if(animate&&i===h)cls+=' shake';  /* 剛失去的那顆抖一下 */
    html+='<span class="'+cls+'">'+(i<h?'♥':'♡')+'</span>';
  }
  el.innerHTML=html;
}
function _dwUpdateProgress(){
  var el=document.getElementById('dw-progress');
  if(!el)return;
  var zid=dwState.inside.zoneId;
  if(!zid){el.textContent='';return;}
  var z=_dwZoneById(zid);
  var total=_dwCorrectTotal(zid);
  var picked=Object.keys((dwState.zoneState[zid]||{}).picked||{})
    .filter(function(t){
      return (z.slips||[]).some(function(s){return s.text===t&&s.correct;});
    }).length;
  el.textContent='正確紙條 '+picked+' ／ '+total;
}
function _dwFail(){
  dwState.phase='failed';
  var flash=document.getElementById('dw-flash');
  flash.classList.add('black');
  _dwShowMsg('夢境破碎，記憶重組⋯⋯',true);
  setTimeout(function(){_dwResetToCh6();},2200);
}
function _dwResetToCh6(){
  /* 找 ch6 章節卡位置，把 _ptr 設過去重跑 ch6 */
  var idx=SCRIPT.findIndex(function(e){return e&&e.t==='chapter'&&e.main==='執念之五';});
  if(idx<0)idx=Math.max(0,_ptr-15);
  _ptr=idx;
  /* 清掉夢境狀態 */
  dwState.active=false;
  dwState.phase='outer';
  dwState.hearts=dwState.maxHearts;
  dwState.zoneState={};
  /* 收起 stage */
  document.getElementById('stage-dreamwalk').classList.remove('on');
  document.getElementById('inv-bar').style.display='';
  setTimeout(function(){
    document.getElementById('dw-flash').classList.remove('black');
    run();
  },600);
}
function _dwLeaveZoneAuto(){
  /* 自動離開區域：黑屏 → 回外圖 */
  var flash=document.getElementById('dw-flash');
  flash.classList.add('black');
  setTimeout(function(){
    _dwEnterOuter();
    setTimeout(function(){
      flash.classList.remove('black');
      /* 全部完成 → 直接結束夢境 */
      if(_dwAllZonesDone()){
        setTimeout(function(){dwExitDream();},800);
      }
    },100);
  },800);
}
function dwLeaveZone(){
  /* 手動離開（玩家點離開區域鈕） */
  if(dwState.phase!=='inside')return;
  var flash=document.getElementById('dw-flash');
  flash.classList.add('black');
  setTimeout(function(){
    _dwEnterOuter();
    setTimeout(function(){flash.classList.remove('black');},100);
  },800);
}
function dwExitDream(){
  /* 結束整個夢境階段，接續主腳本 */
  dwState.active=false;
  document.getElementById('stage-dreamwalk').classList.remove('on');
  document.getElementById('inv-bar').style.display='';
  var done=dwState.onDone;dwState.onDone=null;
  if(done)done();
}
function _dwRenderMinimap(){
  var c=document.getElementById('dw-mm-canvas');if(!c)return;
  var ctx=c.getContext('2d');
  var W=c.width,H=c.height;
  var gw,gh,pos;
  if(dwState.phase==='inside'){
    var z=_dwZoneById(dwState.inside.zoneId);
    gw=z.gridW;gh=z.gridH;pos=dwState.inside.pos;
  }else{
    gw=dwState.data.outerGrid.width;gh=dwState.data.outerGrid.height;pos=dwState.outer.pos;
  }
  var cw=W/gw,ch=H/gh;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(232,220,196,.14)';ctx.lineWidth=1;
  for(var x=0;x<=gw;x++){
    ctx.beginPath();ctx.moveTo(x*cw,0);ctx.lineTo(x*cw,H);ctx.stroke();
  }
  for(var y=0;y<=gh;y++){
    ctx.beginPath();ctx.moveTo(0,y*ch);ctx.lineTo(W,y*ch);ctx.stroke();
  }
  var px=(pos.x-1)*cw,py=H-pos.y*ch;
  ctx.fillStyle='#e87050';
  ctx.fillRect(px+3,py+3,cw-6,ch-6);
  ctx.shadowColor='rgba(232,112,80,.7)';ctx.shadowBlur=8;
  ctx.fillRect(px+3,py+3,cw-6,ch-6);
  ctx.shadowBlur=0;
}
function _dwUpdateLabel(){
  var l=document.getElementById('dw-mm-label');
  if(!l)return;
  var p=(dwState.phase==='inside')?dwState.inside.pos:dwState.outer.pos;
  l.textContent='( '+p.x+' , '+p.y+' )';
}
function _dwShowMsg(text,boundary){
  var m=document.getElementById('dw-zone-msg');if(!m)return;
  m.textContent=text;
  m.classList.toggle('boundary',!!boundary);
  m.classList.add('show');
  clearTimeout(m._t);
  m._t=setTimeout(function(){m.classList.remove('show');},1600);
}
if(!window._dwKeysBound){
  window._dwKeysBound=true;
  document.addEventListener('keydown',function(ev){
    if(!dwState.active)return;
    var k=ev.key;
    if(k==='ArrowUp'||k==='w'||k==='W'){ev.preventDefault();dwMove(0,1);}
    else if(k==='ArrowDown'||k==='s'||k==='S'){ev.preventDefault();dwMove(0,-1);}
    else if(k==='ArrowLeft'||k==='a'||k==='A'){ev.preventDefault();dwMove(-1,0);}
    else if(k==='ArrowRight'||k==='d'||k==='D'){ev.preventDefault();dwMove(1,0);}
  });
}

/* ══ Klotski stage（華容道：8 張磚塊圖 + 完成確認） ══
   - 警告大字 + 4×2 圖塊 + 「我已經完成了......嗎？」按鈕
   - 按下 → 跳出確認視窗「是否真的已經解開？」
   - 玩家按「是」 → 黑屏 + run() 接劇情
   - 圖片從 IndexedDB 載入，key 為 klotski-1 ... klotski-8（admin 上傳） */
function stageKlotski(){
  document.getElementById('stage-klotski').classList.add('on');
  document.getElementById('inv-bar').style.display='none';
  document.getElementById('kl-confirm').classList.remove('on');
  hideDialog();
  var data=G.klotski||{};
  var warnEl=document.getElementById('kl-warning');
  if(warnEl)warnEl.textContent=data.warningText||'注意！僅有一次通關機會，請解完所有方塊後再進行下一步！';
  var doneEl=document.getElementById('kl-done-btn');
  if(doneEl)doneEl.textContent=data.doneButtonText||'我已經完成了......嗎？';
  /* 預設空格位置（admin 可設 G.klotski.emptyIndex，1~9；預設 9 = 右下） */
  var emptyIdx=Number(data.emptyIndex)||9;
  /* 渲染 9 格：1~9 號，emptyIdx 那格不放圖（標 kl-empty）；其他依 klotski-N 載入 */
  var blocks=document.querySelectorAll('#kl-grid .kl-block');
  for(var i=0;i<9;i++){
    var pos=i+1;
    var b=blocks[i];if(!b)continue;
    b.style.backgroundImage='';
    b.classList.remove('kl-empty');
    if(pos===emptyIdx){
      b.classList.add('kl-empty');
    }else{
      (function(idx,el){
        if(typeof assetURLOrPath==='function'){
          assetURLOrPath('klotski-'+idx,'',function(url){
            if(url)el.style.backgroundImage='url("'+url+'")';
          });
        }
      })(pos,b);
    }
  }
}
function klotskiAsk(){
  document.getElementById('kl-confirm').classList.add('on');
}
function klotskiCancel(){
  document.getElementById('kl-confirm').classList.remove('on');
}
function klotskiConfirm(){
  document.getElementById('kl-confirm').classList.remove('on');
  /* 黑屏一下再接續主腳本 */
  var bo=document.getElementById('blackout');
  bo.classList.remove('theend');
  bo.classList.add('on');
  setTimeout(function(){
    document.getElementById('stage-klotski').classList.remove('on');
    setTimeout(function(){
      bo.classList.remove('on');
      run();
    },800);
  },1000);
}

/* ══ Phylock stage（電磁鎖：密碼輸入 → ESP32 解實體鎖 + 線上劇情前進） ══
   一個密碼解兩個鎖：
   - 遊戲端：本地比對 G.lock.password，正確才放行
   - 實體：fetch POST 到 G.lock.endpoint/unlock，ESP32 比對相同密碼 → 開鎖
   - 若無實體鎖（測試環境）：fetch 失敗 → 顯示離線提示但仍前進，不卡關 */
function stagePhylock(){
  document.getElementById('stage-phylock').classList.add('on');
  var lk=G.lock||{};
  document.getElementById('pl-hint').textContent=lk.hint||'請輸入解鎖密碼';
  _plBuffer='';
  _plUpdateSlots();
  /* 還原鍵盤＋清除鈕（上次解鎖過會被收起） */
  var kp=document.getElementById('pl-keypad');if(kp)kp.style.display='';
  var clr=document.getElementById('pl-clear');if(clr)clr.style.display='';
  var keys=document.querySelectorAll('#pl-keypad .pl-key');
  keys.forEach(function(k){k.removeAttribute('disabled');k.classList.remove('pressed');});
  document.getElementById('pl-input').value='';
  document.getElementById('pl-status').textContent='';
  document.getElementById('pl-status').className='';
  /* 重置兩個手動按鈕 */
  var ub=document.getElementById('pl-unlock-btn');
  var cb=document.getElementById('pl-continue-btn');
  if(ub){ub.classList.remove('show');ub.removeAttribute('disabled');}
  if(cb){cb.classList.remove('show');cb.removeAttribute('disabled');}
}
/* 4 位密碼緩衝 */
var _plBuffer='';
function _plUpdateSlots(){
  var slots=document.querySelectorAll('#pl-slots .pl-slot');
  for(var i=0;i<slots.length;i++){
    var ch=_plBuffer[i]||'';
    slots[i].textContent=ch;
    if(ch)slots[i].classList.add('filled');else slots[i].classList.remove('filled');
  }
}
function plPressKey(n){
  if(_plBuffer.length>=4)return;
  if(document.querySelector('#pl-keypad .pl-key:disabled'))return;  /* 已送出，鎖鍵 */
  var key=document.querySelector('#pl-keypad .pl-key[data-num="'+n+'"]');
  if(!key)return;
  /* 飛行動畫：克隆按鍵到 #pl-fly，從鍵位飛到對應 slot */
  var stage=document.getElementById('stage-phylock');
  var sRect=stage.getBoundingClientRect();
  var kRect=key.getBoundingClientRect();
  var slot=document.querySelectorAll('#pl-slots .pl-slot')[_plBuffer.length];
  var slRect=slot.getBoundingClientRect();
  var fly=document.createElement('div');
  fly.className='pl-fly-digit';
  fly.textContent=String(n);
  fly.style.left=(kRect.left-sRect.left+kRect.width/2-12)+'px';
  fly.style.top=(kRect.top-sRect.top+kRect.height/2-18)+'px';
  document.getElementById('pl-fly').appendChild(fly);
  /* 鍵 press 動畫 + 暫時隱藏文字 */
  key.classList.remove('pressed');void key.offsetWidth;key.classList.add('pressed');
  /* 下一幀飛到 slot */
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      fly.style.left=(slRect.left-sRect.left+slRect.width/2-12)+'px';
      fly.style.top=(slRect.top-sRect.top+slRect.height/2-18)+'px';
      fly.style.transform='scale(1.4)';
      fly.style.opacity='0.2';
    });
  });
  /* 420ms 後：填入 slot、移除飛行元素 */
  setTimeout(function(){
    _plBuffer+=String(n);
    _plUpdateSlots();
    var ss=document.querySelectorAll('#pl-slots .pl-slot');
    var lastSlot=ss[_plBuffer.length-1];
    if(lastSlot){lastSlot.classList.remove('flash');void lastSlot.offsetWidth;lastSlot.classList.add('flash');}
    if(fly.parentNode)fly.parentNode.removeChild(fly);
    /* 滿 4 位 → 自動送出 */
    if(_plBuffer.length>=4){
      document.getElementById('pl-input').value=_plBuffer;
      /* 鎖住所有鍵避免重複按 */
      var keys=document.querySelectorAll('#pl-keypad .pl-key');
      keys.forEach(function(k){k.setAttribute('disabled','');});
      setTimeout(submitPhylock,450);
    }
  },420);
}
function plClearInput(){
  if(document.querySelector('#pl-keypad .pl-key:disabled'))return;  /* 已送出 */
  _plBuffer='';
  _plUpdateSlots();
  document.getElementById('pl-input').value='';
  document.getElementById('pl-status').textContent='';
  document.getElementById('pl-status').className='';
}
function _plSetStatus(text,cls){
  var s=document.getElementById('pl-status');
  s.textContent=text||'';
  s.className=cls||'';
}
/* 玩家按完 4 位數會呼叫 submitPhylock：
   - 密碼錯：紅閃 + 自動清空重輸
   - 密碼對：鎖鍵盤、顯示「密碼正確」+ 出現「解　鎖」按鈕（不自動連線、不計時）
   plDoUnlock：玩家按下解鎖鈕 → POST 給 ESP32 + 出現「繼　續」
   plContinue：玩家按繼續 → 進主腳本 */
function submitPhylock(){
  var lk=G.lock||{};
  var inp=document.getElementById('pl-input');
  var pw=(inp.value||_plBuffer||'').trim();
  if(!pw)return;
  /* 本地密碼比對 */
  var expected=(lk.password||'').trim();
  if(expected&&pw!==expected){
    _plSetStatus(lk.wrongText||'密碼錯誤','err');
    var slots=document.querySelectorAll('#pl-slots .pl-slot');
    slots.forEach(function(s){s.classList.remove('flash');void s.offsetWidth;s.classList.add('flash');});
    setTimeout(function(){
      _plBuffer='';
      _plUpdateSlots();
      var keys=document.querySelectorAll('#pl-keypad .pl-key');
      keys.forEach(function(k){k.removeAttribute('disabled');});
    },800);
    return;
  }
  /* 密碼正確 → 把鍵盤＋清除鈕整個收起（騰出空間），顯示「解 鎖」按鈕 */
  var kp=document.getElementById('pl-keypad');if(kp)kp.style.display='none';
  var clr=document.getElementById('pl-clear');if(clr)clr.style.display='none';
  _plSetStatus('密碼正確，請按下解鎖鈕','ok');
  var ub=document.getElementById('pl-unlock-btn');
  if(ub){ub.classList.add('show');ub.removeAttribute('disabled');}
}
function plDoUnlock(){
  var lk=G.lock||{};
  var ub=document.getElementById('pl-unlock-btn');
  if(ub){ub.setAttribute('disabled','');}
  /* GitHub 線上版：已移除實體電磁鎖連線，輸入正確密碼即可繼續劇情 */
  _plSetStatus(lk.okText||'密碼正確，按下繼續','ok');
  _plShowContinue();
}
function _plShowContinue(){
  /* 解鎖鈕收起，繼續鈕浮現（手動推進，不計時） */
  var ub=document.getElementById('pl-unlock-btn');
  if(ub)ub.classList.remove('show');
  var cb=document.getElementById('pl-continue-btn');
  if(cb){cb.classList.add('show');cb.removeAttribute('disabled');}
}
function plContinue(){
  var cb=document.getElementById('pl-continue-btn');
  if(cb)cb.setAttribute('disabled','');
  _plAdvance();
}
function _plAdvance(){
  document.getElementById('stage-phylock').classList.remove('on');
  /* 收起按鈕 */
  var ub=document.getElementById('pl-unlock-btn');if(ub)ub.classList.remove('show');
  var cb=document.getElementById('pl-continue-btn');if(cb)cb.classList.remove('show');
  run();
}

/* ══ Puzzle stage（5×5 記憶翻牌拼圖） ══
   25 張卡牌洗牌後鋪在 5×5 格子，全部背面朝下。
   操作：
   - 點背面卡 → 翻成正面
   - 點正面（未選中）→ 變成「已選」
   - 點已選中的卡 → 翻回背面（取消選擇）
   - 已選中時點另一張 → 兩張位置交換、都正面顯示
   勝利條件：positions[i] === i+1 全部成立 */
var PUZZLE_SIZE=25;
var PUZZLE_MAX_ERRORS=5;
/* peeking：目前 peek 的 slot；locked：被「選中／鎖定面朝上」的 slot */
var puzzle={positions:[],peeking:-1,locked:-1,active:false,errors:0};
var _peekViolationFlag=false;

function stagePuzzle(){
  puzzle.active=true;puzzle.peeking=-1;puzzle.locked=-1;puzzle.errors=0;
  _peekViolationFlag=false;
  /* 初始化用 derangement 洗牌：保證每張卡都不在自己的正確位置（不然一開始就被鎖、點不到） */
  do{
    puzzle.positions=[];
    for(var i=1;i<=PUZZLE_SIZE;i++)puzzle.positions.push(i);
    _puzzleShuffle(puzzle.positions);
  }while(_anyInCorrectPosition());
  buildPuzzleGrid();
  refreshPuzzleErrors();
  document.getElementById('stage-puzzle').classList.add('on');
  document.getElementById('inv-bar').style.display='none';
}
function _anyInCorrectPosition(){
  for(var i=0;i<puzzle.positions.length;i++){
    if(puzzle.positions[i]===i+1)return true;
  }
  return false;
}
function refreshPuzzleErrors(){
  var el=document.getElementById('puzzle-errors');
  if(!el)return;
  el.textContent='錯誤 '+puzzle.errors+' ／ '+PUZZLE_MAX_ERRORS;
  el.classList.remove('warning','danger');
  if(puzzle.errors>=PUZZLE_MAX_ERRORS-1)el.classList.add('danger');
  else if(puzzle.errors>=PUZZLE_MAX_ERRORS-2)el.classList.add('warning');
}
function _countCorrect(){
  var n=0;
  for(var i=0;i<puzzle.positions.length;i++)if(puzzle.positions[i]===i+1)n++;
  return n;
}
function reshufflePuzzle(){
  var stage=document.getElementById('stage-puzzle');
  stage.classList.add('flash-reset');
  var oldMsg=document.getElementById('puzzle-reset-msg');if(oldMsg)oldMsg.remove();
  var msg=document.createElement('div');
  msg.id='puzzle-reset-msg';msg.textContent='錯誤過多　重新打亂';
  stage.appendChild(msg);
  Object.keys(_puzzleFlipTimer).forEach(_clearFlipTimer);
  setTimeout(function(){
    do{
      puzzle.positions=[];
      for(var i=1;i<=PUZZLE_SIZE;i++)puzzle.positions.push(i);
      _puzzleShuffle(puzzle.positions);
    }while(_anyInCorrectPosition());
    puzzle.errors=0;puzzle.peeking=-1;puzzle.locked=-1;_peekViolationFlag=false;
    buildPuzzleGrid();
    refreshPuzzleErrors();
  },900);
  setTimeout(function(){
    stage.classList.remove('flash-reset');
    var m=document.getElementById('puzzle-reset-msg');if(m)m.remove();
  },1500);
}
function _puzzleShuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i];arr[i]=arr[j];arr[j]=t;
  }
}
function _isPuzzleSolved(){
  for(var i=0;i<puzzle.positions.length;i++){
    if(puzzle.positions[i]!==i+1)return false;
  }
  return true;
}
function buildPuzzleGrid(){
  var grid=document.getElementById('puzzle-grid');grid.innerHTML='';
  puzzle.positions.forEach(function(pieceNum,slotIdx){
    var card=document.createElement('div');
    card.className='puzzle-card';
    card.dataset.slot=slotIdx;
    card.innerHTML='<div class="puzzle-card-inner">'
      +'<div class="puzzle-back"><span class="puzzle-back-mark">？</span></div>'
      +'<div class="puzzle-face" id="pz-face-'+slotIdx+'"></div>'
      +'</div>';
    card.onclick=(function(s){return function(){tapPuzzleCard(s);};})(slotIdx);
    grid.appendChild(card);
    _loadPuzzlePiece(slotIdx,pieceNum);
  });
  refreshPuzzleProgress();
  refreshPuzzleCorrect();
}
/* 載入該卡正面內容：有圖片 → 只顯示圖片（不顯示編號）；
   沒圖片 → 顯示大編號當佔位（測試用） */
function _loadPuzzlePiece(slotIdx,pieceNum){
  var face=document.getElementById('pz-face-'+slotIdx);
  if(!face)return;
  assetURL('puzzle-'+pieceNum,function(url){
    if(url){
      face.innerHTML='<img src="'+url+'" alt="" style="width:100%;height:100%;object-fit:cover;display:block;">';
    }else{
      face.innerHTML='<div class="puzzle-placeholder">'+pieceNum+'</div>';
    }
  });
}

/* 翻面行為：
   - 點背面卡 → 翻成正面，啟動 2 秒 peek timer，到時自動翻回背面
   - peek 期間再點同一張 → 取消 timer，標示為「已選」（停留正面、金光）
   - 已選中時點另一張 → 兩張交換位置；對的鎖定面朝上、錯的兩秒後翻回背面
   - 已就位（綠光鎖定）的卡：忽略點擊
   注意：peek 計時用每張卡自己的 _flipTimer，不會互相干擾 */
var _puzzleFlipTimer={};
function _clearFlipTimer(s){
  if(_puzzleFlipTimer[s]){clearTimeout(_puzzleFlipTimer[s]);delete _puzzleFlipTimer[s];}
}
function _scheduleFlipBack(s,ms){
  _clearFlipTimer(s);
  _puzzleFlipTimer[s]=setTimeout(function(){
    var c=document.querySelector('.puzzle-card[data-slot="'+s+'"]');
    if(c&&!c.classList.contains('correct')&&!c.classList.contains('selected')){
      c.classList.remove('flipped');
    }
    /* 釋放 peek 狀態，讓下一張可以開始 peek */
    if(puzzle.peeking===s){puzzle.peeking=-1;_peekViolationFlag=false;}
    delete _puzzleFlipTimer[s];
  },ms||2000);
}
/* ── 新版翻牌規則 ──
   1. 同時間只能有一張卡 peek（翻面 2 秒）。peek 期間點別張卡 = 違規。
   2. peek 中再點同一張 → 升級為「已選」（鎖定面朝上、金光），peek timer 取消。
   3. 若已有「已選」卡，再點另一張背面卡 → 那張開始 peek。
   4. peek 期間點「已選」那張 → 解除選擇（翻回背面）。
   5. peek 中再點同一張且另一張已 lock → 觸發交換。
   6. 點選兩張卡各 2 下（peek + lock，再 peek + 觸發 swap）= 完成一次交換。
   7. 違規多點：每次 peek 期間「亂點」累計算 1 次錯誤（不重複算）。
   8. 交換後正確數沒增加也算 1 次錯誤；錯誤累積到 5 次 → 全部打亂重來。 */
function tapPuzzleCard(slotIdx){
  if(!puzzle.active)return;
  var card=document.querySelector('.puzzle-card[data-slot="'+slotIdx+'"]');
  if(!card)return;
  /* 已就位（綠光鎖定）→ 不可動 */
  if(card.classList.contains('correct'))return;

  /* CASE 1：點到「已選／鎖定」那張 → 解除選擇＋翻回背面 */
  if(puzzle.locked===slotIdx){
    card.classList.remove('selected','flipped');
    puzzle.locked=-1;
    return;
  }

  /* CASE 2：點到「目前 peek」那張 → 升級或交換 */
  if(puzzle.peeking===slotIdx){
    _clearFlipTimer(slotIdx);
    if(puzzle.locked!==-1){
      /* 已有 lock → 觸發交換 */
      _doSwapAndCheck(puzzle.locked,slotIdx);
      puzzle.locked=-1;puzzle.peeking=-1;_peekViolationFlag=false;
    }else{
      /* 無 lock → 升級為 lock */
      card.classList.add('selected');
      puzzle.locked=slotIdx;
      puzzle.peeking=-1;
      _peekViolationFlag=false;
    }
    return;
  }

  /* CASE 3：背面卡（既非 peek 也非 lock）→ 嘗試 peek */
  if(puzzle.peeking!==-1){
    /* 違規：peek 期間亂點別張 → 每次 peek 期間累計算 1 次錯 */
    if(!_peekViolationFlag){
      _peekViolationFlag=true;
      puzzle.errors++;
      refreshPuzzleErrors();
      if(puzzle.errors>=PUZZLE_MAX_ERRORS){reshufflePuzzle();return;}
    }
    _flashRejected(slotIdx);
    return;
  }
  /* OK：開始 peek */
  card.classList.add('flipped');
  puzzle.peeking=slotIdx;
  _scheduleFlipBack(slotIdx,2000);
}
function _flashRejected(slotIdx){
  var c=document.querySelector('.puzzle-card[data-slot="'+slotIdx+'"]');
  if(!c)return;
  c.classList.remove('flash-reject');void c.offsetWidth;
  c.classList.add('flash-reject');
  setTimeout(function(){c.classList.remove('flash-reject');},420);
}
function _doSwapAndCheck(a,b){
  var beforeCorrect=_countCorrect();
  var tmp=puzzle.positions[a];
  puzzle.positions[a]=puzzle.positions[b];
  puzzle.positions[b]=tmp;
  [a,b].forEach(function(s){
    var c=document.querySelector('.puzzle-card[data-slot="'+s+'"]');
    if(!c)return;
    c.classList.add('flipped');
    c.classList.remove('selected');
    _loadPuzzlePiece(s,puzzle.positions[s]);
  });
  refreshPuzzleProgress();
  refreshPuzzleCorrect();
  /* 錯誤計數：交換後正確數沒增加 → 1 次錯 */
  var afterCorrect=_countCorrect();
  if(afterCorrect<=beforeCorrect){
    puzzle.errors++;
    refreshPuzzleErrors();
    if(puzzle.errors>=PUZZLE_MAX_ERRORS){reshufflePuzzle();return;}
  }
  if(_isPuzzleSolved()){puzzleWin();return;}
  /* 對的鎖定（已加 .correct）；錯的 2 秒後翻回背面 */
  [a,b].forEach(function(s){
    var c=document.querySelector('.puzzle-card[data-slot="'+s+'"]');
    if(c&&!c.classList.contains('correct'))_scheduleFlipBack(s,2000);
  });
}
function refreshPuzzleCorrect(){
  puzzle.positions.forEach(function(pn,s){
    var c=document.querySelector('.puzzle-card[data-slot="'+s+'"]');
    if(!c)return;
    c.classList.toggle('correct',pn===s+1);
  });
}
function refreshPuzzleProgress(){
  var ok=0;
  puzzle.positions.forEach(function(pn,s){if(pn===s+1)ok++;});
  var p=document.getElementById('puzzle-progress');
  if(p)p.textContent='已就位 '+ok+' ／ '+PUZZLE_SIZE;
}
/* 規則燈泡（永遠顯示） */
function getPuzzleRules(){
  var def='・25 張卡牌全部背面朝下、隨機洗牌排成 5×5。\n'
    +'・點背面卡 → 翻成正面（peek 2 秒）。peek 期間點同一張可以「鎖定／取消選擇」。\n'
    +'・peek 期間不能再翻其他張，多點別張 = 算 1 次錯誤（同一次 peek 內多點仍只算 1 次）。\n'
    +'・每張卡需要點 2 下才會被選中：第 1 下 peek、第 2 下 lock。\n'
    +'・先 lock 一張（金色發光、停留正面），再對另一張 peek + 第 2 下 → 兩張交換位置。\n'
    +'・每塊就位（編號 N 在第 N 格）→ 鎖定面朝上、綠光，不再可點。\n'
    +'・交換後正確數沒增加 = 1 次錯誤。錯誤累積到 5 次 → 全部打亂重來。\n'
    +'・25 塊全部就位 → 拼圖完成。';
  return (G.puzzleRules&&G.puzzleRules.length)?G.puzzleRules:def;
}
