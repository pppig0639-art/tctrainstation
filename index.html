<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>臺中驛・時の回廊</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Shippori+Mincho:wght@400;600&display=swap');

  :root {
    --ink: #1a1008;
    --paper: #f0e8d5;
    --paper-dark: #d4c9a8;
    --accent: #8b2020;
    --accent-light: #c44a2a;
    --gold: #b8972a;
    --shadow: rgba(0,0,0,0.6);
    --dialog-bg: rgba(10, 6, 2, 0.88);
    --dialog-border: #6b4c1e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Noto Serif TC', 'Shippori Mincho', serif;
    background: #000;
    touch-action: manipulation;
  }

  /* ── 遊戲容器 ── */
  #game {
    position: relative;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: flex-end;
  }

  /* ── 背景層 ── */
  #bg {
    position: absolute; inset: 0;
    background: #0a0604;
    transition: opacity 0.8s ease;
  }

  #bg-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  /* 電話亭背景（CSS繪製） */
  .scene-phonebooth #bg { background: linear-gradient(180deg, #050308 0%, #0d0a18 40%, #1a0f08 100%); }
  .scene-rain::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 3px,
      rgba(150,170,220,0.03) 3px, rgba(150,170,220,0.03) 4px
    );
    animation: rain 0.3s linear infinite;
    pointer-events: none; z-index: 1;
  }
  @keyframes rain {
    from { background-position: 0 0; }
    to { background-position: 0 40px; }
  }

  /* ── 立繪層 ── */
  #sprites {
    position: absolute; inset: 0;
    display: flex; align-items: flex-end;
    pointer-events: none;
  }

  .sprite {
    position: absolute;
    bottom: 0;
    width: 55vw; max-width: 320px;
    transition: opacity 0.5s ease, transform 0.5s ease, filter 0.5s ease;
    filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
  }
  .sprite.left { left: -2vw; }
  .sprite.right { right: -2vw; transform: scaleX(-1); }
  .sprite.hidden { opacity: 0; pointer-events: none; }
  .sprite.dim { filter: brightness(0.4) drop-shadow(0 0 20px rgba(0,0,0,0.8)); }

  /* 佔位立繪（SVG形狀） */
  .sprite-placeholder {
    width: 100%; aspect-ratio: 0.5/1;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── 對話框 ── */
  #dialog-area {
    position: relative; z-index: 10;
    padding: 0 12px 20px;
    display: flex; flex-direction: column; gap: 8px;
  }

  /* 說話者名字 */
  #speaker-box {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--dialog-bg);
    border: 1px solid var(--dialog-border);
    border-bottom: none;
    padding: 4px 16px;
    width: fit-content;
    min-width: 120px;
    position: relative;
  }
  #speaker-box::after {
    content: '';
    position: absolute; bottom: -1px; left: 0; right: 0;
    height: 1px; background: var(--dialog-bg);
  }

  #speaker-name {
    font-size: 14px; color: var(--gold);
    letter-spacing: 0.15em;
    font-family: 'Shippori Mincho', serif;
  }
  #speaker-jp {
    font-size: 10px; color: #8a7a5a;
    letter-spacing: 0.1em;
  }

  /* 主對話框 */
  #dialog-box {
    background: var(--dialog-bg);
    border: 1px solid var(--dialog-border);
    padding: 16px 20px 14px;
    position: relative;
    min-height: 100px;
  }

  /* 裝飾角 */
  #dialog-box::before, #dialog-box::after {
    content: '◆';
    position: absolute;
    color: var(--gold);
    font-size: 8px;
    opacity: 0.6;
  }
  #dialog-box::before { top: 6px; left: 8px; }
  #dialog-box::after { bottom: 6px; right: 8px; }

  #dialog-text {
    color: #e8dfc8;
    font-size: 15px;
    line-height: 1.9;
    letter-spacing: 0.05em;
    min-height: 3em;
  }

  #dialog-text .jp-note {
    display: block;
    font-size: 11px;
    color: #8a7a5a;
    letter-spacing: 0.12em;
    margin-top: 4px;
    font-style: italic;
  }

  /* 繼續提示 */
  #next-hint {
    position: absolute; bottom: 10px; right: 16px;
    color: var(--gold); font-size: 13px;
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── 章節標題 ── */
  #chapter-title {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }
  #chapter-title.show { opacity: 1; pointer-events: all; }

  .chapter-jp {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px; color: #6b5a3a;
    letter-spacing: 0.4em;
    margin-bottom: 16px;
  }
  .chapter-main {
    font-size: 22px; color: var(--paper);
    letter-spacing: 0.2em;
    text-align: center;
    line-height: 1.6;
  }
  .chapter-line {
    width: 60px; height: 1px;
    background: var(--gold);
    margin: 20px auto;
    opacity: 0.6;
  }
  .chapter-sub {
    font-size: 12px; color: #6b5a3a;
    letter-spacing: 0.3em;
  }

  /* ── 特效：電話亮燈 ── */
  #phone-glow {
    position: absolute;
    bottom: 30%; left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 120px;
    background: radial-gradient(ellipse, rgba(60,220,120,0.3) 0%, transparent 70%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s ease;
    z-index: 2;
  }
  #phone-glow.on { opacity: 1; animation: glow-pulse 2s ease-in-out infinite; }
  @keyframes glow-pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

  /* ── 開始畫面 ── */
  #start-screen {
    position: absolute; inset: 0; z-index: 30;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }

  .title-deco {
    font-family: 'Shippori Mincho', serif;
    font-size: 11px; color: #4a3a22;
    letter-spacing: 0.5em;
    margin-bottom: 24px;
  }
  .game-title-jp {
    font-family: 'Shippori Mincho', serif;
    font-size: 28px; color: #c8b882;
    letter-spacing: 0.3em;
    text-align: center;
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .game-title-zh {
    font-size: 14px; color: #6b5030;
    letter-spacing: 0.4em;
    margin-bottom: 40px;
  }
  .title-rule {
    width: 1px; height: 60px;
    background: linear-gradient(to bottom, transparent, #6b4c1e, transparent);
    margin-bottom: 40px;
  }

  #start-btn {
    background: none;
    border: 1px solid #4a3a22;
    color: #c8b882;
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    letter-spacing: 0.4em;
    padding: 12px 36px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }
  #start-btn::before, #start-btn::after {
    content: '◇';
    position: absolute; top: 50%;
    transform: translateY(-50%);
    font-size: 8px; color: var(--gold);
    opacity: 0;
    transition: all 0.3s ease;
  }
  #start-btn::before { left: 12px; }
  #start-btn::after { right: 12px; }
  #start-btn:hover, #start-btn:active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(184,151,42,0.08);
  }
  #start-btn:hover::before, #start-btn:hover::after,
  #start-btn:active::before, #start-btn:active::after { opacity: 1; }

  .start-note {
    position: absolute; bottom: 30px;
    font-size: 10px; color: #3a2a10;
    letter-spacing: 0.3em;
    text-align: center;
  }

  /* ── 靜態雨絲（CSS粒子） ── */
  #rain-layer {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 1;
    overflow: hidden;
  }
  .raindrop {
    position: absolute;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(160,180,220,0.15));
    animation: fall linear infinite;
  }
  @keyframes fall {
    from { transform: translateY(-100px); }
    to { transform: translateY(110vh); }
  }

  /* ── 閃電效果 ── */
  #lightning {
    position: absolute; inset: 0;
    background: rgba(200,220,255,0.15);
    pointer-events: none; z-index: 3;
    opacity: 0;
  }
  #lightning.flash {
    animation: lightning-flash 0.3s ease;
  }
  @keyframes lightning-flash {
    0%{opacity:0} 20%{opacity:1} 40%{opacity:0} 60%{opacity:0.7} 100%{opacity:0}
  }

  /* ── 打字效果 ── */
  .typing-cursor::after {
    content: '|';
    animation: cursor-blink 0.7s step-end infinite;
    color: var(--gold);
  }
  @keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── 場景：1908年 ── */
  .scene-1908 #bg {
    background: linear-gradient(180deg, #0a0806 0%, #15100a 100%);
  }

  /* 手機點擊提示 */
  #tap-anywhere {
    position: absolute; bottom: 180px; left: 0; right: 0;
    text-align: center;
    font-size: 10px; color: #4a3a22;
    letter-spacing: 0.3em;
    animation: blink 2s ease-in-out infinite;
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>

<!-- 開始畫面 -->
<div id="start-screen">
  <div class="title-deco">國定古蹟臺中車站・實境解謎</div>
  <div class="game-title-jp">時の回廊</div>

  <button id="start-btn" onclick="startGame()">開始遊戲</button>

</div>

<!-- 主遊戲區 -->
<div id="game" class="scene-phonebooth scene-rain">
  <!-- 背景 -->
  <div id="bg">

  <!-- 雨絲層 -->
  <div id="rain-layer"></div>

  <!-- 閃電 -->

  <!-- 電話發光 -->
  <div id="phone-glow"></div>

  <!-- 立繪層 -->
  <div id="sprites">

    <div id="sprite-yuyan" class="sprite left hidden">
      <svg viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">

        <path d="M65 110 Q60 70 100 65 Q140 70 135 110 Q130 85 100 80 Q70 85 65 110Z" fill="#1a0a05"/>

    <!-- 語嫣（1908接線生裝扮） -->

        <!-- 盤髮裝飾 -->

        <path d="M130 200 Q125 220 130 240" stroke="#6a5a8a" stroke-width="2" fill="none" opacity="0.6"/>

        <rect x="58" y="108" width="10" height="16" rx="5" fill="#2a2010" opacity="0.9"/>

<script>
// ══════════════════════════════════════════
//  雨絲生成
// ══════════════════════════════════════════
function createRain() {
  const layer = document.getElementById('rain-layer');
  for (let i = 0; i < 60; i++) {
    const drop = document.createElement('div');
    drop.className = 'raindrop';
    const left = Math.random() * 110 - 5;
    const height = 40 + Math.random() * 80;
    const duration = 0.6 + Math.random() * 0.8;
    const delay = Math.random() * 2;
    drop.style.cssText = `left:${left}%;height:${height}px;top:-${height}px;animation-duration:${duration}s;animation-delay:-${delay}s;`;
    layer.appendChild(drop);
  }
}

// ══════════════════════════════════════════
//  閃電
// ══════════════════════════════════════════
function triggerLightning() {
  const el = document.getElementById('lightning');
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

// ══════════════════════════════════════════
//  劇本資料
// ══════════════════════════════════════════
const script = [
  // 章節0：現代篇
  { type: 'chapter', jp: '第一章　現代', main: '暴雨夜，\n路旁的電話亭', sub: '西元202X年' },

  { type: 'bg', scene: 'phonebooth rain' },
  { type: 'fx', action: 'lightning' },

  { type: 'dialog', speaker: '——', speakerJp: '', text: '路旁閃爍的燈下，有個人影跌跌撞撞地跑過，竄進貼著「停用」字條的電話亭內。', jp: '' },

  { type: 'sprite', id: 'sprite-yuyan', state: 'show', side: 'left' },

  { type: 'dialog', speaker: '語嫣', speakerJp: 'ユーイェン', text: '……哈、哈……淋死了。', jp: '…はぁ、はぁ…もう、ずぶ濡れ。' },
  { type: 'dialog', speaker: '語嫣', speakerJp: 'ユーイェン', text: '（掏出手機，訊號全無）\n——沒訊號？！', jp: '（スマホを取り出す──圏外）\n──電波がない？！' },
  { type: 'dialog', speaker: '語嫣', speakerJp: 'ユーイェン', text: '他一定很擔心了……', jp: 'きっと心配してるよね……' },

  { type: 'fx', action: 'phone-glow' },

  { type: 'dialog', speaker: '語嫣', speakerJp: 'ユーイェン', text: '（擦了擦眼睛）\n……咦？', jp: '（目をこすって）\n……あれ？' },
  { type: 'dialog', speaker: '語嫣', speakerJp: 'ユーイェン', text: '這個電話……故障的，怎麼亮著？', jp: 'この電話……故障してるのに、なぜ光ってる？' },
  { type: 'dialog', speaker: '語嫣', speakerJp: 'ユーイェン', text: '（鬼使神差地，她伸手拿起話筒）', jp: '（気づけば、受話器に手が伸びていた）' },

  { type: 'fx', action: 'lightning' },

  { type: 'dialog', speaker: '——', speakerJp: '', text: '冰冷的話筒貼上右耳的一瞬間——', jp: '冷たい受話器が耳に触れた瞬間──' },
  { type: 'dialog', speaker: '——', speakerJp: '', text: '一陣陰風驟來，窗外大雨漸漸停了。', jp: 'ひんやりとした風が吹き、外の雨が静まっていく。' },
  { type: 'dialog', speaker: '——', speakerJp: '', text: '露出原先隱藏在暴風雨中的……日式建築。', jp: '暴風雨に隠されていた……和風建築が姿を現す。' },

  // 時代切換
  { type: 'sprite', id: 'sprite-yuyan', state: 'hide' },
  { type: 'chapter', jp: '第二章　明治四十一年', main: '今年，是1908年\n民國前四年', sub: '臺中驛・電信室' },

  { type: 'bg', scene: '1908' },
  { type: 'sprite', id: 'sprite-yuyan-1908', state: 'show', side: 'left' },

  { type: 'dialog', speaker: '語嫣', speakerJp: 'ユーイェン', text: '（意識模糊，環顧四周）\n……這裡是？', jp: '（意識がぼやけている）\n……ここは？' },
  { type: 'dialog', speaker: '語嫣', speakerJp: 'ユーイェン', text: '（低頭，看見自己的手，以及……奇怪的裝扮）\n我……我是誰？', jp: '（自分の手を見る——見慣れない服装）\n私は……誰？' },
  { type: 'dialog', speaker: '——', speakerJp: '', text: '記憶像散落的紙片，零零碎碎。', jp: '記憶は散らばった紙片のように、ばらばらで。' },
  { type: 'dialog', speaker: '——', speakerJp: '', text: '她只記得一件事——有個人，在等她。', jp: 'ただ一つだけ覚えている——誰かが、彼女を待っている。' },
  { type: 'dialog', speaker: '語嫣', speakerJp: 'ユーイェン', text: '（桌上有一張摺疊的紙條）', jp: '（机の上に折りたたまれた紙切れがある）' },

  // 紙條出現
  { type: 'note', text: '妳醒了。\n\n別怕。妳需要做的事情都在這座車站裡。\n\n記住這個：\n\n    臺中驛・明治四十一年\n    縱貫鐵路，即將全線通車。\n\n從正面山牆開始找。\n\n——一個妳認識的人留',
    note_jp: 'あなたが目覚めた。\n怖がらないで。やるべきことは全てこの駅の中にある。\n覚えておいて——臺中驛、明治四十一年。\n縦貫鉄路、まもなく全線開通。\n正面の破風から探し始めよ。\n——あなたの知る人より' },

  { type: 'dialog', speaker: '語嫣', speakerJp: 'ユーイェン', text: '（她盯著紙條末尾那個未完成的名字，良久。）', jp: '（彼女は書き終えられていない名前をじっと見つめた。）' },
  { type: 'dialog', speaker: '語嫣', speakerJp: 'ユーイェン', text: '……好。', jp: '……わかった。' },

  // 結束 → 進入遊戲
  { type: 'end' }
];

// ══════════════════════════════════════════
//  引擎狀態
// ══════════════════════════════════════════
let cursor = 0;
let isTyping = false;
let currentFullText = '';
let typeTimer = null;
let waitingChapter = false;

function getEl(id) { return document.getElementById(id); }

// ══════════════════════════════════════════
//  打字效果
// ══════════════════════════════════════════
function typeText(el, text, jpText, callback) {
  isTyping = true;
  el.innerHTML = '';
  currentFullText = text;
  let i = 0;
  el.classList.add('typing-cursor');

  typeTimer = setInterval(() => {
    if (i < text.length) {
      el.innerHTML = text.substring(0, i + 1).replace(/\n/g, '<br>');
      if (jpText) el.innerHTML += `<span class="jp-note">${jpText.replace(/\n/g, '<br>')}</span>`;
      i++;
    } else {
      clearInterval(typeTimer);
      el.classList.remove('typing-cursor');
      isTyping = false;
      if (callback) callback();
    }
  }, 40);
}

function skipTyping() {
  if (typeTimer) clearInterval(typeTimer);
  const el = getEl('dialog-text');
  el.classList.remove('typing-cursor');
  const line = script[cursor - 1];
  if (line && line.text) {
    el.innerHTML = line.text.replace(/\n/g, '<br>');
    if (line.jp) el.innerHTML += `<span class="jp-note">${line.jp.replace(/\n/g, '<br>')}</span>`;
  }
  isTyping = false;
}

// ══════════════════════════════════════════
//  執行腳本行
// ══════════════════════════════════════════
function processLine() {
  if (cursor >= script.length) return;
  const line = script[cursor];
  cursor++;

  if (line.type === 'dialog') {
    showDialog(line);
  } else if (line.type === 'chapter') {
    showChapter(line, () => processLine());
  } else if (line.type === 'sprite') {
    handleSprite(line);
    processLine();
  } else if (line.type === 'bg') {
    handleBg(line);
    processLine();
  } else if (line.type === 'fx') {
    handleFx(line);
    processLine();
  } else if (line.type === 'note') {
    showNote(line);
  } else if (line.type === 'end') {
    showEnd();
  }
}

// ══════════════════════════════════════════
//  對話
// ══════════════════════════════════════════
function showDialog(line) {
  const nameEl = getEl('speaker-name');
  const jpEl = getEl('speaker-jp');
  const textEl = getEl('dialog-text');
  const speakerBox = getEl('speaker-box');

  nameEl.textContent = line.speaker;
  jpEl.textContent = line.speakerJp || '';
  speakerBox.style.display = line.speaker === '——' ? 'none' : 'flex';

  typeText(textEl, line.text, line.jp || '');
}

// ══════════════════════════════════════════
//  章節標題
// ══════════════════════════════════════════
function showChapter(line, callback) {
  waitingChapter = true;
  const el = getEl('chapter-title');
  getEl('ch-jp').textContent = line.jp;
  getEl('ch-main').innerHTML = line.main.replace(/\n/g, '<br>');
  getEl('ch-sub').textContent = line.sub || '';

  el.classList.add('show');
  getEl('tap-anywhere').style.display = 'block';

  // 3秒後自動或點擊繼續
  setTimeout(() => {
    el.classList.remove('show');
    waitingChapter = false;
    setTimeout(callback, 800);
  }, 3000);
}

// ══════════════════════════════════════════
//  立繪
// ══════════════════════════════════════════
function handleSprite(line) {
  const el = getEl(line.id);
  if (!el) return;
  if (line.state === 'show') {
    el.classList.remove('hidden', 'dim');
    el.classList.add(line.side);
  } else if (line.state === 'hide') {
    el.classList.add('hidden');
  } else if (line.state === 'dim') {
    el.classList.add('dim');
  }
}

// ══════════════════════════════════════════
//  背景
// ══════════════════════════════════════════
function handleBg(line) {
  const game = getEl('game');
  game.className = '';
  if (line.scene.includes('rain')) game.classList.add('scene-rain');
  if (line.scene.includes('1908')) game.classList.add('scene-1908');
  if (line.scene.includes('phonebooth')) game.classList.add('scene-phonebooth');
}

// ══════════════════════════════════════════
//  特效
// ══════════════════════════════════════════
function handleFx(line) {
  if (line.action === 'lightning') {
    setTimeout(triggerLightning, 100);
  } else if (line.action === 'phone-glow') {
    getEl('phone-glow').classList.add('on');
  }
}

// ══════════════════════════════════════════
//  紙條顯示
// ══════════════════════════════════════════
function showNote(line) {
  // 建立紙條彈窗
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:50;
    background:rgba(0,0,0,0.85);
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  `;

  const note = document.createElement('div');
  note.style.cssText = `
    background:#f0e4c4;
    border:1px solid #8a6a30;
    padding:24px 20px;
    max-width:340px;width:100%;
    box-shadow:0 0 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(180,150,80,0.1);
    position:relative;
    font-family:'Noto Serif TC',serif;
  `;

  // 紙條紋理
  note.innerHTML = `
    <div style="font-size:10px;color:#8a6030;letter-spacing:0.3em;margin-bottom:12px;border-bottom:1px solid #c4a060;padding-bottom:8px;">── 紙條 ──</div>
    <div style="font-size:14px;line-height:2;color:#2a1a08;white-space:pre-wrap;letter-spacing:0.05em;">${line.text}</div>
    <div style="font-size:10px;color:#8a7050;margin-top:12px;border-top:1px solid #c4a060;padding-top:8px;font-style:italic;white-space:pre-wrap;">${line.note_jp}</div>
    <div style="text-align:center;margin-top:16px;">
      <button onclick="this.closest('div[style*=fixed]').remove();processLine();" style="
        background:none;border:1px solid #8a6030;
        color:#5a3a10;padding:8px 24px;
        font-family:'Noto Serif TC',serif;font-size:12px;
        letter-spacing:0.3em;cursor:pointer;
      ">收下紙條</button>
    </div>
  `;

  overlay.appendChild(note);
  document.body.appendChild(overlay);
}

// ══════════════════════════════════════════
//  結尾
// ══════════════════════════════════════════
function showEnd() {
  const el = document.createElement('div');
  el.style.cssText = `
    position:fixed;inset:0;z-index:60;
    background:#000;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:16px;
  `;
  el.innerHTML = `
    <div style="font-family:'Shippori Mincho',serif;font-size:12px;color:#4a3a22;letter-spacing:0.4em;">序章・おわり</div>
    <div style="font-size:18px;color:#c8b882;letter-spacing:0.3em;">序章結束</div>
    <div style="width:40px;height:1px;background:#6b4c1e;margin:8px auto;"></div>
    <div style="font-size:11px;color:#4a3a22;letter-spacing:0.2em;">前往臺中車站，開始你的旅程</div>
    <button onclick="location.reload()" style="
      margin-top:24px;
      background:none;border:1px solid #4a3a22;
      color:#c8b882;padding:10px 28px;
      font-family:'Noto Serif TC',serif;font-size:12px;
      letter-spacing:0.3em;cursor:pointer;
    ">重新開始</button>
  `;
  document.body.appendChild(el);
}

// ══════════════════════════════════════════
//  點擊推進
// ══════════════════════════════════════════
function handleTap() {
  if (waitingChapter) return;
  if (isTyping) {
    skipTyping();
    return;
  }
  processLine();
}

document.getElementById('game').addEventListener('click', handleTap);
document.getElementById('game').addEventListener('touchend', (e) => {
  e.preventDefault();
  handleTap();
}, { passive: false });

// ══════════════════════════════════════════
//  開始
// ══════════════════════════════════════════
function startGame() {
  getEl('start-screen').style.opacity = '0';
  getEl('start-screen').style.transition = 'opacity 0.8s ease';
  setTimeout(() => {
    getEl('start-screen').style.display = 'none';
    createRain();

    // 隨機閃電
    setInterval(() => {
      if (Math.random() < 0.3) triggerLightning();
    }, 4000);

    processLine();
  }, 800);
}
</script>
</body>
</html>
