<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>臺中驛・時の回廊</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Shippori+Mincho:wght@400;600&display=swap');

:root {
  --gold: #d4a830;
  --gold-dim: #7a5520;
  --dialog-bg: rgba(6, 3, 1, 0.96);
  --dialog-border: #6a4418;
  --text-main: #f5ead0;
  --text-jp: #a09070;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'Noto Serif TC','Shippori Mincho',serif; background:#000; touch-action:manipulation; }

#game { position:relative; width:100%; height:100%; display:flex; flex-direction:column; justify-content:flex-end; }

/* ── 背景 ── */
#bg { position:absolute; inset:0; background:#060402; overflow:hidden; }

#phonebooth-scene { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
.street-bg { position:absolute; inset:0; background:linear-gradient(180deg,#04030a 0%,#0a0818 35%,#12100a 70%,#1a1208 100%); }
.city-silhouette { position:absolute; bottom:0; left:0; right:0; height:45%; background:linear-gradient(180deg,transparent 0%,#0d0c18 20%,#0d0c18 100%); }
.city-silhouette::before {
  content:''; position:absolute; bottom:0; left:0; right:0; height:100%;
  background:
    linear-gradient(#08071a,#08071a) 5% 60%/6% 40% no-repeat,
    linear-gradient(#08071a,#08071a) 14% 50%/4% 50% no-repeat,
    linear-gradient(#08071a,#08071a) 20% 55%/8% 45% no-repeat,
    linear-gradient(#08071a,#08071a) 30% 45%/5% 55% no-repeat,
    linear-gradient(#08071a,#08071a) 38% 58%/7% 42% no-repeat,
    linear-gradient(#08071a,#08071a) 50% 48%/10% 52% no-repeat,
    linear-gradient(#08071a,#08071a) 62% 53%/6% 47% no-repeat,
    linear-gradient(#08071a,#08071a) 70% 43%/8% 57% no-repeat,
    linear-gradient(#08071a,#08071a) 80% 60%/5% 40% no-repeat,
    linear-gradient(#08071a,#08071a) 88% 50%/7% 50% no-repeat;
}
.streetlight { position:absolute; bottom:30%; width:3px; height:35%; background:linear-gradient(to top,#3a3020,#2a2018); }
.streetlight::before { content:''; position:absolute; top:-2px; left:-18px; width:40px; height:8px; background:#2a2010; border-radius:2px 2px 0 0; }
.streetlight::after { content:''; position:absolute; top:-30px; left:-40px; width:80px; height:60px; background:radial-gradient(ellipse at 50% 10%,rgba(180,150,60,0.12) 0%,transparent 70%); border-radius:50%; }
.streetlight.left { left:12%; }
.streetlight.right { right:15%; }

/* 電話亭 */
#phone-booth { position:relative; width:min(180px,38vw); height:min(340px,70vh); margin-bottom:10%; z-index:3; }
.booth-roof { position:absolute; top:-14px; left:-8px; right:-8px; height:20px; background:linear-gradient(180deg,#2a1e0c,#1a1208); border:1px solid #3a2a10; border-radius:3px 3px 0 0; }
.booth-roof::after { content:'電話'; position:absolute; top:2px; left:50%; transform:translateX(-50%); font-size:9px; color:#6a5020; letter-spacing:0.2em; font-family:'Shippori Mincho',serif; }
.booth-body { position:absolute; inset:0; background:linear-gradient(135deg,#1a1208 0%,#0e0c08 50%,#1a1208 100%); border:2px solid #3a2a10; border-radius:4px 4px 0 0; }
.booth-glass { position:absolute; top:15%; left:10%; right:10%; bottom:5%; background:linear-gradient(135deg,rgba(100,120,160,0.08) 0%,rgba(80,100,140,0.04) 50%,rgba(100,120,160,0.08) 100%); border:1px solid rgba(100,120,160,0.15); }
.booth-phone { position:absolute; top:25%; left:50%; transform:translateX(-50%); width:55%; display:flex; flex-direction:column; align-items:center; gap:3px; }
.phone-body { width:100%; height:0; padding-bottom:70%; background:linear-gradient(180deg,#2a2010 0%,#1a1208 100%); border:1px solid #4a3010; border-radius:3px; position:relative; }
.phone-screen { position:absolute; top:15%; left:20%; right:20%; height:25%; background:rgba(0,180,80,0); border:1px solid rgba(0,180,80,0); transition:background 1.5s ease,border-color 1.5s ease; border-radius:2px; display:flex; align-items:center; justify-content:center; }
.phone-screen.on { background:rgba(0,180,80,0.15); border-color:rgba(0,180,80,0.3); box-shadow:0 0 8px rgba(0,180,80,0.2); }
.phone-screen-text { font-size:6px; color:rgba(60,220,120,0); transition:color 1.5s ease; }
.phone-screen.on .phone-screen-text { color:rgba(60,220,120,0.8); }
.phone-receiver { width:70%; height:6px; background:linear-gradient(90deg,#1a1008,#3a2810,#1a1008); border-radius:3px; position:relative; }
.phone-receiver::before,.phone-receiver::after { content:''; position:absolute; top:-3px; width:12px; height:12px; background:#0e0c08; border:1px solid #3a2810; border-radius:50%; }
.phone-receiver::before { left:0; }
.phone-receiver::after { right:0; }
.booth-sign { position:absolute; top:8%; left:50%; transform:translateX(-50%) rotate(-3deg); background:#f0e4c4; padding:2px 6px; font-size:8px; color:#3a1a08; border:1px solid #8a6030; white-space:nowrap; letter-spacing:0.1em; z-index:6; }
#phone-glow-overlay { position:absolute; inset:-20px; background:radial-gradient(ellipse at 50% 50%,rgba(60,220,120,0.0) 0%,transparent 70%); pointer-events:none; transition:background 2s ease; z-index:5; }
#phone-glow-overlay.glowing { background:radial-gradient(ellipse at 50% 50%,rgba(60,220,120,0.25) 0%,rgba(60,220,120,0.05) 50%,transparent 70%); animation:glow-pulse 2.5s ease-in-out infinite; }
@keyframes glow-pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }

/* 1908場景 */
#exchange-scene { position:absolute; inset:0; display:none; background:linear-gradient(180deg,#0a0806 0%,#120e08 100%); }
.exchange-wall { position:absolute; inset:0; background:linear-gradient(180deg,#1a1408 0%,#120e06 60%,transparent 100%); }
.exchange-floor { position:absolute; bottom:0; left:0; right:0; height:25%; background:linear-gradient(180deg,#1a1206,#0e0c06); border-top:1px solid #2a2010; }
.exchange-floor::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(90deg,transparent 0px,transparent 40px,rgba(60,40,10,0.3) 40px,rgba(60,40,10,0.3) 41px),repeating-linear-gradient(0deg,transparent 0px,transparent 20px,rgba(60,40,10,0.2) 20px,rgba(60,40,10,0.2) 21px); }
.wall-clock { position:absolute; top:5%; left:50%; transform:translateX(-50%); width:40px; height:40px; }
.clock-face { width:100%; height:100%; border-radius:50%; background:radial-gradient(circle,#f0e0c0 0%,#d4c090 100%); border:2px solid #3a2810; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.5); position:relative; }
.clock-hour,.clock-min { position:absolute; bottom:50%; left:50%; transform-origin:bottom center; background:#1a0a05; border-radius:2px; }
.clock-hour { width:2px; height:10px; margin-left:-1px; transform:rotate(90deg); }
.clock-min { width:1px; height:14px; margin-left:0; transform:rotate(30deg); }

/* 裝飾用交換機 */
#switchboard { position:absolute; bottom:22%; left:50%; transform:translateX(-50%); width:min(340px,90vw); background:linear-gradient(180deg,#2a1e0a 0%,#1a1206 100%); border:2px solid #4a3010; border-radius:4px 4px 0 0; padding:12px; box-shadow:0 -4px 20px rgba(0,0,0,0.6); }
.switchboard-label { text-align:center; font-family:'Shippori Mincho',serif; font-size:9px; color:#6a5020; letter-spacing:0.4em; margin-bottom:8px; }
.jack-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:4px; margin-bottom:10px; }
.jack { position:relative; aspect-ratio:1; background:radial-gradient(circle,#0a0806 40%,#1a1208 100%); border:1px solid #4a3010; border-radius:50%; cursor:pointer; transition:all 0.2s ease; display:flex; align-items:center; justify-content:center; }
.jack-label { font-size:6px; color:#4a3010; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%); white-space:nowrap; }
.drop-panel { display:flex; gap:6px; justify-content:center; margin-bottom:8px; }
.drop-indicator { width:16px; height:20px; background:linear-gradient(180deg,#2a1e0a,#1a1206); border:1px solid #3a2810; border-radius:2px; display:flex; align-items:center; justify-content:center; font-size:7px; color:#4a3010; transition:all 0.3s ease; }
.cord-area { display:flex; gap:6px; justify-content:center; }
.cord { display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; }
.cord-plug { width:8px; height:14px; background:linear-gradient(180deg,#c8b060,#8a7030); border-radius:2px 2px 4px 4px; border:1px solid #4a3010; }
.cord-label { font-size:7px; color:#6a5020; letter-spacing:0.1em; margin-top:4px; }
.talk-key { width:100%; margin-top:6px; background:linear-gradient(180deg,#2a1e0a,#1a1206); border:1px solid #4a3010; border-radius:2px; padding:4px; text-align:center; font-size:8px; color:#6a5020; letter-spacing:0.2em; font-family:'Shippori Mincho',serif; }

/* ── 雨 ── */
#rain-layer { position:absolute; inset:0; pointer-events:none; z-index:2; overflow:hidden; }
.raindrop { position:absolute; width:1px; background:linear-gradient(to bottom,transparent,rgba(160,180,220,0.22)); animation:fall linear infinite; }
@keyframes fall { from{transform:translateY(-120px)} to{transform:translateY(110vh)} }
#lightning { position:absolute; inset:0; background:rgba(200,220,255,0.15); pointer-events:none; z-index:4; opacity:0; }
#lightning.flash { animation:lflash 0.4s ease; }
@keyframes lflash { 0%{opacity:0} 15%{opacity:1} 35%{opacity:0} 55%{opacity:0.6} 100%{opacity:0} }

/* ── 立繪 ── */
#sprites { position:absolute; inset:0; display:flex; align-items:flex-end; pointer-events:none; z-index:5; }
.sprite { position:absolute; bottom:0; width:52vw; max-width:300px; transition:opacity 0.6s ease; filter:drop-shadow(0 0 24px rgba(0,0,0,0.95)); }
.sprite.left { left:-1vw; }
.sprite.hidden { opacity:0; }

/* ══ 對話框（放大、提亮） ══ */
#dialog-area {
  position:relative; z-index:10;
  padding:0 8px 14px;
  display:flex; flex-direction:column; gap:0;
}

#speaker-box {
  display:inline-flex; align-items:center; gap:10px;
  background:var(--dialog-bg);
  border:1px solid var(--dialog-border); border-bottom:none;
  padding:6px 18px; width:fit-content;
}
#speaker-name {
  font-size:16px;          /* 大 */
  color:#f0c840;           /* 亮金 */
  letter-spacing:0.2em;
  font-family:'Shippori Mincho',serif;
  font-weight:600;
}
#speaker-jp { font-size:11px; color:#9a8050; letter-spacing:0.1em; }

#dialog-box {
  background:var(--dialog-bg);
  border:1px solid var(--dialog-border);
  padding:16px 20px 20px;
  min-height:120px;        /* 更高 */
  position:relative;
}
#dialog-box::before { content:'◆'; position:absolute; top:6px; left:8px; color:var(--gold); font-size:8px; opacity:0.6; }
#dialog-box::after  { content:'◆'; position:absolute; bottom:6px; right:8px; color:var(--gold); font-size:8px; opacity:0.6; }

#dialog-text {
  color:#f5ead0;           /* 明亮米白 */
  font-size:17px;          /* 大 */
  line-height:2.0;
  letter-spacing:0.06em;
  min-height:3em;
}
#dialog-text .jp-note {
  display:block;
  font-size:12px;
  color:#b0956a;           /* 比之前亮很多 */
  letter-spacing:0.12em;
  margin-top:5px;
  font-style:italic;
  line-height:1.7;
}
#next-hint { position:absolute; bottom:8px; right:14px; color:var(--gold); font-size:14px; animation:blink 1.3s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

/* ══ 道具欄 ══ */
#inventory { position:fixed; bottom:0; left:0; right:0; z-index:20; transition:transform 0.4s cubic-bezier(0.4,0,0.2,1); transform:translateY(calc(100% - 40px)); }
#inventory.open { transform:translateY(0); }
#inv-handle { background:linear-gradient(90deg,#080604,#160e06,#080604); border:1px solid var(--gold-dim); border-bottom:none; padding:10px 16px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
.inv-handle-text { font-size:13px; color:var(--gold); letter-spacing:0.3em; font-family:'Shippori Mincho',serif; }
.inv-handle-arrow { font-size:11px; color:var(--gold-dim); transition:transform 0.3s ease; }
#inventory.open .inv-handle-arrow { transform:rotate(180deg); }
#inv-count { background:#8b2020; color:#f5e0c0; font-size:10px; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:600; }
#inv-content { background:linear-gradient(180deg,#0e0a06,#080604); border:1px solid var(--gold-dim); border-top:none; padding:12px; min-height:90px; display:flex; gap:10px; flex-wrap:wrap; }
.inv-item { width:64px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; transition:transform 0.2s ease; }
.inv-item:active { transform:scale(0.93); }
.inv-item-icon { width:56px; height:72px; background:linear-gradient(135deg,#f0e4c4,#d4c898); border:1px solid #8a6030; display:flex; align-items:center; justify-content:center; font-size:24px; box-shadow:2px 2px 8px rgba(0,0,0,0.5); position:relative; }
.inv-item-icon::after { content:''; position:absolute; inset:3px; border:1px solid rgba(180,150,80,0.2); }
.inv-item-name { font-size:10px; color:#a08050; letter-spacing:0.1em; text-align:center; }

/* ══ 章節標題 ══ */
#chapter-title { position:absolute; inset:0; z-index:25; background:#000; opacity:0; pointer-events:none; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity 0.9s ease; }
#chapter-title.show { opacity:1; pointer-events:all; }
.ch-jp { font-family:'Shippori Mincho',serif; font-size:12px; color:#5a4a2a; letter-spacing:0.5em; margin-bottom:18px; }
.ch-main { font-size:22px; color:#f0e8d5; letter-spacing:0.2em; text-align:center; line-height:1.7; }
.ch-line { width:50px; height:1px; background:var(--gold); margin:18px auto; opacity:0.5; }
.ch-sub { font-size:12px; color:#6a5a3a; letter-spacing:0.3em; }

/* ══ 紙條 ══ */
.note-overlay { position:fixed; inset:0; z-index:50; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; padding:20px; animation:fadein 0.4s ease; }
@keyframes fadein { from{opacity:0} to{opacity:1} }
.note-paper { background:linear-gradient(135deg,#f5ecd4 0%,#ecdfc0 50%,#f0e8cc 100%); border:1px solid #8a6030; padding:22px 20px; max-width:320px; width:100%; box-shadow:0 0 50px rgba(0,0,0,0.7),3px 3px 0 #8a6030; position:relative; font-family:'Noto Serif TC',serif; }
.note-paper::before { content:''; position:absolute; inset:8px; border:1px solid rgba(139,96,48,0.2); pointer-events:none; }
.note-title { font-size:11px; color:#8a6030; letter-spacing:0.4em; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid rgba(139,96,48,0.3); }
.note-body { font-size:14px; line-height:2.2; color:#1e1008; white-space:pre-wrap; letter-spacing:0.05em; }
.note-jp { font-size:11px; color:#8a7050; margin-top:12px; padding-top:8px; border-top:1px solid rgba(139,96,48,0.3); font-style:italic; white-space:pre-wrap; line-height:1.8; }
.note-btn { display:block; margin:16px auto 0; background:none; border:1px solid #8a6030; color:#5a3a10; padding:9px 28px; font-family:'Noto Serif TC',serif; font-size:12px; letter-spacing:0.3em; cursor:pointer; }
.note-btn:hover { background:rgba(139,96,48,0.1); }

/* ══════════════════════════════════════
   關卡一：接線生　完整版
══════════════════════════════════════ */
#stage-switchboard {
  position:fixed; inset:0; z-index:40;
  background:#060402;
  display:none; flex-direction:column;
  align-items:stretch;
  overflow:hidden;
}

/* 上半：來電資訊 + 交換機面板 */
.sb-top {
  flex:0 0 auto;
  padding:10px 12px 6px;
  border-bottom:1px solid #2a1a06;
}

/* 關卡標題 */
.sb-header {
  text-align:center;
  font-family:'Shippori Mincho',serif;
  font-size:12px; color:var(--gold);
  letter-spacing:0.4em;
  margin-bottom:8px;
  padding-bottom:6px;
  border-bottom:1px solid var(--gold-dim);
}

/* 來電橫幅 */
.incoming-banner {
  background:linear-gradient(90deg,#1a0e04,#2a1808,#1a0e04);
  border:1px solid #c87020;
  padding:8px 12px;
  margin-bottom:8px;
  display:flex; align-items:center; justify-content:space-between;
  border-radius:2px;
}
.incoming-banner.ringing { animation:ring-pulse 0.9s ease-in-out infinite; }
@keyframes ring-pulse { 0%,100%{border-color:#c87020} 50%{border-color:#f0b040;box-shadow:0 0 8px rgba(240,176,64,0.3)} }
.incoming-banner.connected { border-color:#30c090; animation:none; }
.incoming-banner.done { border-color:#4a8060; animation:none; opacity:0.7; }

.ib-left { display:flex; flex-direction:column; gap:2px; }
.ib-status { font-size:10px; color:#c87020; letter-spacing:0.2em; font-family:'Shippori Mincho',serif; }
.ib-number { font-size:15px; color:#f0d060; letter-spacing:0.15em; font-weight:600; }
.ib-name { font-size:12px; color:#d4a840; }
.ib-arrow { font-size:18px; color:#4a3010; }
.ib-right { display:flex; flex-direction:column; gap:2px; text-align:right; }
.ib-to-label { font-size:10px; color:#5a4020; letter-spacing:0.1em; }
.ib-to-name { font-size:13px; color:#c8a050; }

/* 進度 */
.sb-progress {
  display:flex; gap:6px; justify-content:center; margin-bottom:8px;
}
.sb-prog-dot {
  width:8px; height:8px; border-radius:50%;
  background:#2a1a06; border:1px solid #4a3010;
  transition:all 0.3s ease;
}
.sb-prog-dot.done { background:#c87020; border-color:#f0b040; }
.sb-prog-dot.active { background:#f0b040; border-color:#f0d080; box-shadow:0 0 4px rgba(240,176,64,0.5); animation:blink 1s ease-in-out infinite; }

/* 面板主體 */
.sb-panel {
  background:linear-gradient(180deg,#1e1608,#140e06);
  border:1px solid #3a2810;
  border-radius:3px;
  padding:8px 10px;
}

.sb-panel-label {
  font-size:9px; color:#6a5020; letter-spacing:0.4em;
  text-align:center; margin-bottom:6px;
  font-family:'Shippori Mincho',serif;
}

/* 插孔格（4×4） */
.sb-jacks {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:5px;
  margin-bottom:8px;
}

.sb-jack {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  cursor:pointer; padding:5px 3px;
  border:1px solid transparent; border-radius:3px;
  transition:all 0.2s ease;
  user-select:none;
}
.sb-jack:active { transform:scale(0.95); }
.sb-jack.ringing { border-color:#c87020; background:rgba(200,112,32,0.08); }
.sb-jack.selected { border-color:var(--gold); background:rgba(212,168,48,0.12); }
.sb-jack.plugged  { border-color:#208060; background:rgba(32,128,96,0.08); }
.sb-jack.correct  { border-color:#30c090; background:rgba(48,192,144,0.1); }

.sb-jack-hole {
  width:22px; height:22px;
  background:radial-gradient(circle,#050402 40%,#1a1208 100%);
  border:1.5px solid #3a2810; border-radius:50%;
  transition:all 0.3s ease; position:relative;
}
.sb-jack.ringing .sb-jack-hole  { border-color:#c87020; box-shadow:0 0 6px rgba(200,112,32,0.5); animation:jack-blink 0.8s ease-in-out infinite; }
.sb-jack.selected .sb-jack-hole { border-color:var(--gold); box-shadow:0 0 6px rgba(212,168,48,0.5); }
.sb-jack.plugged .sb-jack-hole  { background:radial-gradient(circle,#8a6020 0%,#2a1808 100%); border-color:#c8a030; }
.sb-jack.correct .sb-jack-hole  { background:radial-gradient(circle,#104030 40%,#0a1a14 100%); border-color:#30c090; box-shadow:0 0 5px rgba(48,192,144,0.4); }
@keyframes jack-blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* 插頭（已插入顯示） */
.sb-jack-hole::after {
  content:''; position:absolute; inset:3px; border-radius:50%;
  background:transparent; transition:all 0.3s ease;
}
.sb-jack.plugged .sb-jack-hole::after { background:radial-gradient(circle,#d4a030,transparent); }

.sb-jack-name {
  font-size:9px; color:#6a5030; text-align:center; line-height:1.3;
  transition:color 0.2s ease;
}
.sb-jack.ringing .sb-jack-name  { color:#d4a840; }
.sb-jack.selected .sb-jack-name { color:var(--gold); }
.sb-jack.correct .sb-jack-name  { color:#50c090; }

/* 跳線 */
.sb-cords {
  display:flex; gap:8px; justify-content:center;
  margin-bottom:8px; padding:6px 0;
  border-top:1px solid #2a1808; border-bottom:1px solid #2a1808;
}
.sb-cord {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  cursor:pointer; padding:4px 10px;

//  雨系統
// ══════════════════════════════════════════
let rainDrops = [], rainIntensity = 1.0;

function createRain(){
  const layer = document.getElementById('rain-layer');
  layer.innerHTML = '';
  rainDrops = [];
  for(let i=0;i<70;i++){
    const d = document.createElement('div');
    d.className = 'raindrop';
    const left = Math.random()*110-5;
    const h = 50+Math.random()*80;
    const dur = 0.5+Math.random()*0.7;
    const delay = -Math.random()*2;
    d.style.cssText = `left:${left}%;height:${h}px;top:-${h}px;animation-duration:${dur}s;animation-delay:${delay}s;opacity:1;`;
    layer.appendChild(d);
    rainDrops.push(d);
  }
}

function fadeRain(target, ms){
  const t0=Date.now(), from=rainIntensity;
  (function step(){
    const p=Math.min((Date.now()-t0)/ms,1);
    rainIntensity=from+(target-from)*p;
    rainDrops.forEach(d=>d.style.opacity=rainIntensity);
    if(p<1) requestAnimationFrame(step);
  })();
}

function lightning(){
  const el=document.getElementById('lightning');
  el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
}

let cursor=0, isTyping=false, typeTimer=null, waitChapter=false;
const inventory=[];

function $id(id){ return document.getElementById(id); }

function processLine(){
  if(cursor>=SCRIPT.length) return;
  const s=SCRIPT[cursor++];
  if(s.t==='chapter')   showChapter(s);
  else if(s.t==='narr') showDialog({who:'——',jp:'',text:s.text,jpTl:s.jpTl||''});
  else if(s.t==='line') showDialog(s);
  else if(s.t==='show') { $id(s.id).classList.remove('hidden'); processLine(); }
  else if(s.t==='hide') { $id(s.id).classList.add('hidden');    processLine(); }
  else if(s.t==='bg')   { switchBg(s.scene); processLine(); }
  else if(s.t==='fx')   { s.fn(); processLine(); }
  else if(s.t==='note') showNote(s);
  else if(s.t==='stage') launchStage(s.id);
}

function showDialog(s){
  const box=$id('speaker-box');
  $id('speaker-name').textContent=s.who;
  $id('speaker-jp').textContent=s.jp||'';
  box.style.display=s.who==='——'?'none':'flex';
  typeText($id('dialog-text'),s.text,s.jpTl||'');
}

function typeText(el,txt,jp){
  isTyping=true;
  if(typeTimer){ clearInterval(typeTimer); typeTimer=null; }
  el.innerHTML=''; let i=0;
  typeTimer=setInterval(()=>{
    if(i<txt.length){
      el.innerHTML=txt.substring(0,++i).replace(/\n/g,'<br>');
      if(jp) el.innerHTML+=`<span class="jp-note">${jp.replace(/\n/g,'<br>')}</span>`;
    } else {
      clearInterval(typeTimer); typeTimer=null; isTyping=false;
    }
  },36);
}

function skipType(){
  if(typeTimer){ clearInterval(typeTimer); typeTimer=null; }
  isTyping=false;
  const s=SCRIPT[cursor-1]; if(!s) return;
  const txt=s.text||''; const jp=s.jpTl||'';
  const el=$id('dialog-text');
  el.innerHTML=txt.replace(/\n/g,'<br>');
  if(jp) el.innerHTML+=`<span class="jp-note">${jp.replace(/\n/g,'<br>')}</span>`;
}

function showChapter(s){
  waitChapter=true;
  $id('ch-jp').textContent=s.jp;
  $id('ch-main').innerHTML=s.main.replace(/\n/g,'<br>');
  $id('ch-sub').textContent=s.sub||'';
  const ct=$id('chapter-title');
  ct.classList.add('show');
  setTimeout(()=>{ ct.classList.remove('show'); setTimeout(()=>{ waitChapter=false; processLine(); },900); },3200);
}

function switchBg(scene){
  $id('phonebooth-scene').style.display=scene==='phonebooth'?'flex':'none';
  $id('exchange-scene').style.display=scene==='1908'?'block':'none';
}

function showNote(s){
  const ov=document.createElement('div');
  ov.className='note-overlay';
  ov.innerHTML=`<div class="note-paper">
    <div class="note-title">── 紙條　手紙 ──</div>
    <div class="note-body">${s.body.replace(/\n/g,'<br>')}</div>
    <div class="note-jp">${s.jp.replace(/\n/g,'<br>')}</div>
    <button class="note-btn" onclick="collectNote(this.closest('.note-overlay'))">收下紙條　受け取る</button>
  </div>`;
  document.body.appendChild(ov);
}

function collectNote(ov){
  ov.remove();
  addItem('note','📜','神秘紙條');
  processLine();
}

function addItem(id,icon,name){
  if(inventory.find(i=>i.id===id)) return;
  inventory.push({id,icon,name});
  renderInventory();
}

function renderInventory(){
  $id('inv-count').textContent=inventory.length;
  const cont=$id('inv-content');
  if(!inventory.length){ cont.innerHTML='<div style="font-size:11px;color:#3a2a10;letter-spacing:0.2em;width:100%;text-align:center;padding:18px 0;">── 尚無道具 ──</div>'; return; }
  cont.innerHTML=inventory.map(i=>`<div class="inv-item" onclick="viewItem('${i.id}')"><div class="inv-item-icon">${i.icon}</div><div class="inv-item-name">${i.name}</div></div>`).join('');
}

function viewItem(id){
  if(id==='note'){
    const ov=document.createElement('div');
    ov.className='note-overlay';
    ov.innerHTML=`<div class="note-paper">
      <div class="note-title">── 紙條　手紙 ──</div>
      <div class="note-body">妳醒了。<br><br>別怕。<br><br>妳需要做的事情，都在這座城市裡。<br>就從這裡開始——<br><br>　臺中驛，明治四十一年。<br>　縱貫鐵路，即將全線通車。<br><br>先完成眼前的工作。<br>有人在等妳的消息。<br><br>　　　　　——一個妳認識的人</div>
      <button class="note-btn" onclick="this.closest('.note-overlay').remove()">關閉　閉じる</button>
    </div>`;
    document.body.appendChild(ov);
  }
}

function toggleInventory(){ $id('inventory').classList.toggle('open'); }

// ══════════════════════════════════════════
//  關卡一：接線生　四通電話
// ══════════════════════════════════════════

// 插孔定義（16個）
const JACKS=[
  {id:'j01',name:'三井物産\n二三番'},
  {id:'j02',name:'臺中驛\n四番'},
  {id:'j03',name:'臺灣銀行\n五番'},
  {id:'j04',name:'醉月樓\n六番'},
  {id:'j05',name:'郵便局\n七番'},
  {id:'j06',name:'彰化銀行\n八番'},
  {id:'j07',name:'帝國製糖\n九番'},
  {id:'j08',name:'長谷川醫院\n十番'},
  {id:'j09',name:'臺中廳\n十一番'},
  {id:'j10',name:'臺灣倉庫\n十二番'},
  {id:'j11',name:'臺中座\n十三番'},
  {id:'j12',name:'大和料理店\n十四番'},
  {id:'j13',name:'青果組合\n十五番'},
  {id:'j14',name:'臺中公園\n十六番'},
  {id:'j15',name:'警察署\n十七番'},
  {id:'j16',name:'臺中學校\n十八番'},
];

// 四通電話定義
const CALLS=[
  {
    fromId:'j01', toId:'j02',
    fromLabel:'三井物産・二三番', toLabel:'臺中驛・四番',
    dialogs:[
      {who:'三井物産　用戶',text:'もしもし？\n喂，是電話局嗎？\n請幫我接到臺中驛。',jp:'もしもし、臺中驛に繋いでください。'},
      {who:'語嫣（接線）',text:'もしもし、臺中電話交換局です。\n承知いたしました。少々お待ちください。\n（喂，臺中電話局，了解，請稍候。）',jp:'接通中…臺中驛已接通。'},
      {who:'臺中驛　站長',text:'もしもし、臺中驛です。\n（喂，臺中驛。）',jp:'通話完成。'},
    ]
  },
  {
    fromId:'j06', toId:'j03',
    fromLabel:'彰化銀行・八番', toLabel:'臺灣銀行・五番',
    dialogs:[
      {who:'彰化銀行　用戶',text:'喂，是交換局嗎？\n麻煩幫我接臺灣銀行臺中支店。',jp:'もしもし、臺灣銀行に繋いでください。'},
      {who:'語嫣（接線）',text:'承知いたしました。\n少々お待ちください。\n（好的，請稍候片刻。）',jp:'接続中……'},
      {who:'臺灣銀行　行員',text:'臺灣銀行でございます。\n（您好，這裡是臺灣銀行。）',jp:'両行の通話が繋がりました。'},
    ]
  },
  {
    fromId:'j09', toId:'j05',
    fromLabel:'臺中廳・十一番', toLabel:'郵便局・七番',
    dialogs:[
      {who:'臺中廳　官員',text:'交換局？\n我是臺中廳，請接郵便局，\n有急件要確認送達情況。',jp:'臺中庁です。郵便局に繋いでください。緊急です。'},
      {who:'語嫣（接線）',text:'はい、ただいま接続いたします。\n（是，馬上為您接通。）',jp:'接続中……'},
      {who:'郵便局　局員',text:'郵便局でございます。\n何用でしょうか。\n（您好，郵便局，請問有何貴幹？）',jp:'接続完了。通話どうぞ。'},
    ]
  },
  {
    fromId:'j13', toId:'j08',
    fromLabel:'青果組合・十五番', toLabel:'長谷川醫院・十番',
    dialogs:[
      {who:'青果組合　職員',text:'喂！快幫我接長谷川醫院！\n我們有個工人在搬貨時受傷了，\n情況很緊急！',jp:'もしもし！長谷川病院に繋いでください！怪我人が出ました！'},
      {who:'語嫣（接線）',text:'（立刻）承知いたしました！\n少々お待ちください！\n（馬上接通！）',jp:'緊急接続中！'},
      {who:'長谷川醫院　護士',text:'長谷川醫院です。\n（長谷川醫院，請說。）\n どうぞ。',jp:'接続しました。どうぞお話しください。'},
    ]
  },
];

let sbState={
  callIdx:0,
  step:0,         // 0=選跳線A 1=插發話方 2=選跳線B 3=插受話方 4=說話鍵 5=播對話 6=完成
  selectedCord:null,
  pluggedFrom:false,
  pluggedTo:false,
  dialogIdx:0,
  dialogRunning:false,
};

function launchStage(id){
  if(id!=='switchboard') return;
  $id('stage-switchboard').style.display='flex';
  buildSBProgress();
  loadCall(0);
}

function buildSBProgress(){
  const el=$id('sb-progress');
  el.innerHTML=CALLS.map((_,i)=>`<div class="sb-prog-dot ${i===0?'active':''}" id="prog-${i}"></div>`).join('');
}

function updateProgress(idx){
  CALLS.forEach((_,i)=>{
    const d=$id('prog-'+i);
    d.className='sb-prog-dot '+(i<idx?'done':i===idx?'active':'');
  });
}

function loadCall(idx){
  sbState={callIdx:idx,step:0,selectedCord:null,pluggedFrom:false,pluggedTo:false,dialogIdx:0,dialogRunning:false};
  const call=CALLS[idx];
  updateProgress(idx);

  // 更新來電橫幅
  const banner=$id('incoming-banner');
  banner.className='incoming-banner ringing';
  $id('ib-status').textContent='着信中　來電';
  $id('ib-number').textContent=call.fromLabel;
  $id('ib-name').textContent='';
  $id('ib-to-name').textContent=call.toLabel;

  // 重建插孔
  buildJacks(call);
  // 重建跳線
  buildCords();
  // 重設說話鍵
  const tb=$id('sb-talk-btn');
  tb.disabled=false; tb.classList.remove('active');
  // 清對話框
  $id('sb-dialog-box').innerHTML='';
  // 隱藏完成按鈕
  $id('sb-finish-btn').style.display='none';
  // 提示
  setHint('步驟 1 ／ 4　請選擇一條跳線（A 或 B）');
}

function buildJacks(call){
  const grid=$id('sb-jacks');
  grid.innerHTML='';
  JACKS.forEach(j=>{
    const div=document.createElement('div');
    const isFrom=j.id===call.fromId;
    div.className='sb-jack'+(isFrom?' ringing':'');
    div.id='sbj-'+j.id;
    div.innerHTML=`<div class="sb-jack-hole"></div><div class="sb-jack-name">${j.name}</div>`;
    div.onclick=()=>jackClicked(j.id);
    grid.appendChild(div);
  });
}

function buildCords(){
  const el=$id('sb-cords');
  el.innerHTML=['A','B'].map(l=>`
    <div class="sb-cord" id="cord-${l}" onclick="cordClicked('${l}')">
      <div class="sb-cord-plug"></div>
      <div class="sb-cord-wire"></div>
      <div class="sb-cord-name">跳線 ${l}</div>
    </div>`).join('');
}

function cordClicked(id){
  const step=sbState.step;
  // 只在 step 0（選A接發話）或 step 2（選B接受話）可選
  if(step!==0 && step!==2){ addMsg('系統','現在不需要選跳線。',''); return; }
  if($id('cord-'+id).classList.contains('used')) return;
  sbState.selectedCord=id;
  document.querySelectorAll('.sb-cord').forEach(c=>c.classList.remove('selected'));
  $id('cord-'+id).classList.add('selected');
  const call=CALLS[sbState.callIdx];
  if(step===0){
    setHint(`跳線 ${id} 已選定。\n步驟 2 ／ 4　請插入發話方插孔：${call.fromLabel}`);
    sbState.step=1;
  } else {
    setHint(`跳線 ${id} 已選定。\n步驟 4 ／ 4　請插入受話方插孔：${call.toLabel}`);
    sbState.step=3;
  }
}

function jackClicked(jid){
  const call=CALLS[sbState.callIdx];
  const step=sbState.step;

  if(step===1){
    // 插發話方
    if(jid===call.fromId){
      sbState.pluggedFrom=true;
      $id('sbj-'+jid).className='sb-jack plugged';
      $id('cord-'+sbState.selectedCord).classList.add('used');
      $id('cord-'+sbState.selectedCord).classList.remove('selected');
      sbState.selectedCord=null;
      sbState.step=2;
      setHint('步驟 3 ／ 4　請再選另一條跳線（A 或 B）');
      addMsg('系統','已插入發話方插孔。\n請再選一條跳線，接通受話方。','');
    } else {
      // 插錯
      flashWrongJack(jid);
    }
  } else if(step===3){
    // 插受話方
    if(jid===call.toId){
      sbState.pluggedTo=true;
      $id('sbj-'+jid).className='sb-jack plugged';
      $id('cord-'+sbState.selectedCord).classList.add('used');
      $id('cord-'+sbState.selectedCord).classList.remove('selected');
      sbState.step=4;
      const banner=$id('incoming-banner');
      banner.className='incoming-banner connected';
      $id('ib-status').textContent='接線中　接続中';
      setHint('步驟 4 ／ 4　兩端已接線。請按「說話鍵」開始通話。');
      addMsg('系統','兩端插孔均已插入。\n請按說話鍵，開始通話。','');
    } else if(jid===call.fromId){
      addMsg('系統','這個插孔已插線，請選受話方插孔。','');
    } else {
      flashWrongJack(jid);
    }
  } else {
    addMsg('系統','請先按步驟選跳線。','');
  }
}

function flashWrongJack(jid){
  const el=$id('sbj-'+jid);
  const orig=el.className;
  el.style.border='1.5px solid #c03030';
  el.style.background='rgba(192,48,48,0.1)';
  setTimeout(()=>{ el.style.border=''; el.style.background=''; },600);
  addMsg('系統','插孔有誤。請對照來電號碼，找到正確的插孔。','');
}

function pressTalk(){
  if(sbState.step!==4){
    addMsg('系統','請先完成接線再按說話鍵。',''); return;
  }
  sbState.step=5;
  $id('sb-talk-btn').classList.add('active');
  $id('sb-talk-btn').disabled=true;
  setHint('通話進行中……');
  runDialogs();
}

function runDialogs(){
  const call=CALLS[sbState.callIdx];
  const dialogs=call.dialogs;
  let di=0;
  function next(){
    if(di>=dialogs.length){
      // 通話完成
      callDone();
      return;
    }
    const d=dialogs[di++];
    addMsg(d.who,d.text,d.jp||'');
    setTimeout(next,2400);
  }
  next();
}

function callDone(){
  const call=CALLS[sbState.callIdx];
  sbState.step=6;
  // 插孔標為完成
  $id('sbj-'+call.fromId).className='sb-jack correct';
  $id('sbj-'+call.toId).className='sb-jack correct';
  // 橫幅
  const banner=$id('incoming-banner');
  banner.className='incoming-banner done';
  $id('ib-status').textContent='通話完成　完了';

  const isLast=sbState.callIdx===CALLS.length-1;
  setHint(isLast?'全部通話完成！關卡結束。':'通話完成。準備下一通電話。');
  addMsg('系統','——通話結束——','');

  const btn=$id('sb-finish-btn');
  btn.style.display='block';
  btn.textContent=isLast?'關卡完成　関卡クリア ✓':'下一通電話　次の通話 ▶';
}

function nextCall(){
  const next=sbState.callIdx+1;
  if(next>=CALLS.length){
    // 關卡結束
    $id('stage-switchboard').style.display='none';
    processLine();
  } else {
    loadCall(next);
  }
}

function setHint(txt){
  $id('sb-step-hint').innerHTML=txt.replace(/\n/g,'<br>');
}

function addMsg(who,text,jp){
  const box=$id('sb-dialog-box');
  const div=document.createElement('div');
  div.className='sb-msg';
  div.innerHTML=`<div class="sb-msg-who">【${who}】</div>
    <div class="sb-msg-text">${text.replace(/\n/g,'<br>')}</div>
    ${jp?`<div class="sb-msg-jp">${jp.replace(/\n/g,'<br>')}</div>`:''}`;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

// ══════════════════════════════════════════
//  裝飾面板
// ══════════════════════════════════════════
function buildDecoSwitchboard(){
  const dp=$id('drop-panel');
  for(let i=0;i<6;i++){ const d=document.createElement('div'); d.className='drop-indicator'; d.textContent=i+1; dp.appendChild(d); }
  const jg=$id('jack-grid');
  const names=['三井','驛','銀行','醉月','郵便','彰銀','製糖','醫院','廳','倉庫','劇場','料理','青果','公園','警察','學校'];
  for(let i=0;i<16;i++){ const j=document.createElement('div'); j.className='jack'; j.innerHTML=`<span class="jack-label">${names[i]||''}</span>`; jg.appendChild(j); }
  const ca=$id('cord-area');
  ['A','B','C'].forEach(l=>{ const c=document.createElement('div'); c.className='cord'; c.innerHTML=`<div class="cord-plug"></div><div class="cord-label">跳線${l}</div>`; ca.appendChild(c); });
}

// ══════════════════════════════════════════
//  點擊推進
// ══════════════════════════════════════════
function onTap(){
  if(waitChapter) return;
  if($id('stage-switchboard').style.display==='flex') return;
  if(isTyping){ skipType(); return; }
  processLine();
}
$id('game').addEventListener('click',onTap);
$id('game').addEventListener('touchend',e=>{ e.preventDefault(); onTap(); },{passive:false});

// ══════════════════════════════════════════
//  開始
// ══════════════════════════════════════════
function startGame(){
  const ss=$id('start-screen');
  ss.style.transition='opacity 0.9s ease'; ss.style.opacity='0';
  setTimeout(()=>{
    ss.style.display='none';
    createRain();
    buildDecoSwitchboard();
    switchBg('phonebooth');
    setInterval(()=>{ if(Math.random()<0.25) lightning(); },4500);
    processLine();
  },900);
}
