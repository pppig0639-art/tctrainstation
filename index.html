<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>臺中驛・時の回廊</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Shippori+Mincho:wght@400;600&display=swap');

:root {
  --ink: #1a1008;
  --paper: #f0e8d5;
  --accent: #8b2020;
  --gold: #b8972a;
  --gold-dim: #6b4c1e;
  --dialog-bg: rgba(8, 5, 2, 0.92);
  --dialog-border: #5a3c10;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'Noto Serif TC','Shippori Mincho',serif; background:#000; touch-action:manipulation; }

/* ── 遊戲容器 ── */
#game { position:relative; width:100%; height:100%; display:flex; flex-direction:column; justify-content:flex-end; }

/* ── 背景層 ── */
#bg { position:absolute; inset:0; background:#080504; overflow:hidden; }

/* 電話亭場景 */
#phonebooth-scene {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
}

/* 夜街背景 */
.street-bg {
  position:absolute; inset:0;
  background: linear-gradient(180deg, #04030a 0%, #0a0818 35%, #12100a 70%, #1a1208 100%);
}

/* 遠景建築輪廓 */
.city-silhouette {
  position:absolute; bottom:0; left:0; right:0; height:45%;
  background: linear-gradient(180deg,
    transparent 0%,
    #0d0c18 20%,
    #0d0c18 100%
  );
}
.city-silhouette::before {
  content:'';
  position:absolute; bottom:0; left:0; right:0; height:100%;
  background:
    linear-gradient(#08071a,#08071a) 5% 60% / 6% 40% no-repeat,
    linear-gradient(#08071a,#08071a) 14% 50% / 4% 50% no-repeat,
    linear-gradient(#08071a,#08071a) 20% 55% / 8% 45% no-repeat,
    linear-gradient(#08071a,#08071a) 30% 45% / 5% 55% no-repeat,
    linear-gradient(#08071a,#08071a) 38% 58% / 7% 42% no-repeat,
    linear-gradient(#08071a,#08071a) 50% 48% / 10% 52% no-repeat,
    linear-gradient(#08071a,#08071a) 62% 53% / 6% 47% no-repeat,
    linear-gradient(#08071a,#08071a) 70% 43% / 8% 57% no-repeat,
    linear-gradient(#08071a,#08071a) 80% 60% / 5% 40% no-repeat,
    linear-gradient(#08071a,#08071a) 88% 50% / 7% 50% no-repeat;
}

/* 路燈光暈 */
.streetlight {
  position:absolute;
  bottom:30%;
  width:3px; height:35%;
  background:linear-gradient(to top, #3a3020, #2a2018);
}
.streetlight::before {
  content:'';
  position:absolute; top:-2px; left:-18px;
  width:40px; height:8px;
  background:#2a2010;
  border-radius:2px 2px 0 0;
}
.streetlight::after {
  content:'';
  position:absolute; top:-30px; left:-40px;
  width:80px; height:60px;
  background:radial-gradient(ellipse at 50% 10%, rgba(180,150,60,0.12) 0%, transparent 70%);
  border-radius:50%;
}
.streetlight.left { left:12%; }
.streetlight.right { right:15%; }

/* 電話亭主體（CSS精細繪製） */
#phone-booth {
  position:relative;
  width:min(180px, 38vw);
  height:min(340px, 70vh);
  margin-bottom:10%;
  z-index:3;
}

.booth-body {
  position:absolute; inset:0;
  background:linear-gradient(135deg, #1a1208 0%, #0e0c08 50%, #1a1208 100%);
  border:2px solid #3a2a10;
  border-radius:4px 4px 0 0;
}

/* 亭頂 */
.booth-roof {
  position:absolute; top:-14px; left:-8px; right:-8px; height:20px;
  background:linear-gradient(180deg, #2a1e0c, #1a1208);
  border:1px solid #3a2a10;
  border-radius:3px 3px 0 0;
}
.booth-roof::after {
  content:'電話';
  position:absolute; top:2px; left:50%; transform:translateX(-50%);
  font-size:9px; color:#6a5020; letter-spacing:0.2em;
  font-family:'Shippori Mincho',serif;
}

/* 亭門玻璃 */
.booth-glass {
  position:absolute; top:15%; left:10%; right:10%; bottom:5%;
  background:linear-gradient(135deg,
    rgba(100,120,160,0.08) 0%,
    rgba(80,100,140,0.04) 50%,
    rgba(100,120,160,0.08) 100%
  );
  border:1px solid rgba(100,120,160,0.15);
}

/* 電話機（亭內） */
.booth-phone {
  position:absolute; top:25%; left:50%; transform:translateX(-50%);
  width:55%; display:flex; flex-direction:column; align-items:center; gap:3px;
}
.phone-body {
  width:100%; height:0; padding-bottom:70%;
  background:linear-gradient(180deg, #2a2010 0%, #1a1208 100%);
  border:1px solid #4a3010;
  border-radius:3px;
  position:relative;
}
.phone-receiver {
  width:70%; height:6px;
  background:linear-gradient(90deg, #1a1008, #3a2810, #1a1008);
  border-radius:3px;
  position:relative;
}
.phone-receiver::before, .phone-receiver::after {
  content:'';
  position:absolute; top:-3px;
  width:12px; height:12px;
  background:#0e0c08;
  border:1px solid #3a2810;
  border-radius:50%;
}
.phone-receiver::before { left:0; }
.phone-receiver::after { right:0; }

/* 電話亮燈效果 */
#phone-glow-overlay {
  position:absolute; inset:-20px;
  background:radial-gradient(ellipse at 50% 50%, rgba(60,220,120,0.0) 0%, transparent 70%);
  pointer-events:none;
  transition:background 2s ease;
  z-index:5;
}
#phone-glow-overlay.glowing {
  background:radial-gradient(ellipse at 50% 50%, rgba(60,220,120,0.25) 0%, rgba(60,220,120,0.05) 50%, transparent 70%);
  animation:glow-pulse 2.5s ease-in-out infinite;
}
@keyframes glow-pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }

/* 螢幕綠光 */
.phone-screen {
  position:absolute; top:15%; left:20%; right:20%; height:25%;
  background:rgba(0,180,80,0);
  border:1px solid rgba(0,180,80,0);
  transition: background 1.5s ease, border-color 1.5s ease;
  border-radius:2px;
  display:flex; align-items:center; justify-content:center;
}
.phone-screen.on {
  background:rgba(0,180,80,0.15);
  border-color:rgba(0,180,80,0.3);
  box-shadow:0 0 8px rgba(0,180,80,0.2);
}
.phone-screen-text {
  font-size:6px; color:rgba(60,220,120,0);
  letter-spacing:0.1em;
  transition:color 1.5s ease;
}
.phone-screen.on .phone-screen-text { color:rgba(60,220,120,0.8); }

/* 故障標籤 */
.booth-sign {
  position:absolute; top:8%; left:50%; transform:translateX(-50%) rotate(-3deg);
  background:#f0e4c4;
  padding:2px 6px;
  font-size:8px; color:#3a1a08;
  border:1px solid #8a6030;
  white-space:nowrap;
  letter-spacing:0.1em;
  z-index:6;
}

/* ══ 1908 電話交換局場景 ══ */
#exchange-scene {
  position:absolute; inset:0;
  display:none;
  background:linear-gradient(180deg, #0a0806 0%, #120e08 100%);
}

.exchange-room {
  position:absolute; inset:0;
  display:flex; align-items:flex-end; justify-content:center;
}

/* 地板 */
.exchange-floor {
  position:absolute; bottom:0; left:0; right:0; height:25%;
  background:linear-gradient(180deg, #1a1206, #0e0c06);
  border-top:1px solid #2a2010;
}
.exchange-floor::before {
  content:'';
  position:absolute; inset:0;
  background:repeating-linear-gradient(
    90deg, transparent 0px, transparent 40px, rgba(60,40,10,0.3) 40px, rgba(60,40,10,0.3) 41px
  ),
  repeating-linear-gradient(
    0deg, transparent 0px, transparent 20px, rgba(60,40,10,0.2) 20px, rgba(60,40,10,0.2) 21px
  );
}

/* 牆壁 */
.exchange-wall {
  position:absolute; inset:0;
  background:linear-gradient(180deg, #1a1408 0%, #120e06 60%, transparent 100%);
}

/* 時鐘 */
.wall-clock {
  position:absolute; top:5%; left:50%; transform:translateX(-50%);
  width:40px; height:40px;
}
.clock-face {
  width:100%; height:100%;
  border-radius:50%;
  background:radial-gradient(circle, #f0e0c0 0%, #d4c090 100%);
  border:2px solid #3a2810;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
  position:relative;
}
.clock-hour, .clock-min {
  position:absolute; bottom:50%; left:50%;
  transform-origin:bottom center;
  background:#1a0a05;
  border-radius:2px;
}
.clock-hour { width:2px; height:10px; margin-left:-1px; transform:rotate(90deg); }
.clock-min  { width:1px; height:14px; margin-left:0; transform:rotate(30deg); }

/* 交換機主體 */
#switchboard {
  position:absolute;
  bottom:22%;
  left:50%; transform:translateX(-50%);
  width:min(340px, 90vw);
  background:linear-gradient(180deg, #2a1e0a 0%, #1a1206 100%);
  border:2px solid #4a3010;
  border-radius:4px 4px 0 0;
  padding:12px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.6);
}

.switchboard-label {
  text-align:center;
  font-family:'Shippori Mincho',serif;
  font-size:9px; color:#6a5020; letter-spacing:0.4em;
  margin-bottom:8px;
}

/* 插孔格 */
.jack-grid {
  display:grid;
  grid-template-columns:repeat(8, 1fr);
  gap:4px;
  margin-bottom:10px;
}

.jack {
  position:relative;
  aspect-ratio:1;
  background:radial-gradient(circle, #0a0806 40%, #1a1208 100%);
  border:1px solid #4a3010;
  border-radius:50%;
  cursor:pointer;
  transition:all 0.2s ease;
  display:flex; align-items:center; justify-content:center;
}
.jack:hover { border-color:var(--gold); box-shadow:0 0 4px rgba(184,151,42,0.3); }
.jack.lit {
  background:radial-gradient(circle, #c87020 0%, #6a3808 60%, #1a1208 100%);
  border-color:#c87020;
  box-shadow:0 0 6px rgba(200,112,32,0.5);
  animation:jack-blink 0.8s ease-in-out infinite;
}
.jack.connected {
  background:radial-gradient(circle, #208060 0%, #104030 60%, #0a1a14 100%);
  border-color:#30c090;
}
@keyframes jack-blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

.jack-label {
  font-size:6px; color:#4a3010;
  position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
  white-space:nowrap; letter-spacing:0.05em;
}

/* 掉牌指示燈 */
.drop-panel {
  display:flex; gap:6px; justify-content:center; margin-bottom:8px;
}
.drop-indicator {
  width:16px; height:20px;
  background:linear-gradient(180deg, #2a1e0a, #1a1206);
  border:1px solid #3a2810;
  border-radius:2px;
  display:flex; align-items:center; justify-content:center;
  font-size:7px; color:#4a3010;
  transition:all 0.3s ease;
}
.drop-indicator.dropped {
  background:linear-gradient(180deg, #c87020, #8a4010);
  border-color:#c87020;
  color:#f0d080;
  animation:drop-fall 0.3s ease;
}
@keyframes drop-fall { from{transform:scaleY(0)} to{transform:scaleY(1)} }

/* 跳線 */
.cord-area {
  display:flex; gap:6px; justify-content:center;
}
.cord {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  cursor:pointer;
}
.cord-plug {
  width:8px; height:14px;
  background:linear-gradient(180deg, #c8b060, #8a7030);
  border-radius:2px 2px 4px 4px;
  border:1px solid #4a3010;
  transition:all 0.2s ease;
  position:relative;
}
.cord-plug::after {
  content:'';
  position:absolute; bottom:-6px; left:50%; transform:translateX(-50%);
  width:2px; height:6px;
  background:repeating-linear-gradient(180deg, #4a3010 0px, #4a3010 2px, #6a5020 2px, #6a5020 4px);
}
.cord-plug:hover { box-shadow:0 0 4px rgba(200,176,96,0.5); }
.cord-plug.selected { box-shadow:0 0 8px rgba(200,176,96,0.8); border-color:var(--gold); }
.cord-label { font-size:7px; color:#6a5020; letter-spacing:0.1em; margin-top:4px; }

/* 說話鍵 */
.talk-key {
  width:100%; margin-top:6px;
  background:linear-gradient(180deg, #2a1e0a, #1a1206);
  border:1px solid #4a3010;
  border-radius:2px;
  padding:4px;
  text-align:center;
  font-size:8px; color:#6a5020; letter-spacing:0.2em;
  cursor:pointer;
  transition:all 0.2s ease;
  font-family:'Shippori Mincho',serif;
}
.talk-key:active, .talk-key.pressed {
  background:linear-gradient(180deg, #4a3010, #2a1e0a);
  color:var(--gold);
}

/* ══ 雨層 ══ */
#rain-layer { position:absolute; inset:0; pointer-events:none; z-index:2; overflow:hidden; }
.raindrop {
  position:absolute; width:1px;
  background:linear-gradient(to bottom, transparent, rgba(160,180,220,0.2));
  animation:fall linear infinite;
}
@keyframes fall { from{transform:translateY(-120px)} to{transform:translateY(110vh)} }

/* 閃電 */
#lightning { position:absolute; inset:0; background:rgba(200,220,255,0.15); pointer-events:none; z-index:4; opacity:0; }
#lightning.flash { animation:lflash 0.4s ease; }
@keyframes lflash { 0%{opacity:0} 15%{opacity:1} 35%{opacity:0} 55%{opacity:0.6} 100%{opacity:0} }

/* ══ 立繪 ══ */
#sprites { position:absolute; inset:0; display:flex; align-items:flex-end; pointer-events:none; z-index:5; }
.sprite { position:absolute; bottom:0; width:52vw; max-width:300px; transition:opacity 0.6s ease, filter 0.6s ease; filter:drop-shadow(0 0 20px rgba(0,0,0,0.9)); }
.sprite.left { left:-1vw; }
.sprite.right { right:-1vw; transform:scaleX(-1); }
.sprite.hidden { opacity:0; }
.sprite.dim { filter:brightness(0.35) drop-shadow(0 0 20px rgba(0,0,0,0.9)); }

/* ══ 對話框 ══ */
#dialog-area { position:relative; z-index:10; padding:0 10px 16px; display:flex; flex-direction:column; gap:0; }

#speaker-box {
  display:inline-flex; align-items:center; gap:8px;
  background:var(--dialog-bg);
  border:1px solid var(--dialog-border); border-bottom:none;
  padding:5px 16px; width:fit-content;
}
#speaker-name { font-size:13px; color:var(--gold); letter-spacing:0.2em; font-family:'Shippori Mincho',serif; }
#speaker-jp { font-size:9px; color:#6a5a3a; letter-spacing:0.1em; }

#dialog-box {
  background:var(--dialog-bg);
  border:1px solid var(--dialog-border);
  padding:14px 18px 16px;
  min-height:90px; position:relative;
}
#dialog-box::before { content:'◆'; position:absolute; top:5px; left:7px; color:var(--gold); font-size:7px; opacity:0.5; }
#dialog-box::after  { content:'◆'; position:absolute; bottom:5px; right:7px; color:var(--gold); font-size:7px; opacity:0.5; }

#dialog-text { color:#ddd3b8; font-size:14px; line-height:1.95; letter-spacing:0.04em; min-height:2.5em; }
#dialog-text .jp-note { display:block; font-size:10px; color:#7a6a48; letter-spacing:0.1em; margin-top:3px; font-style:italic; }

#next-hint { position:absolute; bottom:8px; right:14px; color:var(--gold); font-size:12px; animation:blink 1.3s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

/* ══ 道具欄 ══ */
#inventory {
  position:fixed; bottom:0; left:0; right:0; z-index:20;
  transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);
  transform:translateY(calc(100% - 36px));
}
#inventory.open { transform:translateY(0); }

#inv-handle {
  background:linear-gradient(90deg, #0a0604, #1a1008, #0a0604);
  border:1px solid var(--gold-dim); border-bottom:none;
  padding:8px 16px;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer;
}
.inv-handle-text { font-size:11px; color:var(--gold); letter-spacing:0.3em; font-family:'Shippori Mincho',serif; }
.inv-handle-arrow { font-size:10px; color:var(--gold-dim); transition:transform 0.3s ease; }
#inventory.open .inv-handle-arrow { transform:rotate(180deg); }

#inv-count {
  background:var(--accent); color:#f0e0c0;
  font-size:9px; width:16px; height:16px;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
}

#inv-content {
  background:linear-gradient(180deg, #0e0a06, #0a0604);
  border:1px solid var(--gold-dim); border-top:none;
  padding:12px;
  min-height:100px;
  display:flex; gap:10px; flex-wrap:wrap;
}

.inv-item {
  width:64px; display:flex; flex-direction:column; align-items:center; gap:4px;
  cursor:pointer;
  transition:transform 0.2s ease;
}
.inv-item:active { transform:scale(0.95); }
.inv-item-icon {
  width:56px; height:72px;
  background:linear-gradient(135deg, #f0e4c4, #d4c898);
  border:1px solid #8a6030;
  display:flex; align-items:center; justify-content:center;
  font-size:22px;
  box-shadow:2px 2px 8px rgba(0,0,0,0.5), inset 0 0 10px rgba(180,150,80,0.1);
  position:relative;
}
.inv-item-icon::after {
  content:'';
  position:absolute; inset:3px;
  border:1px solid rgba(180,150,80,0.2);
}
.inv-item-name { font-size:9px; color:#8a7050; letter-spacing:0.1em; text-align:center; }

/* ══ 章節標題 ══ */
#chapter-title {
  position:absolute; inset:0; z-index:25;
  background:#000; opacity:0; pointer-events:none;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity 0.9s ease;
}
#chapter-title.show { opacity:1; pointer-events:all; }
.ch-jp { font-family:'Shippori Mincho',serif; font-size:11px; color:#4a3a22; letter-spacing:0.5em; margin-bottom:18px; }
.ch-main { font-size:20px; color:var(--paper); letter-spacing:0.2em; text-align:center; line-height:1.7; }
.ch-line { width:50px; height:1px; background:var(--gold); margin:18px auto; opacity:0.5; }
.ch-sub { font-size:11px; color:#5a4a2a; letter-spacing:0.3em; }

/* ══ 紙條彈窗 ══ */
.note-overlay {
  position:fixed; inset:0; z-index:50;
  background:rgba(0,0,0,0.88);
  display:flex; align-items:center; justify-content:center;
  padding:20px;
  animation:fadein 0.4s ease;
}
@keyframes fadein { from{opacity:0} to{opacity:1} }

.note-paper {
  background:linear-gradient(135deg, #f5ecd4 0%, #ecdfc0 50%, #f0e8cc 100%);
  border:1px solid #8a6030;
  padding:20px 18px;
  max-width:320px; width:100%;
  box-shadow:0 0 50px rgba(0,0,0,0.7), 3px 3px 0 #8a6030, inset 0 0 30px rgba(180,150,80,0.08);
  position:relative;
  font-family:'Noto Serif TC',serif;
}
.note-paper::before {
  content:'';
  position:absolute; inset:8px;
  border:1px solid rgba(139,96,48,0.2);
  pointer-events:none;
}
.note-title { font-size:10px; color:#8a6030; letter-spacing:0.4em; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid rgba(139,96,48,0.3); }
.note-body { font-size:13px; line-height:2.1; color:#2a1a08; white-space:pre-wrap; letter-spacing:0.04em; }
.note-jp { font-size:10px; color:#8a7050; margin-top:10px; padding-top:8px; border-top:1px solid rgba(139,96,48,0.3); font-style:italic; white-space:pre-wrap; line-height:1.7; }
.note-btn {
  display:block; margin:14px auto 0;
  background:none; border:1px solid #8a6030;
  color:#5a3a10; padding:8px 28px;
  font-family:'Noto Serif TC',serif; font-size:11px; letter-spacing:0.3em;
  cursor:pointer; transition:all 0.2s ease;
}
.note-btn:hover { background:rgba(139,96,48,0.1); }

/* ══ 關卡一：接線生 ══ */
#stage-switchboard {
  position:fixed; inset:0; z-index:40;
  background:rgba(0,0,0,0.95);
  display:none; flex-direction:column;
  align-items:center; justify-content:flex-start;
  padding:12px;
  overflow-y:auto;
}

.stage-header {
  width:100%; text-align:center;
  font-family:'Shippori Mincho',serif;
  font-size:11px; color:var(--gold);
  letter-spacing:0.4em; margin-bottom:8px;
  padding-bottom:8px;
  border-bottom:1px solid var(--gold-dim);
}

.incoming-call {
  background:linear-gradient(135deg, #1a1208, #0e0c06);
  border:1px solid #c87020;
  padding:10px 14px; width:100%; margin-bottom:10px;
  border-radius:2px;
  animation:call-alert 1s ease-in-out infinite;
}
@keyframes call-alert { 0%,100%{border-color:#c87020} 50%{border-color:#f0a030} }

.call-from { font-size:10px; color:#8a6030; letter-spacing:0.2em; margin-bottom:4px; }
.call-number { font-size:14px; color:var(--gold); letter-spacing:0.2em; font-family:'Shippori Mincho',serif; }
.call-name { font-size:11px; color:#c8a050; margin-top:2px; }

/* 交換機面板（遊戲用） */
.game-switchboard {
  width:100%;
  background:linear-gradient(180deg, #1e1608 0%, #140e06 100%);
  border:2px solid #4a3010;
  border-radius:4px; padding:10px;
  margin-bottom:10px;
}

.gsb-label { font-size:9px; color:#6a5020; letter-spacing:0.3em; text-align:center; margin-bottom:8px; font-family:'Shippori Mincho',serif; }

.gsb-jacks {
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:6px; margin-bottom:10px;
}

.gsb-jack {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  cursor:pointer;
  padding:4px 2px;
  border:1px solid transparent;
  border-radius:2px;
  transition:all 0.2s ease;
}
.gsb-jack:hover { border-color:var(--gold-dim); background:rgba(184,151,42,0.05); }
.gsb-jack.target { border-color:#c87020; background:rgba(200,112,32,0.08); }
.gsb-jack.selected { border-color:var(--gold); background:rgba(184,151,42,0.1); }
.gsb-jack.correct { border-color:#30c090; background:rgba(48,192,144,0.08); }

.gsb-jack-hole {
  width:18px; height:18px;
  background:radial-gradient(circle, #050402 40%, #1a1208 100%);
  border:1px solid #4a3010;
  border-radius:50%;
  position:relative;
  transition:all 0.3s ease;
}
.gsb-jack.target .gsb-jack-hole { border-color:#c87020; box-shadow:0 0 5px rgba(200,112,32,0.4); animation:jack-blink 0.8s ease-in-out infinite; }
.gsb-jack.selected .gsb-jack-hole { border-color:var(--gold); box-shadow:0 0 5px rgba(184,151,42,0.5); }
.gsb-jack.correct .gsb-jack-hole { background:radial-gradient(circle, #104030 40%, #0a1a14 100%); border-color:#30c090; box-shadow:0 0 5px rgba(48,192,144,0.4); }

.gsb-jack-name { font-size:8px; color:#5a4010; letter-spacing:0.05em; text-align:center; line-height:1.2; }
.gsb-jack.target .gsb-jack-name { color:#c8a050; }

.gsb-cords { display:flex; gap:8px; justify-content:center; margin-bottom:8px; }
.gsb-cord {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; padding:4px 8px;
  border:1px solid #3a2810; border-radius:2px;
  transition:all 0.2s ease;
}
.gsb-cord:hover { border-color:var(--gold-dim); }
.gsb-cord.selected { border-color:var(--gold); background:rgba(184,151,42,0.1); }
.gsb-cord-plug {
  width:10px; height:16px;
  background:linear-gradient(180deg, #c8b060, #8a7030);
  border-radius:2px 2px 3px 3px;
  border:1px solid #4a3010;
}
.gsb-cord-line {
  width:2px; height:20px;
  background:repeating-linear-gradient(180deg, #4a3010 0px, #4a3010 3px, #6a5020 3px, #6a5020 6px);
}
.gsb-cord-name { font-size:8px; color:#6a5020; letter-spacing:0.1em; }

.gsb-talk-btn {
  width:100%; padding:8px;
  background:linear-gradient(180deg, #2a1e0a, #1a1206);
  border:1px solid #4a3010; border-radius:2px;
  color:#6a5020; font-size:10px; letter-spacing:0.3em;
  font-family:'Shippori Mincho',serif;
  cursor:pointer; transition:all 0.2s ease;
}
.gsb-talk-btn:active, .gsb-talk-btn.active { background:linear-gradient(180deg, #4a3010, #2a1e0a); color:var(--gold); border-color:var(--gold-dim); }

/* 通話框 */
.call-dialog {
  width:100%; padding:10px 12px;
  background:linear-gradient(135deg, #0e0c08, #080604);
  border:1px solid #2a1e0a;
  border-radius:2px; min-height:60px;

.stage-step { font-size:10px; color:#5a4a2a; letter-spacing:0.2em; text-align:center; margin:6px 0; }
.stage-btn {
  padding:10px 24px; margin-top:8px;

  color:var(--gold); font-size:11px; letter-spacing:0.3em;

//  雨系統
// ══════════════════════════════════════════
let rainDrops = [];
let rainIntensity = 1.0; // 1=大雨 0=停雨

function createRain() {
  const layer = document.getElementById('rain-layer');
  layer.innerHTML = '';
  rainDrops = [];
  for (let i = 0; i < 70; i++) {
    const d = document.createElement('div');
    d.className = 'raindrop';
    const left = Math.random() * 110 - 5;
    const h = 50 + Math.random() * 80;
    const dur = 0.5 + Math.random() * 0.7;
    const delay = -Math.random() * 2;
    d.style.cssText = `left:${left}%;height:${h}px;top:-${h}px;animation-duration:${dur}s;animation-delay:${delay}s;opacity:${rainIntensity};`;
    layer.appendChild(d);
    rainDrops.push(d);
  }
}

function fadeRain(targetOpacity, durationMs) {
  const start = Date.now();
  const startOpacity = rainIntensity;
  function step() {
    const t = Math.min((Date.now() - start) / durationMs, 1);
    rainIntensity = startOpacity + (targetOpacity - startOpacity) * t;
    rainDrops.forEach(d => { d.style.opacity = rainIntensity; });
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ══════════════════════════════════════════
//  閃電
// ══════════════════════════════════════════
function lightning() {
  const el = document.getElementById('lightning');
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

  { t:'narr', text:'她抬起頭。\n\n眼前是一面巨大的木製櫃體，密密麻麻的圓形插孔，信號掉牌，跳線。\n一座她從未見過的機器。' },
  { t:'line', who:'語嫣', jp:'ユーイェン', text:'（喃喃）我……是誰？', jpTl:'（つぶやく）私は……誰？' },
  { t:'narr', text:'腦子裡像是有什麼東西破碎了，\n只剩零零散散的碎片，拼不出完整的輪廓。\n\n有個人……有個人在等她。\n\n她記得這個。只記得這個。' },
  { t:'narr', text:'桌上有一張摺疊的紙條。' },
  { t:'line', who:'語嫣', jp:'ユーイェン', text:'（拾起紙條）', jpTl:'（紙切れを拾う）' },

  // 紙條
  { t:'note',
    body:'妳醒了。\n\n別怕。\n\n妳需要做的事情，都在這座城市裡。\n就從這裡開始——\n臺中驛，明治四十一年。\n縱貫鐵路，即將全線通車。\n\n先完成眼前的工作。\n有人在等妳的消息。\n\n           ——一個妳認識的人',
    jp:'あなたが目覚めた。\n怖がらないで。\nやるべきことはすべてこの街にある。\nここから始めよう──\n臺中驛、明治四十一年。\n縦貫鉄路、まもなく全線開通。\nまず、目の前の仕事をこなすこと。\n誰かがあなたの知らせを待っている。\n           ──あなたの知る人より' },

  { t:'line', who:'語嫣', jp:'ユーイェン', text:'（盯著紙條末尾，那個未寫完的名字。\n很久很久。)', jpTl:'（書き終えられていない名前を、じっと見つめた。）' },
  { t:'line', who:'語嫣', jp:'ユーイェン', text:'……好。\n（輕輕把紙條折好，收進衣袖）', jpTl:'……わかった。\n（そっと紙を折りたたみ、袖に忍ばせる）' },

  { t:'narr', text:'這時，交換機的信號掉牌，\n「啪」的一聲落下。' },
  { t:'narr', text:'來電了。\n\n不管身在何處，\n眼前的工作，得先做。' },

  // 觸發關卡
  { t:'stage', id:'switchboard' },
];

// ══════════════════════════════════════════
//  引擎
// ══════════════════════════════════════════
let cursor = 0, isTyping = false, typeTimer = null, waitChapter = false;
const inventory = [];

function el(id){ return document.getElementById(id); }

function processLine(){
  if(cursor >= SCRIPT.length) return;
  const s = SCRIPT[cursor++];

  if(s.t==='chapter'){     showChapter(s); }
  else if(s.t==='narr'){   showDialog({who:'——',jp:'',text:s.text,jpTl:s.jpTl||''}); }
  else if(s.t==='line'){   showDialog(s); }
  else if(s.t==='show'){   el(s.id).classList.remove('hidden'); processLine(); }
  else if(s.t==='hide'){   el(s.id).classList.add('hidden'); processLine(); }
  else if(s.t==='bg'){     switchBg(s.scene); processLine(); }
  else if(s.t==='fx'){     s.fn(); processLine(); }
  else if(s.t==='note'){   showNote(s); }
  else if(s.t==='stage'){  launchStage(s.id); }
}

// 對話
function showDialog(s){
  const nameEl=el('speaker-name'), jpEl=el('speaker-jp'), box=el('speaker-box');
  const textEl=el('dialog-text');
  nameEl.textContent = s.who;
  jpEl.textContent = s.jp||'';
  box.style.display = s.who==='——' ? 'none' : 'flex';
  typeText(textEl, s.text, s.jpTl||'');
}

function typeText(el, txt, jpTl){
  isTyping=true;
  if(typeTimer) clearInterval(typeTimer);
  el.innerHTML='';
  let i=0;
  el.style.borderRight='1px solid var(--gold)';
  typeTimer=setInterval(()=>{
    if(i<txt.length){
      el.innerHTML = txt.substring(0,++i).replace(/\n/g,'<br>');
      if(jpTl) el.innerHTML+=`<span class="jp-note">${jpTl.replace(/\n/g,'<br>')}</span>`;
    } else {
      clearInterval(typeTimer); typeTimer=null;
      el.style.borderRight='none';
      isTyping=false;
    }
  },38);
}

function skipType(){
  if(typeTimer){ clearInterval(typeTimer); typeTimer=null; }
  isTyping=false;
  const s=SCRIPT[cursor-1];
  if(!s) return;
  const txt = s.text||s.t==='narr'?s.text:'';
  if(txt){
    const textEl=el('dialog-text');
    textEl.style.borderRight='none';
    textEl.innerHTML=txt.replace(/\n/g,'<br>');
    if(s.jpTl) textEl.innerHTML+=`<span class="jp-note">${s.jpTl.replace(/\n/g,'<br>')}</span>`;
  }
}

// 章節
function showChapter(s){
  waitChapter=true;
  el('ch-jp').textContent=s.jp;
  el('ch-main').innerHTML=s.main.replace(/\n/g,'<br>');
  el('ch-sub').textContent=s.sub||'';
  const ct=el('chapter-title');
  ct.classList.add('show');
  setTimeout(()=>{
    ct.classList.remove('show');
    setTimeout(()=>{ waitChapter=false; processLine(); },900);
  },3200);
}

// 背景切換
function switchBg(scene){
  el('phonebooth-scene').style.display = scene==='phonebooth'?'flex':'none';
  el('exchange-scene').style.display   = scene==='1908'?'block':'none';
}

// 紙條
function showNote(s){
  const ov=document.createElement('div');
  ov.className='note-overlay';
  ov.innerHTML=`
    <div class="note-paper">
      <div class="note-title">── 紙條　手紙 ──</div>
      <div class="note-body">${s.body.replace(/\n/g,'<br>')}</div>
      <div class="note-jp">${s.jp.replace(/\n/g,'<br>')}</div>
      <button class="note-btn" onclick="collectNote(this.closest('.note-overlay'))">收下紙條　受け取る</button>
    </div>`;
  document.body.appendChild(ov);
}

function collectNote(ov){
  ov.remove();
  addInventory('note','📜','神秘紙條');
  processLine();
}

// 道具欄
function addInventory(id, icon, name){
  if(inventory.find(i=>i.id===id)) return;
  inventory.push({id,icon,name});
  renderInventory();
}

function renderInventory(){
  const cnt=el('inv-count');
  cnt.textContent=inventory.length;
  const cont=el('inv-content');
  if(!inventory.length){
    cont.innerHTML='<div style="font-size:10px;color:#3a2a10;letter-spacing:0.2em;width:100%;text-align:center;padding:20px 0;">── 尚無道具 ──</div>';
    return;
  }
  cont.innerHTML=inventory.map(i=>`
    <div class="inv-item" onclick="viewItem('${i.id}')">
      <div class="inv-item-icon">${i.icon}</div>
      <div class="inv-item-name">${i.name}</div>
    </div>`).join('');
}

function viewItem(id){
  const item=inventory.find(i=>i.id===id);
  if(!item) return;
  if(id==='note'){
    // 重新顯示紙條
    const ov=document.createElement('div');
    ov.className='note-overlay';
    ov.innerHTML=`<div class="note-paper">
      <div class="note-title">── 紙條　手紙 ──</div>
      <div class="note-body">妳醒了。<br><br>別怕。<br><br>妳需要做的事情，都在這座城市裡。<br>就從這裡開始——<br>臺中驛，明治四十一年。<br>縱貫鐵路，即將全線通車。<br><br>先完成眼前的工作。<br>有人在等妳的消息。<br><br>　　　　　——一個妳認識的人</div>
      <div class="note-jp">あなたが目覚めた。怖がらないで。…</div>
      <button class="note-btn" onclick="this.closest('.note-overlay').remove()">關閉　閉じる</button>
    </div>`;
    document.body.appendChild(ov);
  }
}

function toggleInventory(){
  el('inventory').classList.toggle('open');
}

// ══════════════════════════════════════════
//  關卡一：接線生
// ══════════════════════════════════════════
const JACKS = [
  {id:'j1', name:'大和料理店\n一番'},
  {id:'j2', name:'三井物産\n二三番'},
  {id:'j3', name:'臺灣銀行\n三番'},
  {id:'j4', name:'臺中驛\n四番'},
  {id:'j5', name:'郵便局\n五番'},
  {id:'j6', name:'彰化銀行\n六番'},
  {id:'j7', name:'臺灣倉庫\n七番'},
  {id:'j8', name:'長谷川醫院\n八番'},
  {id:'j9', name:'臺中廳\n九番'},
  {id:'j10', name:'醉月樓\n十番'},
  {id:'j11', name:'帝國製糖\n十一番'},
  {id:'j12', name:'臺中座\n十二番'},
];

const CALLS = [
  { from:'臺中局　二三番', name:'三井物産會社', fromId:'j2', toId:'j4', toName:'臺中驛　四番',
    dialog:[
      { who:'用戶', text:'もしもし？\n（喂？）', jp:'（三井物産的人）請接臺中驛。' },
      { who:'語嫣', text:'もしもし、臺中局です。\n（喂，臺中電話局。）', jp:'（接線生回應）您好，臺中電話局。' },
      { who:'語嫣', text:'承知いたしました。少々お待ちください。\n（了解。請稍候。）', jp:'正在為您接通臺中驛……' },
    ]
  }
];

let stageState = { step:0, selectedCord:null, pluggedFrom:false, pluggedTo:false, talkPressed:false };
let currentCall = CALLS[0];

function launchStage(id){
  if(id==='switchboard'){
    el('stage-switchboard').style.display='flex';
    buildSwitchboard();
  }
}

function buildSwitchboard(){
  // 建立插孔
  const grid=el('gsb-jacks');
  grid.innerHTML='';
  JACKS.forEach(j=>{
    const div=document.createElement('div');
    div.className='gsb-jack' + (j.id===currentCall.fromId?' target':'');
    div.id='gsb-'+j.id;
    div.innerHTML=`<div class="gsb-jack-hole"></div><div class="gsb-jack-name">${j.name}</div>`;
    div.onclick=()=>plugCord(j.id);
    grid.appendChild(div);
  });

  // 建立跳線
  const cords=el('gsb-cords');
  cords.innerHTML=`
    <div class="gsb-cord" id="cord-A" onclick="selectCord('A')">
      <div class="gsb-cord-plug"></div>
      <div class="gsb-cord-line"></div>
      <div class="gsb-cord-name">跳線 A</div>
    </div>
    <div class="gsb-cord" id="cord-B" onclick="selectCord('B')">
      <div class="gsb-cord-plug"></div>
      <div class="gsb-cord-line"></div>
      <div class="gsb-cord-name">跳線 B</div>
    </div>`;

  updateCallDialog('── 掉牌落下。來電中──\n有用戶要求接通電話。\n請選擇跳線，插入發話方插孔。');
  el('stage-step').textContent='步驟 1｜請選擇跳線（A 或 B），插入來電插孔（三井物産・二三番）';
}

function selectCord(id){
  stageState.selectedCord=id;
  document.querySelectorAll('.gsb-cord').forEach(c=>c.classList.remove('selected'));
  el('cord-'+id)?.classList.add('selected');
  updateCallDialog('已選擇跳線 '+id+'。\n請插入發話方的插孔：　三井物産・二三番');
}

function plugCord(jackId){
  if(!stageState.selectedCord){
    updateCallDialog('請先選擇跳線。\nまず跳線を選んでください。');
    return;
  }
  const isFrom = jackId===currentCall.fromId;
  const isTo   = jackId===currentCall.toId;

  if(!stageState.pluggedFrom && isFrom){
    stageState.pluggedFrom=true;
    el('gsb-'+jackId).classList.add('selected');
    updateCallDialog('跳線 '+stageState.selectedCord+' 已插入發話方插孔。\n\n請再選另一條跳線，接通受話方：\n臺中驛・四番');
    el('stage-step').textContent='步驟 2｜再選一條跳線，插入受話方插孔（臺中驛・四番）';
    stageState.selectedCord=null;
    document.querySelectorAll('.gsb-cord').forEach(c=>c.classList.remove('selected'));
  } else if(stageState.pluggedFrom && !stageState.pluggedTo && isTo){
    stageState.pluggedTo=true;
    el('gsb-'+jackId).classList.add('selected');
    updateCallDialog('兩端插孔已連接。\n請按「說話鍵」，向用戶確認通話。');
    el('stage-step').textContent='步驟 3｜按下說話鍵，開始通話';
  } else if(!isFrom && !isTo){
    updateCallDialog('插孔有誤。\n請重新確認電話帖，找到正確的號碼。');
    // 小提示閃爍
    el('gsb-'+currentCall.fromId).style.animation='none';
    setTimeout(()=>el('gsb-'+currentCall.fromId).style.animation='',100);
  }
}

function pressTalkKey(){
  if(!stageState.pluggedFrom){
    updateCallDialog('請先插線再通話。\n先に接続してください。'); return;
  }
  stageState.talkPressed=true;
  el('talk-btn').classList.add('active');

  // 播放對話
  let di=0;
  const dialogs=currentCall.dialog;
  function nextDial(){
    if(di>=dialogs.length){
      // 完成
      el('gsb-'+currentCall.fromId).classList.remove('selected');
      el('gsb-'+currentCall.fromId).classList.add('correct');
      el('gsb-'+currentCall.toId).classList.remove('selected');
      el('gsb-'+currentCall.toId).classList.add('correct');
      updateCallDialog('通話完成。兩端已成功接通。\n\n承知いたしました。接続完了です。');
      el('stage-step').textContent='接線完成！　接続完了！';
      el('talk-btn').classList.remove('active');
      const btn=el('stage-next-btn');
      btn.style.display='block';
      btn.textContent='繼續故事　続きへ';
      return;
    }
    const d=dialogs[di++];
    updateCallDialog(`【${d.who}】\n${d.text}\n\n${d.jp||''}`);
    setTimeout(nextDial, 2200);
  }
  nextDial();
}

function stageNextStep(){
  el('stage-switchboard').style.display='none';
  // 繼續劇情
  processLine();
}

function updateCallDialog(txt){
  el('call-dialog').innerHTML=txt.replace(/\n/g,'<br>');
}

// ══════════════════════════════════════════
//  點擊推進
// ══════════════════════════════════════════
function onTap(){
  if(waitChapter) return;
  if(el('stage-switchboard').style.display==='flex') return;
  if(isTyping){ skipType(); return; }
  processLine();
}
el('game').addEventListener('click', onTap);
el('game').addEventListener('touchend', e=>{ e.preventDefault(); onTap(); },{passive:false});

// ══════════════════════════════════════════
//  裝飾用交換機面板（背景用）
// ══════════════════════════════════════════
function buildDecoSwitchboard(){
  const dp=el('drop-panel');
  for(let i=0;i<6;i++){
    const d=document.createElement('div');
    d.className='drop-indicator';
    d.textContent=i+1;
    dp.appendChild(d);
  }
  const jg=el('jack-grid');
  const names=['大和','三井','銀行','臺中驛','郵便','彰銀','倉庫','醫院','廳','月樓','製糖','臺中座','旅館','商會','總督','學校'];
  for(let i=0;i<16;i++){
    const j=document.createElement('div');
    j.className='jack';
    j.innerHTML=`<span class="jack-label">${names[i]||''}</span>`;
    jg.appendChild(j);
  }
  const ca=el('cord-area');
  ['A','B','C'].forEach(l=>{
    const c=document.createElement('div');
    c.className='cord';
    c.innerHTML=`<div class="cord-plug"></div><div class="cord-label">跳線${l}</div>`;
    ca.appendChild(c);
  });
}

// ══════════════════════════════════════════
//  開始
// ══════════════════════════════════════════
function startGame(){
  const ss=el('start-screen');
  ss.style.transition='opacity 0.9s ease';
  ss.style.opacity='0';
  setTimeout(()=>{
    ss.style.display='none';
    createRain();
    buildDecoSwitchboard();
    switchBg('phonebooth');
    setInterval(()=>{ if(Math.random()<0.25) lightning(); },4500);
    processLine();
  },900);
}
</script>
