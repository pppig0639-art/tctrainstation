<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<meta name="screen-orientation" content="landscape">
<meta name="theme-color" content="#0e0604">
<title>臺中古蹟體驗</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  /* 紅磚白石黑瓦 — 取自台中車站立面 */
  --brick:       #b8472c;     /* 紅磚（主強調色） */
  --brick-dark:  #6b2818;     /* 暗紅磚 */
  --brick-light: #d87050;     /* 亮紅磚 */
  --stone:       #f0e5d0;     /* 洗石子白 */
  --stone-dim:   #c8b89c;
  --tile-black:  #1a1208;     /* 黑瓦 */
  /* 沿用變數名（避免大量 CSS 改名），實際值換成磚紅／石白系 */
  --gold:        #c25028;     /* 取代金 = 紅磚 */
  --gold-dim:    #6b2818;     /* 取代深金 = 暗磚 */
  --gold-bright: #e87050;     /* 取代亮金 = 亮磚 */
  --text:        #f0e5d0;     /* 取代金黃文字 = 石白 */
  --text-dim:    #c8b89c;     /* 暗石白 */
  --bg:          #0e0604;     /* 略帶磚色的暗 */
  --dlg-font:20px;--spk-font:17px;--dlg-h:96px;--dlg-pad:14px;--dlg-bot:0px;
  --ch-main:44px;--ch-jp:20px;--ch-sub:12px;
  --inv-bar-h:28px;
}
*{box-sizing:border-box;margin:0;padding:0;
  -webkit-tap-highlight-color:transparent;  /* 移除 iOS 點擊藍框 */
  -webkit-touch-callout:none;               /* 移除長按選單 */
  touch-action:manipulation;                 /* 移除雙點縮放延遲 */
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;
  overscroll-behavior:none;                  /* 防止彈性滾動 */
  -webkit-overflow-scrolling:auto;
  position:fixed;                            /* 防止地址列彈出 */
  inset:0;}
/* 觸控按鈕保留可點，但內部劇情文字仍可選取 */
button,.dw-btn,.pl-key,.kl-block,.sb-slip,.bm-tool,.bm-zone,
.bg-cell,.sb2-station,.pz-card,.kl-cf-yes,.kl-cf-no,.dw-sp-pick,.dw-sp-skip,
#dialog-area,#ch-card,#slider-reveal,#niche-cont,
input,select,textarea{
  touch-action:manipulation;
  -webkit-user-select:none;user-select:none;}
input,textarea{-webkit-user-select:text;user-select:text;}
body{display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho','Noto Serif TC',serif;
  /* 暗紅磚牆基底（在 #game 外的留邊處顯露） */
  background-color:#0a0402;
  background-image:
    radial-gradient(ellipse at 50% 50%,rgba(40,16,8,.5) 0%,rgba(0,0,0,.92) 80%),
    repeating-linear-gradient(0deg,transparent 0 28px,rgba(0,0,0,.45) 28px 30px),
    repeating-linear-gradient(90deg,transparent 0 60px,rgba(0,0,0,.45) 60px 62px),
    linear-gradient(135deg,#3a1408 0%,#1a0804 100%);
  background-size:100% 100%,60px 30px,60px 30px,100% 100%;}

/* ── Viewport 16:9 ── */
#game{position:relative;width:min(100vw,177.78vh);height:min(100vh,56.25vw);background:var(--bg);overflow:hidden;user-select:none;}

/* ── Background ── */
#bg{position:absolute;inset:0;}
#phonebooth-scene,#exchange-scene,#custom-bg{position:absolute;inset:0;}
#phonebooth-exterior,#phone-interior{
  position:absolute;inset:0;background-size:cover;background-position:center;
  transition:opacity .5s;}
#exchange-scene img{width:100%;height:100%;object-fit:cover;}
#custom-bg{background-size:cover;background-position:center;}

/* ── Sprites ──
   用 width 驅動尺寸：sprite 寬度由 layout 設定為遊戲容器的百分比，
   高度由圖片比例自動決定，讓後台預覽與遊戲內呈現完全一致。 */
#sprites{position:absolute;inset:0;pointer-events:none;}
.sprite{position:absolute;bottom:0;transition:opacity .4s;}
.sprite img{width:100%;height:auto;object-fit:contain;display:block;}

/* ── Rain ── */
#rain{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 3s;
  background:repeating-linear-gradient(180deg,
    transparent 0,transparent 4px,
    rgba(160,180,220,.09) 4px,rgba(160,180,220,.09) 5px);}
#rain.on{opacity:1;}

/* ── Phone glow ── */
#phone-glow{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 38%,rgba(194,80,40,.4) 0%,transparent 60%);
  opacity:0;transition:opacity 1.2s;}
#phone-glow.on{opacity:1;}

/* ── Lightning ── */
#lightning{position:absolute;inset:0;pointer-events:none;background:#e8f0ff;opacity:0;}

/* ── Scene transition (full black) ── */
#curtain{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;z-index:55;}
#curtain.on{opacity:1;pointer-events:auto;}

/* ── Blackout (with text) ── */
#blackout{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;z-index:56;transition:opacity .6s;}
#blackout.on{opacity:1;pointer-events:auto;}
#blackout-text{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--gold);font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:2.4em;letter-spacing:.7em;
  opacity:0;transition:opacity .5s;}
#blackout-text.on{opacity:1;}
/* 「The End」結尾畫面 — 字體更大、字距更鬆、淡入更慢 */
#blackout.theend #blackout-text{
  font-size:3.8em;letter-spacing:1em;
  font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-style:italic;font-weight:300;
  color:var(--stone);
  text-shadow:0 0 24px rgba(232,220,196,.3);
  animation:theend-rise 2.6s ease-out both;}
@keyframes theend-rise{0%{opacity:0;transform:translateY(12px) scale(.92);letter-spacing:.4em;}
  60%{opacity:1;}
  100%{opacity:1;transform:translateY(0) scale(1);letter-spacing:1em;}}

/* ── Chapter card（紅磚牆背景＋洗石子飾帶） ── */
#ch-card{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background-color:#3a1408;
  background-image:
    /* 中央水平洗石子飾帶 */
    linear-gradient(180deg,transparent 0% 38%,#2a1208 38%,#2a1208 39%,#e8dcc4 39%,#dcc8a8 50%,#e8dcc4 61%,#2a1208 61%,#2a1208 62%,transparent 62% 100%),
    /* 暈影 */
    radial-gradient(ellipse at 50% 50%,rgba(255,200,160,.08) 0%,transparent 70%),
    /* 紅磚紋理 */
    repeating-linear-gradient(0deg,transparent 0 28px,rgba(0,0,0,.5) 28px 30px),
    repeating-linear-gradient(90deg,transparent 0 60px,rgba(0,0,0,.5) 60px 62px),
    linear-gradient(135deg,#8b3a25 0%,#3a1408 100%);
  background-size:100% 100%,100% 100%,60px 30px,60px 30px,100% 100%;
  box-shadow:inset 0 0 60px rgba(0,0,0,.6);
  z-index:60;opacity:0;pointer-events:none;transition:opacity .4s;cursor:pointer;}
#ch-card.on{opacity:1;pointer-events:auto;}
#ch-card > *{position:relative;z-index:1;
  text-shadow:0 2px 8px rgba(0,0,0,.85),0 0 4px rgba(0,0,0,.7);}
#ch-jp  {font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:var(--ch-jp);letter-spacing:.6em;color:var(--gold-dim);margin-bottom:.5em;}
#ch-main{font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:var(--ch-main);letter-spacing:.3em;color:var(--gold);text-align:center;padding:0 40px;}
#ch-sub {font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:var(--ch-sub);letter-spacing:.4em;color:var(--text-dim);margin-top:.8em;}
#ch-line{width:60px;height:1px;background:var(--gold-dim);margin:1.2em 0;}
#ch-hint{position:absolute;bottom:5%;font-size:11px;letter-spacing:.3em;color:var(--gold-dim);animation:blink 1.5s ease-in-out infinite;}

/* ── Dialog（說話者小標籤 + 滿寬對話框） ── */
#dialog-area{
  position:absolute;left:0;right:0;bottom:var(--inv-bar-h);
  z-index:80;opacity:0;pointer-events:none;transition:opacity .18s;cursor:pointer;}
#dialog-area.on{opacity:1;pointer-events:auto;}
#dialog-area.locked{cursor:default;}
#dialog-area.locked #next-arrow{opacity:0;}
#speaker-wrap{padding-left:24px;line-height:0;}
#speaker{
  display:inline-block;padding:5px 22px;background:#0a0704;
  border:1px solid var(--gold-dim);border-bottom:none;
  color:var(--gold);font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:var(--spk-font);letter-spacing:.3em;line-height:1.4;
  border-radius:2px 2px 0 0;}
#speaker:empty{display:none;}
#dialog-main{
  position:relative;background:#0a0704;border-top:1px solid var(--gold-dim);
  padding:var(--dlg-pad) 28px calc(var(--dlg-pad) + 6px);
  min-height:var(--dlg-h);}
#dialog-text{
  font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:var(--dlg-font);
  color:var(--text);line-height:1.8;white-space:pre-wrap;}
#dialog-text.narr{
  color:var(--text-dim);letter-spacing:.1em;
  transform:skewX(-5deg);transform-origin:left center;}
#next-arrow{
  position:absolute;right:20px;bottom:6px;
  color:var(--gold-dim);font-size:11px;letter-spacing:.15em;
  animation:blink 1.3s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:.2;}50%{opacity:1;}}

/* ── Inventory（底部道具欄，點擊展開） ── */
#inv-bar{position:absolute;left:0;right:0;bottom:0;height:var(--inv-bar-h);
  background:#0a0704;border-top:1px solid var(--gold-dim);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;color:var(--gold);font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:13px;letter-spacing:.4em;cursor:pointer;z-index:175;user-select:none;transition:background .15s;
  pointer-events:auto;}
#inv-bar:hover{background:#140e08;}
#inv-bar-label{color:var(--gold);}
#inv-bar-count{color:var(--gold-dim);font-size:12px;letter-spacing:.15em;min-width:1em;text-align:right;}
#inv-bar-arrow{color:var(--gold-dim);font-size:10px;letter-spacing:.2em;transition:transform .2s;margin-left:8px;}
#inv-panel.on ~ #inv-bar #inv-bar-arrow,
#inv-bar.open #inv-bar-arrow{transform:rotate(180deg);}
#inv-panel{position:absolute;left:0;right:0;bottom:var(--inv-bar-h);
  background:#0a0704;border-top:1px solid var(--gold-dim);
  z-index:174;display:none;padding:12px 18px;max-height:38%;overflow-y:auto;
  pointer-events:auto;}
#inv-panel.on{display:block;}
#inv-panel-title{display:none;}
#inv-list{display:flex;flex-wrap:wrap;gap:10px;}
.inv-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 8px;
  border:1px solid var(--gold-dim);border-radius:2px;cursor:pointer;transition:all .15s;
  background:rgba(20,14,8,.6);min-width:72px;}
.inv-item:hover{background:rgba(194,80,40,.12);border-color:var(--gold);}
.inv-item-icon{width:42px;height:42px;background:#1a1208;border:1px solid var(--gold-dim);
  border-radius:2px;display:flex;align-items:center;justify-content:center;
  font-size:20px;color:var(--gold);flex-shrink:0;overflow:hidden;}
.inv-item-icon img{width:100%;height:100%;object-fit:cover;}
.inv-item-name{font-size:11px;color:var(--text);letter-spacing:.15em;}
#inv-viewer{position:absolute;inset:0;background:rgba(0,0,0,.92);z-index:95;display:none;flex-direction:column;align-items:center;justify-content:center;padding:5%;}
#inv-viewer.on{display:flex;}
#inv-viewer-img{max-width:90%;max-height:75%;object-fit:contain;border:1px solid var(--gold-dim);}
#inv-viewer-name{color:var(--gold);font-size:14px;letter-spacing:.3em;margin-top:14px;}
#inv-viewer-close{margin-top:18px;padding:8px 28px;background:none;border:1px solid var(--gold-dim);color:var(--gold);font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:12px;letter-spacing:.3em;cursor:pointer;border-radius:2px;}
#inv-viewer-close:hover{background:rgba(194,80,40,.15);}

/* ── 提示燈泡 + 商城 ── */
#hint-bulb{position:absolute;top:3.5%;right:calc(3.5% + 58px);width:46px;height:46px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffeaa0,#d4a830 55%,#7a5010);border:1px solid #d4a830;color:#2a1808;font-size:24px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:92;box-shadow:0 0 12px rgba(232,112,80,.55);animation:bulb-glow 1.4s ease-in-out infinite;}
#hint-bulb.on{display:flex;}
@keyframes bulb-glow{0%,100%{box-shadow:0 0 12px rgba(232,112,80,.55);transform:scale(1);}50%{box-shadow:0 0 22px rgba(232,112,80,.9);transform:scale(1.08);}}
#hint-confirm{position:absolute;inset:0;background:rgba(0,0,0,.75);z-index:96;display:none;align-items:center;justify-content:center;}
#hint-confirm.on{display:flex;}
#hint-confirm-box{background:#0a0704;border:1px solid var(--gold-dim);padding:24px 32px;border-radius:3px;max-width:80%;text-align:center;}
#hint-confirm-q{color:var(--text);font-size:1.05em;letter-spacing:.25em;margin-bottom:22px;font-family:'Shippori Mincho','Noto Serif TC',serif;}
.hint-btn{margin:0 8px;padding:9px 32px;background:none;border:1px solid var(--gold-dim);color:var(--gold);font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:13px;letter-spacing:.35em;cursor:pointer;border-radius:2px;transition:all .15s;}
.hint-btn:hover{background:rgba(194,80,40,.18);border-color:var(--gold);}

/* ── Phone ring stage ── */
#stage-phone-ring{
  position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;z-index:70;
  background:#000;}
#stage-phone-ring.on{display:flex;}
#ring-prompt{color:var(--gold);font-size:1.1em;letter-spacing:.5em;}
#ring-btn{
  padding:14px 40px;background:none;border:1px solid var(--gold);color:var(--gold);
  font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:1em;letter-spacing:.5em;cursor:pointer;
  animation:pulse 1.8s ease-in-out infinite;transition:background .2s;}
#ring-btn:hover{background:rgba(194,80,40,.18);}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(194,80,40,.5);}55%{box-shadow:0 0 0 14px rgba(194,80,40,0);}}

/* ── Switchboard（跳線版） ── */
#stage-switchboard{position:absolute;inset:0;z-index:70;background:#070503;display:none;flex-direction:column;align-items:stretch;overflow:hidden;}
#stage-switchboard.on{display:flex;}
/* 進度浮層：右上角小字，不再佔頂端整條 */
.sb-progress{position:absolute;top:6px;right:14px;font-size:10px;color:var(--gold-dim);letter-spacing:.2em;
  background:rgba(10,7,4,.6);padding:2px 8px;border-radius:2px;z-index:3;pointer-events:none;}
.call-banner{margin:6px 12px 0;background:linear-gradient(90deg,#160e04,#221608,#160e04);border:2px solid #c87020;border-radius:3px;padding:8px 14px;animation:ring-pulse .9s ease-in-out infinite;}
.call-banner.connected{border-color:#30b080;animation:none;}
.call-banner.done{border-color:#3a6040;animation:none;opacity:.7;}
@keyframes ring-pulse{0%,100%{border-color:#c87020}50%{border-color:#f0b040;box-shadow:0 0 10px rgba(232,112,80,.25)}}
.cb-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.cb-from,.cb-to{display:flex;flex-direction:column;gap:3px;flex:1;}
.cb-to{text-align:right;}
.cb-label{font-size:11px;color:#d4a840;letter-spacing:.15em;}
.cb-number{font-size:20px;color:#ffd050;letter-spacing:.15em;font-weight:600;line-height:1.2;}
.cb-arrow{font-size:22px;color:#6a4818;flex-shrink:0;}
.call-banner.connected .cb-arrow{color:#30b080;}
.sb-panel-wrap{margin:6px 12px 0;background:linear-gradient(180deg,#1e1608,#140e06);border:1px solid #3a2810;border-radius:3px;padding:6px 10px;flex-shrink:0;}
.sb-panel-label{display:none;}
.sb-jacks{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px;}
.sb-jack{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:5px 2px;border:1px solid transparent;border-radius:3px;transition:all .2s;user-select:none;}
.sb-jack:active{transform:scale(.94);}
.sb-jack.ringing{border-color:#c87020;background:rgba(194,80,40,.1);}
.sb-jack.selected{border-color:var(--gold);background:rgba(194,80,40,.12);}
.sb-jack.plugged{border-color:#208060;background:rgba(32,128,96,.08);}
.sb-jack.correct{border-color:#30c090;background:rgba(48,192,144,.1);}
.sb-jack.wrong-flash{border-color:#c03030!important;background:rgba(192,48,48,.12)!important;}
.sb-jack-hole{width:22px;height:22px;background:radial-gradient(circle,#050402 40%,#1a1208);border:1.5px solid #3a2810;border-radius:50%;transition:all .3s;}
.sb-jack.ringing .sb-jack-hole{border-color:#c87020;box-shadow:0 0 7px rgba(194,80,40,.6);animation:jack-blink .8s ease-in-out infinite;}
.sb-jack.selected .sb-jack-hole{border-color:var(--gold);box-shadow:0 0 6px rgba(194,80,40,.5);}
.sb-jack.plugged .sb-jack-hole{background:radial-gradient(circle,#8a6020,#2a1808);border-color:#c8a030;}
.sb-jack.correct .sb-jack-hole{background:radial-gradient(circle,#104030 40%,#0a1a14);border-color:#30c090;box-shadow:0 0 5px rgba(48,192,144,.4);}
@keyframes jack-blink{0%,100%{opacity:1}50%{opacity:.4}}
.sb-jack-name{font-size:10px;color:#fff;text-align:center;line-height:1.3;}
.sb-jack.ringing .sb-jack-name{color:#ffd060;}
.sb-jack.correct .sb-jack-name{color:#60e0a0;}
.sb-cords{display:flex;gap:10px;justify-content:center;padding:6px 0;border-top:1px solid #1e1406;border-bottom:1px solid #1e1406;margin-bottom:6px;}
.sb-cord{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:5px 14px;border:1px solid #3a2810;border-radius:3px;transition:all .2s;user-select:none;}
.sb-cord.selected{border-color:var(--gold);background:rgba(194,80,40,.1);}
.sb-cord.used{opacity:.45;cursor:default;border-color:#2a1a08;}
.sb-cord-plug{width:11px;height:17px;background:linear-gradient(180deg,#d4c060,#8a7030);border-radius:2px 2px 4px 4px;border:1px solid #4a3010;}
.sb-cord-wire{width:2px;height:18px;background:repeating-linear-gradient(180deg,#4a3010 0,#4a3010 3px,#6a5020 3px,#6a5020 6px);}
.sb-cord-name{font-size:10px;color:#fff;}
.sb-cord.selected .sb-cord-name{color:var(--gold);}
.sb-talk-btn{width:100%;padding:8px;background:linear-gradient(180deg,#2a1e0a,#1a1206);border:1px solid #4a3010;border-radius:2px;color:#fff;font-size:12px;letter-spacing:.3em;font-family:'Shippori Mincho','Noto Serif TC',serif;cursor:pointer;transition:all .2s;}
.sb-talk-btn.active{background:linear-gradient(180deg,#4a3010,#2a1e0a);color:var(--gold);border-color:var(--gold-dim);}
.sb-talk-btn:disabled{opacity:.4;cursor:default;}
.sb-bottom{flex:1;display:flex;flex-direction:column;padding:8px 12px 12px;overflow:hidden;min-height:0;position:relative;}
.sb-dialog-box{flex:1;background:linear-gradient(135deg,#0e0c08,#080604);border:1px solid #1e1808;border-radius:2px;padding:14px 18px;overflow:hidden;display:flex;flex-direction:column;gap:7px;min-height:120px;justify-content:flex-start;}
.sb-msg-who{font-size:12px;color:#ffd060;letter-spacing:.2em;}
.sb-msg-text{font-size:16px;color:#fff;line-height:1.9;letter-spacing:.04em;}
.sb-finish-btn{position:absolute;right:14px;bottom:26px;padding:9px 20px;background:rgba(14,12,8,.92);border:1px solid var(--gold-dim);color:var(--gold);font-size:13px;letter-spacing:.3em;font-family:'Shippori Mincho','Noto Serif TC',serif;cursor:pointer;display:none;transition:all .2s;border-radius:2px;z-index:2;}
.sb-finish-btn:hover{background:rgba(194,80,40,.18);border-color:var(--gold);}

/* ── Map ── */
#stage-map{
  position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;z-index:70;background:#000;}
#stage-map.on{display:flex;}
#map-text{
  font-family:'Shippori Mincho','Noto Serif TC',serif;color:var(--text);font-size:.9em;
  letter-spacing:.15em;text-align:center;max-width:80%;line-height:2;
  white-space:pre-wrap;margin-bottom:4px;}
#map-img{max-width:72%;max-height:60%;object-fit:contain;border:1px solid var(--gold-dim);}
#map-btn{
  padding:12px 34px;background:none;border:1px solid var(--gold);color:var(--gold);
  font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:.9em;letter-spacing:.45em;cursor:pointer;
  transition:background .2s;}
#map-btn:hover{background:rgba(194,80,40,.15);}

/* ── Hint-gate（序章鎖住頁：黑屏 + 下方輸入框） ── */
#stage-hint-gate{position:absolute;inset:0;display:none;z-index:65;background:#000;}
#stage-hint-gate.on{display:block;}
#hg-input{position:absolute;left:14%;right:14%;bottom:calc(var(--inv-bar-h) + 14%);height:52px;
  background:rgba(14,10,6,.92);border:1px solid var(--gold-dim);border-radius:2px;
  color:var(--text);font-size:1.05em;letter-spacing:.15em;padding:0 18px;
  font-family:'Shippori Mincho','Noto Serif TC',serif;outline:none;transition:border-color .2s;}
#hg-input:focus{border-color:var(--gold);}
#hg-input::placeholder{color:transparent;}

/* ── Hint shop landing（提示商城主頁：顯示後台編輯的提示字詞 + 按鈕進入照片支付） ── */
#stage-hint-shop{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
  justify-content:center;gap:24px;z-index:72;background:#080604;padding:6%;}
#stage-hint-shop.on{display:flex;}
#hs-title{font-family:'Shippori Mincho','Noto Serif TC',serif;color:var(--gold);font-size:1.25em;
  letter-spacing:.5em;padding-bottom:14px;border-bottom:1px solid var(--gold-dim);}
#hs-text{font-family:'Shippori Mincho','Noto Serif TC',serif;color:var(--text);font-size:1.05em;
  line-height:1.95;letter-spacing:.15em;max-width:80%;text-align:center;white-space:pre-wrap;}
#hs-btn{padding:12px 36px;background:none;border:1px solid var(--gold);color:var(--gold);
  font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:.95em;letter-spacing:.4em;
  cursor:pointer;border-radius:2px;transition:all .2s;}
#hs-btn:hover{background:rgba(194,80,40,.15);}
#hs-back{position:absolute;top:3%;left:3%;padding:6px 16px;background:none;border:1px solid var(--gold-dim);
  color:var(--text-dim);font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:.75em;letter-spacing:.3em;
  cursor:pointer;border-radius:2px;}
#hs-back:hover{color:var(--gold);border-color:var(--gold);}

/* ── Stage 2 (拍照，純支付用，不顯示任何提示/答案) ── */
#stage-photo{
  position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:18px;z-index:73;background:#000;padding:24px;}
#stage-photo.on{display:flex;}
#photo-hint{
  font-family:'Shippori Mincho','Noto Serif TC',serif;color:var(--text-dim);font-size:.9em;
  letter-spacing:.2em;text-align:center;max-width:80%;line-height:1.9;}

/* ── Hint reveal（拍照成功後顯示「線索照片」的取得動畫） ── */
#hint-reveal{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:97;background:#000;padding:4%;}
#hint-reveal.on{display:flex;}
#hr-prefix{font-family:'Shippori Mincho','Noto Serif TC',serif;color:var(--gold-dim);font-size:.9em;letter-spacing:.5em;}
#hr-img{max-width:82%;max-height:50%;object-fit:contain;border:1px solid var(--gold-dim);display:none;}
#hr-answer{font-family:'Shippori Mincho','Noto Serif TC',serif;color:var(--gold);font-size:1.9em;letter-spacing:.4em;text-align:center;line-height:1.6;}
#hr-hint{font-family:'Shippori Mincho','Noto Serif TC',serif;color:var(--text-dim);font-size:.8em;letter-spacing:.3em;margin-top:-4px;}
#hr-ok{padding:10px 30px;background:none;border:1px solid var(--gold-dim);color:var(--gold);
  font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:.9em;letter-spacing:.35em;
  cursor:pointer;border-radius:2px;margin-top:8px;}
#hr-ok:hover{background:rgba(194,80,40,.15);border-color:var(--gold);}

/* Hint-gate 輸入框 shake 動畫 */
#hg-input.shake{animation:hg-shake .35s;}
@keyframes hg-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
#photo-input-label{
  padding:12px 30px;border:1px solid var(--gold);color:var(--gold);cursor:pointer;
  font-family:'Shippori Mincho','Noto Serif TC',serif;letter-spacing:.35em;font-size:.9em;
  transition:background .2s;}
#photo-input-label:hover{background:rgba(194,80,40,.15);}
#photo-result{font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:.95em;color:var(--text);letter-spacing:.2em;text-align:center;}

/* ── Niche（壁龕：透明覆蓋層；背景圖請在腳本中先用 {t:'bg',scene:'niche-bg'} 設定）
   只負責顯示「我已到達，繼續」按鈕，10 秒後自動跳出，玩家必須點才前進。 ── */
#stage-niche{position:absolute;inset:0;display:none;z-index:74;pointer-events:none;background:transparent;}
#stage-niche.on{display:block;pointer-events:auto;}
#niche-cont{position:absolute;left:50%;bottom:14%;transform:translateX(-50%);
  padding:14px 44px;background:rgba(10,7,4,.78);border:1px solid var(--gold);
  color:#fff;font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:1.2em;font-weight:700;letter-spacing:.4em;cursor:pointer;border-radius:2px;
  display:none;animation:blink 1.6s ease-in-out infinite;z-index:5;
  box-shadow:0 0 18px rgba(0,0,0,.7);}
#niche-cont.on{display:block;}
#niche-cont:hover{background:rgba(194,80,40,.22);}

/* ── Bagua seal puzzle（八卦封印關） ── */
#stage-bagua{position:absolute;inset:0;display:none;z-index:78;background:radial-gradient(ellipse at 50% 50%,#1a1208 0%,#000 70%);overflow:hidden;}
#stage-bagua.on{display:block;}
/* 八卦輪：一個正方形容器；裡面用 SVG 畫八邊形，再用絕對定位把 8 個卦放在 8 個邊的中點 */
#bagua-wheel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:min(86vh,86vw);aspect-ratio:1;}
.bagua-octagon-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.bg-trigram{position:absolute;width:20%;aspect-ratio:1;
  transform:translate(-50%,-50%);
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#3a2a14,#1a1208);
  border:1.5px solid #8a6020;border-radius:4px;
  cursor:pointer;transition:opacity .3s,transform .3s,filter .15s,box-shadow .15s;
  z-index:2;}
.bg-trigram:hover{filter:brightness(1.3);box-shadow:0 0 14px rgba(194,80,40,.35);}
.bg-trigram.torn{opacity:0;transform:translate(-50%,-50%) scale(.45);pointer-events:none;}
.bg-trigram img{width:100%;height:100%;object-fit:contain;display:block;}
/* 後天八卦位置：N=坎水 NE=艮山 E=震雷 SE=巽風 S=離火 SW=坤地 W=兌澤 NW=乾天 */
.bg-trigram[data-pos="N"] {top:9%;  left:50%;}
.bg-trigram[data-pos="NE"]{top:21%; left:79%;}
.bg-trigram[data-pos="E"] {top:50%; left:91%;}
.bg-trigram[data-pos="SE"]{top:79%; left:79%;}
.bg-trigram[data-pos="S"] {top:91%; left:50%;}
.bg-trigram[data-pos="SW"]{top:79%; left:21%;}
.bg-trigram[data-pos="W"] {top:50%; left:9%;}
.bg-trigram[data-pos="NW"]{top:21%; left:21%;}
/* 中央水盆 */
.bagua-bowl-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
/* 爻線改用內嵌 SVG（不靠 flex % 解析，保證一定畫得出來） */
.bg-yao-svg{width:90%;height:78%;display:block;}
.bg-yao-svg rect{fill:#dca858;}
.bg-trigram-name{font-size:11px;color:var(--gold);letter-spacing:.2em;
  font-family:'Shippori Mincho','Noto Serif TC',serif;margin-top:4%;}
#stage-bagua.shake{animation:bagua-shake 1.4s cubic-bezier(.36,.07,.19,.97);}
@keyframes bagua-shake{
  0%,100%{transform:translate(0,0)}
  10%,30%,50%,70%,90%{transform:translate(-2.5px,0)}
  20%,40%,60%,80%{transform:translate(2.5px,0)}
}
/* 柔化的紅／藍光：用 radial-gradient 從邊緣聚光，opacity 動畫淡入淡出 */
#bagua-flash{position:absolute;inset:0;pointer-events:none;opacity:0;z-index:79;mix-blend-mode:screen;}
#bagua-flash.red{
  background:radial-gradient(ellipse at center,rgba(220,80,80,0) 30%,rgba(200,50,50,.42) 100%);
  animation:flash-soft 1.6s ease both;
}
#bagua-flash.blue{
  background:radial-gradient(ellipse at center,rgba(140,210,255,0) 25%,rgba(80,170,230,.38) 100%);
  animation:flash-soft-blue 3s ease both;
}
@keyframes flash-soft{
  0%{opacity:0;}
  25%{opacity:1;}
  60%{opacity:.85;}
  100%{opacity:0;}
}
@keyframes flash-soft-blue{
  0%{opacity:0;}
  18%{opacity:.6;}
  35%{opacity:.95;}
  70%{opacity:.7;}
  100%{opacity:0;}
}
/* 八卦結關動畫 */
#stage-bagua{transition:opacity .5s ease;}
#stage-bagua.fading{opacity:0;}
#bagua-win-text{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);
  text-align:center;font-family:'Shippori Mincho','Noto Serif TC',serif;
  color:var(--gold);font-size:2.4em;letter-spacing:.6em;
  text-shadow:0 0 18px rgba(240,229,208,.65);
  animation:bagua-win-fade 1.6s ease both;z-index:90;pointer-events:none;}
@keyframes bagua-win-fade{
  0%{opacity:0;transform:translateY(-50%) scale(.92);letter-spacing:.3em;}
  25%{opacity:1;transform:translateY(-50%) scale(1);letter-spacing:.6em;}
  75%{opacity:1;transform:translateY(-50%) scale(1.04);letter-spacing:.7em;}
  100%{opacity:0;transform:translateY(-50%) scale(1.08);letter-spacing:.8em;}
}
/* hint bulb（右上，15 秒後出現） */
#bagua-hint-btn{position:absolute;top:3.5%;right:3.5%;width:46px;height:46px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#ffeaa0,#d4a830 55%,#7a5010);
  border:1px solid #d4a830;color:#2a1808;font-size:24px;
  display:none;align-items:center;justify-content:center;cursor:pointer;z-index:80;
  box-shadow:0 0 12px rgba(232,112,80,.55);animation:bulb-glow 1.4s ease-in-out infinite;}
#bagua-hint-btn.on{display:flex;}
/* info button（永遠顯示，左邊一個圓圈裡的 i，點開看規則） */
#bagua-info-btn{position:absolute;top:3.5%;right:calc(3.5% + 56px);width:46px;height:46px;border-radius:50%;
  background:rgba(20,14,8,.85);border:2px solid var(--gold);color:var(--gold);
  font-family:'Shippori Mincho','Noto Serif TC',serif;font-style:italic;font-weight:900;font-size:24px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:80;
  box-shadow:0 0 8px rgba(194,80,40,.35);transition:all .15s;}
#bagua-info-btn:hover{background:rgba(194,80,40,.2);box-shadow:0 0 14px rgba(194,80,40,.55);}
#bagua-info-view{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.85);z-index:96;padding:5%;}
#bagua-info-view.on{display:flex;}
#bgi-box{background:#0a0704;border:1px solid var(--gold-dim);border-radius:3px;
  padding:24px 28px;max-width:560px;width:100%;max-height:88%;overflow-y:auto;
  font-family:'Shippori Mincho','Noto Serif TC',serif;color:#fff;
  font-size:1.05em;font-weight:600;line-height:2;letter-spacing:.05em;}
#bgi-title{color:var(--gold);font-size:1.2em;letter-spacing:.45em;text-align:center;
  padding-bottom:12px;border-bottom:1px solid var(--gold-dim);margin-bottom:14px;font-weight:700;}
#bgi-content{white-space:pre-wrap;}
#bgi-close{margin-top:18px;display:block;margin-left:auto;padding:8px 24px;background:none;
  border:1px solid var(--gold-dim);color:var(--gold);font-weight:700;
  font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:.95em;letter-spacing:.3em;
  cursor:pointer;border-radius:2px;}
#bgi-close:hover{background:rgba(194,80,40,.18);}
/* 資訊按鈕（規則說明，永遠顯示，在燈泡左邊） */
#bagua-info-btn{position:absolute;top:3.5%;right:calc(3.5% + 56px);width:46px;height:46px;
  border-radius:50%;background:rgba(20,14,8,.85);border:1.5px solid var(--gold);
  color:#fff;font-size:22px;font-weight:700;font-family:'Shippori Mincho','Noto Serif TC',serif;
  display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:80;
  box-shadow:0 0 8px rgba(194,80,40,.35);}
#bagua-info-btn:hover{background:rgba(194,80,40,.2);border-color:#fff;}
#bagua-info-view{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.9);z-index:96;padding:5%;}
#bagua-info-view.on{display:flex;}
#bgi-box{background:#0a0704;border:1.5px solid var(--gold);border-radius:3px;
  padding:24px 28px;max-width:560px;width:100%;max-height:88%;overflow-y:auto;
  font-family:'Shippori Mincho','Noto Serif TC',serif;color:#fff;
  font-size:1em;line-height:2;letter-spacing:.05em;font-weight:500;}
#bgi-title{color:var(--gold);font-size:1.2em;letter-spacing:.45em;text-align:center;
  padding-bottom:12px;border-bottom:1px solid var(--gold-dim);margin-bottom:14px;font-weight:700;}
#bgi-content{white-space:pre-wrap;}
#bgi-close{margin-top:18px;display:block;margin-left:auto;padding:8px 24px;background:none;
  border:1px solid var(--gold);color:#fff;
  font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:.95em;letter-spacing:.3em;
  cursor:pointer;border-radius:2px;font-weight:600;}
#bgi-close:hover{background:rgba(194,80,40,.18);}
#bagua-hint-view{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.92);z-index:82;flex-direction:column;gap:18px;padding:5%;}
#bagua-hint-view.on{display:flex;}
#bagua-hint-view img{max-width:90%;max-height:80%;object-fit:contain;border:1px solid var(--gold-dim);}
/* 咒文卷軸（左下） */
#bagua-scroll-btn{position:absolute;bottom:4%;left:4%;width:46px;height:46px;border-radius:4px;
  background:linear-gradient(135deg,#3a2a14,#1a1208);border:1px solid var(--gold-dim);
  color:var(--gold);font-size:22px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:80;}
#bagua-scroll-btn:hover{background:linear-gradient(135deg,#4a3618,#2a1e0c);border-color:var(--gold);}
#bagua-incantation{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.78);z-index:81;padding:4%;flex-direction:column;}
#bagua-incantation.on{display:flex;}
/* 九宮格：3 + 3 + 2 排版（6-col grid，每篇 span 2，最後兩篇置中） */
#bagua-inc-content{max-width:880px;width:96%;max-height:92%;overflow-y:auto;color:#f0e0c0;
  display:grid;grid-template-columns:repeat(6,1fr);gap:10px 10px;
  grid-auto-rows:1fr;}
.bg-inc-block{grid-column:span 2;background:rgba(20,14,8,.88);border-left:2px solid var(--gold);
  padding:9px 12px 10px;font-family:'Shippori Mincho','Noto Serif TC',serif;
  line-height:1.7;letter-spacing:.02em;white-space:pre-wrap;
  font-size:13px;min-height:140px;display:flex;flex-direction:column;gap:4px;
  opacity:0;transition:opacity .55s ease,filter .55s ease;}
.bg-inc-block.on{opacity:1;}
.bg-inc-block.blur{filter:blur(4px);}
.bg-inc-block .bg-inc-no{color:var(--gold);font-size:11px;letter-spacing:.35em;display:block;margin-bottom:2px;}
.bg-inc-block .bg-inc-text{flex:1;}
/* 第 7、8 篇分別放第 3 列的中間兩格 */
.bg-inc-block:nth-child(7){grid-column:2 / span 2;}
.bg-inc-block:nth-child(8){grid-column:4 / span 2;}
#bagua-inc-close{position:absolute;top:14px;right:18px;background:none;border:1px solid var(--gold-dim);
  color:var(--gold);padding:5px 14px;font:13px 'Shippori Mincho','Noto Serif TC',serif;letter-spacing:.3em;
  cursor:pointer;border-radius:2px;}
#bagua-progress{position:absolute;top:3.5%;left:3.5%;color:var(--gold);font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:14px;letter-spacing:.3em;background:rgba(10,7,4,.7);padding:6px 14px;border:1px solid var(--gold-dim);border-radius:2px;z-index:80;}

/* ── Puzzle stage（5×5 記憶翻牌拼圖） ── */
#stage-puzzle{position:absolute;inset:0;display:none;z-index:78;
  background:radial-gradient(ellipse at 50% 50%,#1a1208 0%,#000 80%);
  align-items:center;justify-content:center;overflow:hidden;}
#stage-puzzle.on{display:flex;}
#puzzle-grid{display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);
  gap:4px;width:min(86vh,86vw);aspect-ratio:1;padding:8px;
  background:linear-gradient(135deg,#2a1e0c,#140e06);border:1px solid var(--gold-dim);border-radius:4px;}
.puzzle-card{position:relative;aspect-ratio:1;cursor:pointer;perspective:600px;}
.puzzle-card-inner{position:absolute;inset:0;transition:transform .35s;transform-style:preserve-3d;}
.puzzle-card.flipped .puzzle-card-inner{transform:rotateY(180deg);}
.puzzle-face,.puzzle-back{position:absolute;inset:0;backface-visibility:hidden;
  -webkit-backface-visibility:hidden;border-radius:3px;overflow:hidden;}
.puzzle-back{background:linear-gradient(135deg,#3a2a14,#1a1208);border:1px solid var(--gold-dim);
  display:flex;align-items:center;justify-content:center;}
.puzzle-back::after{content:'';position:absolute;inset:5px;border:1px dashed rgba(194,80,40,.3);border-radius:2px;}
.puzzle-back-mark{font-family:'Shippori Mincho','Noto Serif TC',serif;color:rgba(194,80,40,.55);font-size:1.2em;letter-spacing:.2em;}
.puzzle-face{transform:rotateY(180deg);background:#0a0604;border:1px solid var(--gold-dim);}
.puzzle-face img{width:100%;height:100%;object-fit:cover;display:block;}
.puzzle-face .puzzle-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--gold-dim);font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:1.6em;letter-spacing:.1em;}
.puzzle-num{position:absolute;top:2px;left:3px;background:rgba(10,7,4,.9);color:var(--gold);
  font-size:10px;padding:1px 5px;border-radius:1px;letter-spacing:.05em;
  font-family:'Shippori Mincho','Noto Serif TC',serif;}
.puzzle-card.selected .puzzle-back,.puzzle-card.selected .puzzle-face{
  border-color:var(--gold);box-shadow:0 0 10px rgba(194,80,40,.6);}
.puzzle-card.correct .puzzle-face{
  border-color:#30c090;box-shadow:0 0 8px rgba(48,192,144,.45) inset;}
.puzzle-card.flash-reject .puzzle-back,
.puzzle-card.flash-reject .puzzle-face{
  border-color:#c04040!important;box-shadow:0 0 10px rgba(200,60,60,.55);
  animation:pz-reject-shake .42s ease;}
@keyframes pz-reject-shake{
  0%,100%{transform:translate(0,0);}
  25%{transform:translate(-3px,0);}
  75%{transform:translate(3px,0);}
}
#puzzle-progress{position:absolute;top:6px;right:14px;font-size:11px;color:var(--gold-dim);letter-spacing:.2em;
  background:rgba(10,7,4,.6);padding:3px 9px;border-radius:2px;z-index:3;pointer-events:none;
  font-family:'Shippori Mincho','Noto Serif TC',serif;}
#puzzle-errors{position:absolute;top:6px;left:14px;font-size:11px;color:var(--gold-dim);letter-spacing:.2em;
  background:rgba(10,7,4,.6);padding:3px 9px;border-radius:2px;z-index:3;pointer-events:none;
  font-family:'Shippori Mincho','Noto Serif TC',serif;transition:color .3s;}
#puzzle-errors.warning{color:#e0a060;}
#puzzle-errors.danger{color:#ff7060;text-shadow:0 0 6px rgba(255,80,80,.5);}
#stage-puzzle.flash-reset::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(220,80,80,0) 30%,rgba(220,40,40,.55) 100%);
  pointer-events:none;z-index:88;animation:flash-soft 1.4s ease both;}
#puzzle-reset-msg{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);
  text-align:center;font-family:'Shippori Mincho','Noto Serif TC',serif;
  color:#ff7060;font-size:2.2em;letter-spacing:.6em;
  text-shadow:0 0 16px rgba(255,80,80,.6);

/* 規則燈泡（永遠顯示，點開看規則） */

    radial-gradient(ellipse at 30% 18%,rgba(255,200,140,.14) 0%,transparent 55%),

    linear-gradient(135deg,#9a3818 0%,#5a1c08 50%,#6b2818 100%);

    radial-gradient(ellipse at 50% 50%,rgba(80,40,20,.35) 0%,rgba(10,4,2,.85) 100%),
    /* 垂直條紋木板 */
    repeating-linear-gradient(92deg,#3a1f10 0px,#3a1f10 60px,#2a1408 60px,#2a1408 62px);
  overflow:hidden;
  box-shadow:
    inset 0 0 0 1px rgba(232,220,196,.18),  /* 內襯細邊 */
    inset 0 0 22px rgba(0,0,0,.7),
    0 3px 8px rgba(0,0,0,.65);
  transition:box-shadow .2s,border-color .2s;min-height:0;}
.bm-zone.target{border-color:var(--brick-light);
  box-shadow:
    inset 0 0 0 1px rgba(232,220,196,.4),
    inset 0 0 18px rgba(0,0,0,.5),
    0 0 20px rgba(216,112,80,.55),
    0 4px 10px rgba(0,0,0,.7);}
/* 四角 L 形裝飾 */
.bm-zone::before,.bm-zone::after{content:'';position:absolute;width:14px;height:14px;
  pointer-events:none;z-index:3;
  border-color:var(--brick-light);border-style:solid;border-width:0;}
.bm-zone::before{top:5px;left:5px;border-top-width:2px;border-left-width:2px;}
.bm-zone::after{bottom:5px;right:5px;border-bottom-width:2px;border-right-width:2px;}
.bm-zone-label{position:absolute;top:5px;left:8px;color:var(--gold);
  font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:.78em;letter-spacing:.3em;font-weight:700;
  background:rgba(10,7,4,.55);padding:2px 8px;border-radius:2px;z-index:2;
  pointer-events:none;}
.bm-zone-progress{position:absolute;bottom:5px;right:8px;color:#fff;
  font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:.72em;letter-spacing:.2em;background:rgba(10,7,4,.55);
  padding:2px 6px;border-radius:2px;z-index:2;pointer-events:none;}
.bm-zone-content{position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;gap:0;
  pointer-events:none;}
.bm-zone-content > *{pointer-events:auto;}
.bm-zone-hint{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);
  color:var(--gold-dim);opacity:.5;font-size:.74em;letter-spacing:.25em;
  font-family:'Shippori Mincho','Noto Serif TC',serif;
  pointer-events:none;text-align:center;white-space:nowrap;}

#bm-z-clay{flex:1;}
#bm-z-mold{flex:1;}
#bm-z-bench{flex:1.4;}

/* 黏土區 視覺 */
.bm-dirt-mound{
  background:radial-gradient(ellipse at 50% 30%,#8b6035 0%,#4a2812 70%,#2a1408 100%);
  border-radius:50% 50% 14% 14% / 70% 70% 14% 14%;
  box-shadow:0 5px 12px rgba(0,0,0,.7),inset 0 -8px 10px rgba(0,0,0,.5);
  position:relative;}
.bm-dirt-mound.lvl0{width:42%;aspect-ratio:2/1;opacity:.95;}
.bm-dirt-mound.lvl1{width:50%;aspect-ratio:1.8/1;opacity:.95;}
.bm-dirt-mound.lvl2{width:56%;aspect-ratio:1.6/1;}
.bm-dirt-mound.lvl3{width:62%;aspect-ratio:1.4/1;
  background:radial-gradient(ellipse at 50% 30%,#a07045 0%,#5a3018 70%,#2a1408 100%);}
.bm-dirt-mound.muddy{
  background:radial-gradient(ellipse at 50% 40%,#5a3a1a 0%,#2a1808 80%);
  filter:saturate(1.3) brightness(.9);}
.bm-clay-block{width:48%;aspect-ratio:1.6/1;
  background:radial-gradient(ellipse at 30% 30%,#9b6a40 0%,#5a3018 80%);
  border-radius:14% / 28%;
  box-shadow:0 6px 12px rgba(0,0,0,.7),inset 0 -5px 8px rgba(0,0,0,.4);
  cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;
  transition:transform .15s;position:relative;}
.bm-clay-block:hover{transform:scale(1.05);}
.bm-clay-block.flying{position:fixed!important;z-index:100000;pointer-events:none;cursor:grabbing;
  box-shadow:0 10px 18px rgba(0,0,0,.85);transform:rotate(-2deg);transition:none;inset:auto;}
.bm-shake-h{animation:bm-strike-h .35s ease;}
@keyframes bm-strike-h{0%,100%{transform:translateY(0);}40%{transform:translateY(8px) scale(.96,1.04);}70%{transform:translateY(-2px);}}

/* 模具區 視覺 */
.bm-wood{width:48%;aspect-ratio:1/1;
  background:linear-gradient(135deg,#7a5530 0%,#3e2a16 100%);
  border:2px solid #1a1208;border-radius:3px;position:relative;
  box-shadow:0 5px 12px rgba(0,0,0,.7),inset 0 0 10px rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
  color:transparent;overflow:hidden;}
.bm-wood::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,
    rgba(0,0,0,0) 0px,rgba(0,0,0,0) 8px,
    rgba(0,0,0,.18) 8px,rgba(0,0,0,.18) 9px);
  pointer-events:none;}
.bm-wood.designed{color:rgba(240,229,208,.18);}
.bm-wood.carved{color:rgba(0,0,0,.65);
  background:linear-gradient(135deg,#9a7045 0%,#5a3a1c 100%);
  cursor:grab;}
.bm-wood.carved:hover{transform:scale(1.04);}
.bm-wood.carved.flying{position:fixed!important;z-index:100000;pointer-events:none;cursor:grabbing;
  box-shadow:0 10px 18px rgba(0,0,0,.85);transform:rotate(-2deg);transition:none;inset:auto;}
.bm-wood svg{width:70%;height:70%;position:relative;z-index:1;}

/* 印花區 視覺（最終 assembly） */
.bm-bench-clay{width:38%;aspect-ratio:1.5/1;
  background:radial-gradient(ellipse at 50% 40%,#9b6a40 0%,#5a3018 80%);
  border-radius:14% / 28%;
  box-shadow:0 6px 12px rgba(0,0,0,.7),inset 0 -5px 8px rgba(0,0,0,.4);
  position:relative;display:flex;align-items:center;justify-content:center;
  color:rgba(0,0,0,.55);}
.bm-bench-imprints{position:absolute;inset:6%;
  display:flex;align-items:center;justify-content:center;
  color:rgba(20,8,4,.65);pointer-events:none;}
.bm-bench-imprints svg{width:100%;height:100%;}
.bm-bench-mold{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);
  width:62%;aspect-ratio:1/1;
  background:linear-gradient(135deg,#9a7045 0%,#5a3a1c 100%);
  border:2px solid #1a1208;border-radius:4px;
  box-shadow:0 5px 12px rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;
  color:rgba(0,0,0,.65);}
.bm-bench-mold svg{width:72%;height:72%;}
.bm-bench-mold.pressing{animation:bm-press-down .35s ease;}
@keyframes bm-press-down{0%,100%{transform:translate(-50%,-50%);}50%{transform:translate(-50%,calc(-50% + 8px));}}
.bm-bench-tile{width:30%;aspect-ratio:1/1;
  background:linear-gradient(135deg,#aa6035 0%,#6b3520 100%);
  border:2px solid #2a1208;border-radius:4px;
  display:flex;align-items:center;justify-content:center;color:#1a0a04;
  cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;
  box-shadow:0 6px 14px rgba(0,0,0,.8),inset 0 0 14px rgba(0,0,0,.4);
  transition:transform .15s;}
.bm-bench-tile:hover{transform:scale(1.04);}
.bm-bench-tile.flying{position:fixed!important;z-index:100000;pointer-events:none;cursor:grabbing;
  box-shadow:0 10px 18px rgba(0,0,0,.85);transform:rotate(-2deg);transition:none;inset:auto;}
.bm-bench-tile svg{width:72%;height:72%;}

/* 水滴動畫 */
.bm-water-drop{position:absolute;left:50%;top:8%;
  width:12px;height:18px;
  background:radial-gradient(ellipse at 50% 30%,#80b8d0,#3070a0);
  border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  transform:translateX(-50%);
  animation:bm-drop 1.2s ease forwards;
  pointer-events:none;z-index:3;}
@keyframes bm-drop{0%{top:0;opacity:1;}100%{top:60%;opacity:0;}}

/* 工具箱 */
#bm-tray{flex:2;min-width:200px;
  background:linear-gradient(135deg,#2a1810 0%,#150a05 100%);
  border:1px solid var(--gold-dim);border-radius:4px;
  padding:10px;display:grid;grid-template-columns:repeat(2,1fr);
  gap:8px;align-content:start;overflow-y:auto;min-height:0;
  box-shadow:inset 0 0 20px rgba(0,0,0,.5);}
.bm-tool{background:linear-gradient(135deg,#3a2818,#1a1208);
  border:1px solid var(--gold-dim);border-radius:3px;
  padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;
  transition:transform .15s,border-color .15s,box-shadow .15s;}
.bm-tool:hover{transform:translateY(-2px);border-color:var(--gold);
  box-shadow:0 4px 10px rgba(0,0,0,.6);}
.bm-tool.flying{position:fixed!important;z-index:100000;pointer-events:none;cursor:grabbing;
  box-shadow:0 8px 16px rgba(0,0,0,.85);transform:rotate(-2deg);transition:none;inset:auto;}
.bm-tool-icon{width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;font-size:1.5em;
  flex-shrink:0;}
.bm-tool-icon.bm-ico-shovel{
  background:linear-gradient(135deg,#5a4030,#2a1810);
  border:2px solid #1a1208;border-radius:4px 4px 14px 14px;color:#f0d8b0;}
.bm-tool-icon.bm-ico-water{
  background:radial-gradient(ellipse at 50% 30%,#5095b8,#1a4a70);
  border:2px solid #1a1208;border-radius:50%;color:#fff;}
.bm-tool-icon.bm-ico-knife{
  background:linear-gradient(135deg,#a0a0a8,#404048);
  border:2px solid #1a1208;border-radius:2px 8px 2px 8px;color:#1a1208;}
.bm-tool-icon.bm-ico-mallet{
  background:linear-gradient(135deg,#5a4030,#2a1810);
  border:2px solid #1a1208;border-radius:4px;color:#f0d8b0;}
.bm-tool-icon.bm-ico-scraper{
  background:linear-gradient(135deg,#7a6a55,#3a3020);
  border:2px solid #1a1208;border-radius:2px;color:#f0d8b0;}
.bm-tool-icon.bm-ico-design{
  background:linear-gradient(135deg,#d8c8a0,#a08a60);
  border:2px solid #5a4020;border-radius:2px;color:#3a1a08;
  box-shadow:inset 0 0 6px rgba(0,0,0,.2);}
.bm-tool-icon.bm-ico-design svg{width:74%;height:74%;}
.bm-tool-icon.bm-ico-cloth{
  background:repeating-linear-gradient(45deg,#a08b70,#a08b70 6px,#7a6555 6px,#7a6555 12px);
  border:2px solid #1a1208;border-radius:2px;color:#fff;}
.bm-tool-label{color:#fff;
  font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:.72em;letter-spacing:.15em;text-align:center;line-height:1.3;}
#bm-msg{position:absolute;left:50%;top:9%;transform:translate(-50%,0);
  background:rgba(10,7,4,.92);color:var(--gold);
  padding:9px 22px;border:1px solid var(--gold-dim);border-radius:3px;
  font-family:'Shippori Mincho','Noto Serif TC',serif;letter-spacing:.2em;
  z-index:7;pointer-events:none;opacity:0;transition:opacity .25s;
  white-space:nowrap;font-size:.9em;}
#bm-msg.show{opacity:1;}
#bm-msg.err{color:#ff9090;border-color:rgba(200,80,80,.6);}
#bm-flash{position:absolute;inset:0;pointer-events:none;z-index:6;
  background:rgba(120,40,40,0);transition:background .15s;}
#bm-flash.shake{background:rgba(120,40,40,.35);animation:pz-reject-shake .55s ease;}
#bm-win-text{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);
  text-align:center;color:var(--gold);font-size:2.4em;letter-spacing:.6em;font-weight:700;
  font-family:'Shippori Mincho','Noto Serif TC',serif;
  text-shadow:0 0 18px rgba(240,229,208,.6);
  animation:bagua-win-fade 1.6s ease both;z-index:90;pointer-events:none;}

/* ── Dreamwalk（夢境探索：8 區域棋盤） ── */
#stage-dreamwalk{position:absolute;inset:0;display:none;z-index:78;
  background:#000;font-family:'Shippori Mincho','Noto Serif TC',serif;}
#stage-dreamwalk.on{display:block;}
/* 左上 mini-map */
#dw-minimap{position:absolute;top:18px;left:60px;
  padding:10px 12px;background:rgba(20,12,8,.88);
  border:2px solid var(--brick-dark);border-radius:3px;
  box-shadow:0 4px 12px rgba(0,0,0,.7),inset 0 0 0 1px rgba(232,220,196,.12);
  z-index:6;}
.dw-mm-title{color:var(--brick-light);font-size:11px;letter-spacing:.4em;
  text-align:center;font-weight:700;margin-bottom:6px;
  border-bottom:1px solid rgba(216,112,80,.35);padding-bottom:4px;}
#dw-mm-canvas{display:block;
  background:linear-gradient(135deg,rgba(40,20,12,.4) 0%,rgba(10,4,2,.6) 100%);
  border:1px solid rgba(232,220,196,.18);}
#dw-mm-label{margin-top:6px;color:var(--stone);
  font-size:11px;letter-spacing:.3em;text-align:center;font-weight:700;}
/* 中央十字按鈕 */
#dw-controls{position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  display:grid;gap:10px;
  grid-template-columns:auto auto auto;
  grid-template-rows:auto auto auto;
  grid-template-areas:". up ." "left . right" ". down .";
  align-items:center;justify-items:center;z-index:5;}
.dw-btn{width:78px;height:78px;
  background:linear-gradient(180deg,var(--brick) 0%,var(--brick-dark) 100%);
  border:2px solid var(--brick-dark);
  color:var(--stone);
  font-size:32px;font-weight:700;
  cursor:pointer;border-radius:4px;
  font-family:inherit;letter-spacing:.1em;
  box-shadow:0 4px 10px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,200,160,.25);
  transition:all .12s;user-select:none;-webkit-user-select:none;}
.dw-btn:hover{background:linear-gradient(180deg,var(--brick-light) 0%,var(--brick) 100%);
  box-shadow:0 6px 14px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,200,160,.3);
  transform:translateY(-1px);}
.dw-btn:active{transform:translateY(2px);
  box-shadow:0 2px 4px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,200,160,.2);}
.dw-up   {grid-area:up;}
.dw-down {grid-area:down;}
.dw-left {grid-area:left;}
.dw-right{grid-area:right;}
/* 走到區域入口的訊息 */
#dw-zone-msg{position:absolute;left:50%;top:72%;transform:translateX(-50%);
  padding:12px 28px;background:rgba(20,12,8,.94);
  border:2px solid var(--brick);border-radius:3px;
  color:var(--stone);font-size:14px;letter-spacing:.3em;font-weight:700;
  z-index:7;pointer-events:none;opacity:0;transition:opacity .3s;
  white-space:nowrap;box-shadow:0 6px 16px rgba(0,0,0,.75);}
#dw-zone-msg.show{opacity:1;}
#dw-zone-msg.boundary{border-color:var(--text-dim);color:var(--text-dim);}
/* 頂端：生命值 + 進度 */
#dw-top{position:absolute;top:18px;left:50%;transform:translateX(-50%);
  display:flex;gap:24px;align-items:center;z-index:6;
  background:rgba(20,12,8,.88);
  border:1px solid var(--brick-dark);border-radius:3px;
  padding:8px 18px;}
#dw-hearts{display:flex;gap:4px;}
.dw-heart{display:inline-block;width:18px;height:18px;
  font-size:18px;line-height:18px;color:#e87050;
  text-shadow:0 0 6px rgba(232,112,80,.6);
  transition:opacity .25s,transform .25s,color .25s;}
.dw-heart.lost{color:#3a2010;text-shadow:none;opacity:.35;}
.dw-heart.shake{animation:dw-heart-shake .55s ease;}
@keyframes dw-heart-shake{0%,100%{transform:translateX(0);}
  20%{transform:translateX(-3px) scale(1.2);}
  40%{transform:translateX(3px) scale(1.15);}
  60%{transform:translateX(-2px) scale(1.1);}
  80%{transform:translateX(2px);}}
#dw-progress{color:var(--stone);font-size:12px;letter-spacing:.25em;
  font-family:'Shippori Mincho','Noto Serif TC',serif;font-weight:700;
  display:none;}
#dw-progress.show{display:block;}
/* 進入區域按鈕（外圖踩到區域格時顯示） */
#dw-enter-btn{position:absolute;left:50%;top:72%;transform:translateX(-50%);
  display:none;padding:14px 32px;
  background:linear-gradient(180deg,var(--brick-light) 0%,var(--brick) 100%);
  border:2px solid var(--brick-dark);border-radius:3px;
  color:var(--stone);font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:16px;letter-spacing:.45em;font-weight:700;cursor:pointer;z-index:8;
  box-shadow:0 6px 18px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,200,160,.3);
  animation:dw-enter-pulse 1.6s ease-in-out infinite alternate;}
#dw-enter-btn.show{display:block;}
@keyframes dw-enter-pulse{from{box-shadow:0 6px 18px rgba(0,0,0,.75),0 0 12px rgba(232,112,80,.35),inset 0 1px 0 rgba(255,200,160,.3);}
  to{box-shadow:0 6px 18px rgba(0,0,0,.75),0 0 22px rgba(232,112,80,.7),inset 0 1px 0 rgba(255,200,160,.3);}}
#dw-enter-btn:hover{transform:translateX(-50%) translateY(-2px);}
/* 紙條 popup（內圖踩到紙條格時顯示） */
#dw-slip-popup{position:absolute;left:50%;top:72%;transform:translateX(-50%);
  display:none;flex-direction:column;align-items:center;gap:10px;
  padding:18px 28px;min-width:260px;
  background:linear-gradient(180deg,#f0e5d0 0%,#dcc8a8 100%);
  border:3px double var(--brick-dark);border-radius:3px;
  box-shadow:0 8px 24px rgba(0,0,0,.8),inset 0 0 0 1px rgba(255,255,255,.4);
  color:#2a1408;font-family:'Shippori Mincho','Noto Serif TC',serif;z-index:8;}
#dw-slip-popup.show{display:flex;animation:dw-sp-pop .3s ease both;}
@keyframes dw-sp-pop{from{opacity:0;transform:translateX(-50%) scale(.85);}to{opacity:1;transform:translateX(-50%) scale(1);}}
.dw-sp-prompt{font-size:12px;letter-spacing:.4em;color:var(--brick-dark);
  border-bottom:1px solid var(--brick-dark);padding-bottom:6px;}
.dw-sp-text{font-size:22px;letter-spacing:.3em;font-weight:700;color:#1a0a04;
  padding:4px 0;white-space:nowrap;}
.dw-sp-btns{display:flex;gap:14px;margin-top:4px;}
.dw-sp-pick,.dw-sp-skip{padding:7px 22px;font-family:inherit;
  font-size:13px;letter-spacing:.4em;font-weight:700;
  border:2px solid var(--brick-dark);border-radius:2px;cursor:pointer;}
.dw-sp-pick{background:linear-gradient(180deg,var(--brick) 0%,var(--brick-dark) 100%);
  color:var(--stone);}
.dw-sp-pick:hover{background:linear-gradient(180deg,var(--brick-light) 0%,var(--brick) 100%);}
.dw-sp-skip{background:#dcc8a8;color:#3a1f10;}
.dw-sp-skip:hover{background:#c8b89c;}
/* 全螢幕紅閃／淡黑 */
#dw-flash{position:absolute;inset:0;pointer-events:none;z-index:9;
  background:rgba(120,40,40,0);transition:background .25s;}
#dw-flash.red{background:rgba(160,40,40,.4);animation:pz-reject-shake .55s ease;}
#dw-flash.black{background:#000;transition:background .8s;}
/* 離開區域鈕（內圖右上） */
#dw-leave-btn{position:absolute;top:18px;right:20px;
  display:none;padding:8px 18px;background:rgba(20,12,8,.85);
  border:1px solid var(--brick-dark);border-radius:2px;
  color:var(--text-dim);font-family:inherit;
  font-size:12px;letter-spacing:.3em;cursor:pointer;z-index:6;transition:all .15s;}
#dw-leave-btn.show{display:block;}
#dw-leave-btn:hover{color:var(--stone);border-color:var(--brick);}

/* ── Klotski（華容道：8 塊磚圖＋完成確認） ── */
#stage-klotski{position:absolute;inset:0;display:none;z-index:78;
  background:radial-gradient(ellipse at 50% 50%,#2a1408 0%,#0a0402 80%);
  flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:3%;}
#stage-klotski.on{display:flex;}
#kl-warning{color:var(--brick-light);
  font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:1.15em;letter-spacing:.35em;font-weight:700;text-align:center;
  text-shadow:0 0 12px rgba(232,112,80,.45);
  padding:14px 28px;
  border:2px solid var(--brick-dark);background:rgba(20,12,8,.8);
  border-radius:3px;max-width:80%;line-height:1.8;
  animation:kl-warn-pulse 2s ease-in-out infinite alternate;}
@keyframes kl-warn-pulse{from{box-shadow:0 0 16px rgba(232,112,80,.3);}to{box-shadow:0 0 28px rgba(232,112,80,.6);}}
#kl-grid{display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;width:min(520px,82%);
  padding:14px;background:rgba(20,12,8,.5);
  border:2px solid var(--brick-dark);border-radius:4px;
  box-shadow:inset 0 0 18px rgba(0,0,0,.7);}
.kl-block{aspect-ratio:1/1;
  background:linear-gradient(135deg,#3a2010 0%,#1a0e08 100%);
  border:1px solid var(--brick-dark);border-radius:2px;
  background-size:cover;background-position:center;
  box-shadow:0 3px 6px rgba(0,0,0,.6),inset 0 0 0 1px rgba(232,220,196,.08);
  transition:transform .15s;}
.kl-block:hover{transform:scale(1.03);}
/* 空格（華容道的「滑動空位」） */
.kl-block.kl-empty{
  background:repeating-linear-gradient(45deg,
    rgba(232,220,196,.05) 0 8px,rgba(0,0,0,.25) 8px 9px),
    linear-gradient(135deg,#1a0e08 0%,#080402 100%);
  border:1px dashed rgba(232,220,196,.18);
  box-shadow:inset 0 0 18px rgba(0,0,0,.85);}
.kl-block.kl-empty:hover{transform:none;}
#kl-done-btn{padding:14px 32px;
  background:linear-gradient(180deg,var(--brick) 0%,var(--brick-dark) 100%);
  border:2px solid var(--brick-dark);border-radius:3px;
  color:var(--stone);font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:16px;letter-spacing:.4em;font-weight:700;cursor:pointer;
  box-shadow:0 6px 16px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,200,160,.3);
  transition:all .15s;}
#kl-done-btn:hover{background:linear-gradient(180deg,var(--brick-light) 0%,var(--brick) 100%);
  transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,200,160,.35);}
#kl-done-btn:active{transform:translateY(2px);}
#kl-confirm{position:absolute;inset:0;display:none;z-index:5;
  background:rgba(8,4,2,.78);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  align-items:center;justify-content:center;}
#kl-confirm.on{display:flex;animation:im-fade .25s ease both;}
.kl-cf-frame{padding:32px 40px;
  background:linear-gradient(180deg,#f5ead4 0%,#dcc8a8 100%);
  border:5px double var(--brick-dark);
  box-shadow:0 18px 60px rgba(0,0,0,.85);
  color:#1a0a04;text-align:center;font-family:'Shippori Mincho','Noto Serif TC',serif;}
.kl-cf-text{font-size:1.3em;letter-spacing:.45em;font-weight:700;
  color:var(--brick-dark);margin-bottom:22px;
  border-bottom:2px solid var(--brick-dark);padding-bottom:14px;}
.kl-cf-btns{display:flex;gap:18px;justify-content:center;}
.kl-cf-yes,.kl-cf-no{padding:10px 36px;border-radius:2px;border:2px solid var(--brick-dark);
  font-family:inherit;font-size:14px;letter-spacing:.5em;font-weight:700;cursor:pointer;}
.kl-cf-yes{background:linear-gradient(180deg,var(--brick) 0%,var(--brick-dark) 100%);color:var(--stone);}
.kl-cf-yes:hover{background:linear-gradient(180deg,var(--brick-light) 0%,var(--brick) 100%);}
.kl-cf-no{background:#dcc8a8;color:#3a1f10;}
.kl-cf-no:hover{background:#c8b89c;}

#stage-phylock{position:absolute;inset:0;display:none;z-index:78;
  background:radial-gradient(ellipse at 50% 30%,#1a1208 0%,#000 80%);
  align-items:center;justify-content:center;flex-direction:column;gap:14px;
  padding:2% 5%;overflow-y:auto;}
#stage-phylock.on{display:flex;}
#pl-title{font-family:'Shippori Mincho','Noto Serif TC',serif;color:var(--gold);
  font-size:1.6em;letter-spacing:.5em;text-shadow:0 0 14px rgba(232,112,80,.4);}
#pl-hint{font-family:'Shippori Mincho','Noto Serif TC',serif;color:var(--text);
  font-size:1em;letter-spacing:.15em;text-align:center;line-height:1.9;max-width:80%;
  white-space:pre-wrap;}
/* 4 個顯示格 */
#pl-slots{display:flex;gap:14px;}
.pl-slot{width:52px;height:64px;
  background:linear-gradient(180deg,#2a1810 0%,#1a0e08 100%);
  border:2px solid var(--brick-dark);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:2em;font-weight:700;color:var(--stone);
  box-shadow:inset 0 0 14px rgba(0,0,0,.7),0 4px 10px rgba(0,0,0,.55);
  position:relative;}
.pl-slot.filled{border-color:var(--brick);
  background:linear-gradient(180deg,#3a1810 0%,#1a0a04 100%);
  box-shadow:inset 0 0 18px rgba(232,112,80,.25),0 4px 10px rgba(0,0,0,.6),0 0 14px rgba(232,112,80,.45);}
.pl-slot.flash{animation:pl-slot-flash .35s ease;}
@keyframes pl-slot-flash{0%{transform:scale(1);}50%{transform:scale(1.15);box-shadow:0 0 26px rgba(232,160,80,.7);}100%{transform:scale(1);}}
/* 9 宮格鍵盤 */
#pl-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pl-key{width:60px;height:60px;
  background:linear-gradient(180deg,var(--brick) 0%,var(--brick-dark) 100%);
  border:2px solid var(--brick-dark);border-radius:4px;
  color:var(--stone);
  font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:1.7em;font-weight:700;cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,200,160,.25);
  transition:all .12s;user-select:none;-webkit-user-select:none;}
.pl-key:hover{background:linear-gradient(180deg,var(--brick-light) 0%,var(--brick) 100%);
  box-shadow:0 6px 14px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,200,160,.3);
  transform:translateY(-2px);}
.pl-key:active{transform:translateY(2px);
  box-shadow:0 2px 4px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,200,160,.2);}
.pl-key:disabled{opacity:.35;cursor:default;}
.pl-key:disabled:hover{transform:none;background:linear-gradient(180deg,var(--brick) 0%,var(--brick-dark) 100%);}
.pl-key.pressed{animation:pl-key-press .25s ease;}
@keyframes pl-key-press{0%{transform:scale(1);}50%{transform:scale(.8);opacity:.4;}100%{transform:scale(1);opacity:1;}}
#pl-clear{padding:6px 18px;
  background:rgba(20,12,8,.9);border:1px solid var(--text-dim);
  border-radius:2px;color:var(--text-dim);
  font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:12px;letter-spacing:.3em;cursor:pointer;
  transition:all .15s;}
#pl-clear:hover{color:var(--stone);border-color:var(--brick);}
#pl-unlock-btn,#pl-continue-btn{display:none;
  padding:14px 36px;
  background:linear-gradient(180deg,var(--brick) 0%,var(--brick-dark) 100%);
  border:2px solid var(--brick-dark);border-radius:3px;
  color:var(--stone);font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:18px;letter-spacing:.5em;font-weight:700;cursor:pointer;
  box-shadow:0 6px 16px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,200,160,.3);
  animation:pl-btn-pulse 1.6s ease-in-out infinite alternate;
  transition:all .15s;}
#pl-unlock-btn.show,#pl-continue-btn.show{display:block;}
#pl-unlock-btn:hover,#pl-continue-btn:hover{
  background:linear-gradient(180deg,var(--brick-light) 0%,var(--brick) 100%);
  transform:translateY(-2px);}
#pl-unlock-btn:active,#pl-continue-btn:active{transform:translateY(2px);}
#pl-unlock-btn:disabled,#pl-continue-btn:disabled{opacity:.5;cursor:default;animation:none;}
@keyframes pl-btn-pulse{from{box-shadow:0 6px 16px rgba(0,0,0,.7),0 0 14px rgba(232,112,80,.35),inset 0 1px 0 rgba(255,200,160,.3);}
  to{box-shadow:0 6px 16px rgba(0,0,0,.7),0 0 26px rgba(232,112,80,.7),inset 0 1px 0 rgba(255,200,160,.3);}}
/* 飛行數字（按鈕到 slot 的動畫） */
#pl-fly{position:absolute;inset:0;pointer-events:none;z-index:5;}
.pl-fly-digit{position:absolute;
  font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:2em;font-weight:700;color:var(--gold-bright);
  text-shadow:0 0 12px rgba(232,160,80,.7);
  pointer-events:none;
  transition:left .42s cubic-bezier(.2,.7,.3,1.1),top .42s cubic-bezier(.2,.7,.3,1.1),
    transform .42s ease,opacity .42s ease;}
#pl-input.shake{animation:hg-shake .35s;}
#pl-submit{padding:11px 36px;background:none;border:1px solid var(--gold);
  color:var(--gold);font-family:'Shippori Mincho','Noto Serif TC',serif;
  font-size:1em;letter-spacing:.4em;cursor:pointer;border-radius:2px;transition:all .2s;}
#pl-submit:hover{background:rgba(194,80,40,.18);}
#pl-submit:disabled{opacity:.4;cursor:wait;}
#pl-status{font-family:'Shippori Mincho','Noto Serif TC',serif;color:var(--text-dim);
  font-size:.95em;letter-spacing:.2em;min-height:1.6em;text-align:center;
  transition:color .2s;}
#pl-status.ok{color:#60c090;}
#pl-status.err{color:#e07060;}
#pl-status.warn{color:#e8b840;}
#pl-status.busy{color:var(--gold-dim);}

/* ── Image-only event（全螢幕展示一張圖，自動消失） ── */
#image-ev{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  background:#000;z-index:75;opacity:0;transition:opacity .3s;}
#image-ev.on{display:flex;opacity:1;}
#image-ev img{max-width:100%;max-height:100%;object-fit:contain;}

/* ── Dev toolbar（測試用；用 position:fixed 確保永遠浮在所有舞台之上） ── */
#dev-bar{position:fixed;top:6px;left:6px;z-index:99999;display:flex;gap:4px;
  background:rgba(6,4,2,.92);border:1px solid #4a3010;border-radius:3px;padding:4px;
  font-family:'Shippori Mincho','Noto Serif TC',serif;
  pointer-events:auto;}
#dev-bar.hidden{display:none;}
.dev-btn{background:rgba(20,14,8,.92);border:1px solid #4a3010;color:#c25028;
  font:11px 'Shippori Mincho','Noto Serif TC',serif;letter-spacing:.1em;
  padding:4px 9px;cursor:pointer;border-radius:2px;white-space:nowrap;}
.dev-btn:hover{background:rgba(194,80,40,.18);border-color:var(--gold);}
.dev-btn.danger{color:#e06060;border-color:#803030;}
#dev-status{color:#6b2818;font-size:10px;letter-spacing:.05em;padding:0 6px;display:flex;align-items:center;}
#dev-toggle{position:fixed;top:6px;left:6px;z-index:99998;background:rgba(6,4,2,.85);
  border:1px solid #6a4818;color:var(--gold);font:11px 'Shippori Mincho','Noto Serif TC',serif;
  padding:5px 10px;cursor:pointer;border-radius:2px;letter-spacing:.25em;
  pointer-events:auto;}
#dev-toggle:hover{color:#fff;border-color:var(--gold);background:rgba(194,80,40,.2);}

/* ── Loading ── */
#loading{
  position:fixed;inset:0;background:#000;display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:14px;z-index:9999;transition:opacity .5s;}
#loading p{color:var(--gold-dim);font-family:'Shippori Mincho','Noto Serif TC',serif;font-size:12px;letter-spacing:.5em;}
.spinner{width:28px;height:28px;border:2px solid var(--gold-dim);border-top-color:var(--gold);
  border-radius:50%;animation:spin .9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── 滑塊揭示（每塊滑塊解開後出現中央，玩家點擊進入回憶） ── */
#slider-reveal{position:absolute;inset:0;z-index:150;display:none;
  align-items:center;justify-content:center;flex-direction:column;gap:24px;
  background:radial-gradient(ellipse at 50% 50%,rgba(40,16,8,.55) 0%,rgba(0,0,0,.92) 70%);
  cursor:pointer;font-family:'Shippori Mincho','Noto Serif TC',serif;}
#slider-reveal.on{display:flex;animation:sr-fade .6s ease both;}
@keyframes sr-fade{from{opacity:0;}to{opacity:1;}}
.sr-tile{position:relative;width:200px;aspect-ratio:1/1;
  background:linear-gradient(135deg,#aa6035 0%,#6b3520 100%);
  border:3px solid var(--brick-dark);border-radius:6px;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  color:var(--stone);overflow:hidden;
  box-shadow:0 14px 40px rgba(0,0,0,.85),
    inset 0 0 18px rgba(0,0,0,.4),
    inset 0 0 0 2px rgba(232,220,196,.18);
  animation:sr-pop .8s cubic-bezier(.2,.7,.3,1.4) both;}
@keyframes sr-pop{from{transform:scale(.4) rotate(-12deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.sr-tile-icon{font-size:88px;line-height:1;z-index:2;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.7));}
.sr-tile-icon img{width:160px;height:160px;object-fit:cover;border-radius:3px;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.7));}
.sr-tile-name{position:absolute;bottom:8px;
  font-size:14px;letter-spacing:.4em;color:var(--stone);
  text-shadow:0 1px 3px rgba(0,0,0,.85);z-index:2;}
.sr-tile-glow{position:absolute;inset:-30px;
  background:radial-gradient(ellipse at 50% 50%,rgba(232,112,80,.45) 0%,transparent 60%);
  z-index:0;animation:sr-pulse 2s ease-in-out infinite alternate;pointer-events:none;}
@keyframes sr-pulse{from{opacity:.5;transform:scale(.95);}to{opacity:1;transform:scale(1.08);}}
.sr-hint{color:var(--stone-dim);font-size:14px;letter-spacing:.5em;
  animation:sr-blink 1.6s ease-in-out infinite;}
@keyframes sr-blink{50%{opacity:.4;}}

/* ── 回憶模式：半透明灰色蒙板 + 背景濾鏡（保留下方立繪/場景） ── */
#memory-bg{position:absolute;inset:0;z-index:140;display:none;
  pointer-events:none;  /* clicks 穿透 */
  background-color:rgba(40,40,52,.55);  /* 半透明灰 */
  /* 背景濾鏡讓底下的場景＋立繪變灰暗（瀏覽器不支援時退化為純灰蒙板） */
  -webkit-backdrop-filter:grayscale(.75) brightness(.65) contrast(1.05);
  backdrop-filter:grayscale(.75) brightness(.65) contrast(1.05);
  opacity:0;transition:opacity .8s;}
#memory-bg.on{display:block;opacity:1;}
#memory-bg.flicker{animation:mem-flicker 1.2s ease-in-out;}
@keyframes mem-flicker{
  0%,100%{opacity:1;}
  10%{opacity:.3;}
  20%{opacity:1;background-color:rgba(40,40,52,.85);}
  35%{opacity:.15;}
  50%{opacity:1;background-color:rgba(40,40,52,.55);}
  60%{opacity:.5;}
  75%{opacity:0;}
  90%{opacity:0;}
}
#memory-bg::before{content:'';position:absolute;inset:0;pointer-events:none;
  /* 邊緣暗角，讓中間視覺集中 */
  background:radial-gradient(ellipse at 50% 50%,transparent 0%,rgba(0,0,0,.35) 75%,rgba(0,0,0,.7) 100%);}
#memory-bg::after{content:'';position:absolute;inset:0;pointer-events:none;
  /* 老底片掃描線 */
  background:repeating-linear-gradient(0deg,rgba(255,255,255,0) 0 2px,rgba(255,255,255,.03) 2px 3px);
  mix-blend-mode:overlay;}
/* 回憶模式時，對話框／揭示框優先於 memory-bg */
#dialog-area{z-index:160;}
#info-modal{z-index:200;}
/* 立繪在回憶模式中保留可見 */
#sprites{z-index:50;}

/* ── 通用框框：提示／知識卡／規則 ── */
#info-modal{position:fixed;inset:0;z-index:200;display:none;
  align-items:center;justify-content:center;
  background:rgba(8,4,2,.72);
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  font-family:'Shippori Mincho','Noto Serif TC',serif;}
#info-modal.on{display:flex;animation:im-fade .25s ease both;}
@keyframes im-fade{from{opacity:0;}to{opacity:1;}}
.im-frame{position:relative;
  max-width:min(640px,86%);max-height:80%;
  padding:32px 36px 24px;color:#1a0a04;
  border:5px double var(--brick-dark);
  background-color:#f0e5d0;
  background-image:
    radial-gradient(ellipse at 20% 18%,rgba(180,130,80,.08),transparent 55%),
    radial-gradient(ellipse at 78% 82%,rgba(80,32,16,.1),transparent 55%),
    repeating-linear-gradient(45deg,rgba(140,90,40,0) 0 7px,rgba(140,90,40,.04) 7px 8px),
    linear-gradient(180deg,#f5ead4 0%,#dcc8a8 100%);
  box-shadow:0 18px 60px rgba(0,0,0,.85),0 0 0 1px var(--brick-dark) inset,
    0 0 0 6px #f0e5d0 inset,0 0 0 7px var(--brick-dark) inset;
  display:flex;flex-direction:column;animation:im-pop .3s ease both;}
@keyframes im-pop{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
.im-corner{position:absolute;width:14px;height:14px;
  border-color:var(--brick-dark);border-style:solid;border-width:0;}
.im-tl{top:8px;left:8px;border-top-width:2px;border-left-width:2px;}
.im-tr{top:8px;right:8px;border-top-width:2px;border-right-width:2px;}
.im-bl{bottom:8px;left:8px;border-bottom-width:2px;border-left-width:2px;}
.im-br{bottom:8px;right:8px;border-bottom-width:2px;border-right-width:2px;}
.im-title{font-size:1.25em;letter-spacing:.45em;font-weight:700;
  color:var(--brick-dark);text-align:center;
  border-bottom:2px solid var(--brick-dark);
  padding-bottom:12px;margin-bottom:14px;}
.im-body{font-size:.95em;line-height:1.95;letter-spacing:.06em;
  color:#2a1408;white-space:pre-wrap;
  overflow-y:auto;padding-right:6px;}
.im-body::-webkit-scrollbar{width:6px;}
.im-body::-webkit-scrollbar-thumb{background:var(--brick-dark);border-radius:3px;}
.im-close{display:block;margin:18px auto 0;
  padding:9px 32px;
  background:linear-gradient(180deg,#c25028 0%,#8a3018 100%);
  border:2px solid var(--brick-dark);border-radius:2px;
  color:#f0e5d0;font-family:inherit;
  font-size:.95em;letter-spacing:.5em;font-weight:700;
  cursor:pointer;transition:all .15s;
  box-shadow:0 3px 6px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,200,160,.3);}
.im-close:hover{background:linear-gradient(180deg,#d87050 0%,#a04020 100%);
  transform:translateY(-1px);box-shadow:0 5px 10px rgba(0,0,0,.6);}
.im-close:active{transform:translateY(1px);box-shadow:0 1px 2px rgba(0,0,0,.5);}

/* ═════ UI 字體：除了 #dialog-text 與 #dialog-text.narr（劇情文字）外，
        其他所有文字加大、加粗、改白色變亮 ═════ */
#ring-prompt,#ring-btn,#map-text,#map-btn,#photo-input-label,#photo-result,#photo-hint,
.sb-progress,.cb-label,.cb-number,.sb-jack-name,.sb-cord-name,.sb-talk-btn,.sb-finish-btn,
.sb-msg-who,.sb-msg-text,
.bg-trigram-name,#bagua-progress,#bagua-win-text,#puzzle-progress,#puzzle-errors,
#puzzle-win-text,#puzzle-reset-msg,
#niche-cont,#hg-input,
#hint-confirm-q,.hint-btn,
#hr-prefix,#hr-answer,#hr-hint,#hr-ok,
#ppr-prefix,#ppr-empty,#ppr-ok,
.bg-inc-block,.bg-inc-no,
#pzr-title,#pzr-content,#pzr-close,
#bgi-title,#bgi-content,#bgi-close,
#pl-title,#pl-hint,#pl-input,#pl-submit,#pl-status,
#inv-bar-label,#inv-bar-count,#inv-bar-arrow,#inv-panel-title,
.inv-item-name,#inv-viewer-name,#inv-viewer-close,
#ch-jp,#ch-main,#ch-sub,#ch-hint,#blackout-text,
#sb-final-btn,
.dev-btn,#dev-toggle,#dev-status{
  color:#ffffff;
  font-weight:600;
  text-shadow:0 0 2px rgba(0,0,0,.5);
}
/* 部分元素再加更大字體（保持可讀） */
#ring-prompt{font-size:1.35em;letter-spacing:.55em;}
#ring-btn,#map-btn,#photo-input-label,.sb-talk-btn,.sb-finish-btn,
#hr-ok,#ppr-ok,#pzr-close,#bgi-close,.hint-btn,#pl-submit{
  font-size:1.05em;letter-spacing:.4em;}
.cb-number{font-size:24px;}
.sb-jack-name{font-size:11.5px;}
.bg-trigram-name{font-size:.95em;}
.sb-progress,#bagua-progress,#puzzle-progress,#puzzle-errors{font-size:13px;}
#niche-cont{font-size:1.15em;letter-spacing:.5em;font-weight:700;}
#hg-input{font-weight:600;color:#fff;}
#pl-input{color:#fff;}
#hr-answer{font-size:2.4em;}
#bagua-win-text,#puzzle-win-text{font-size:2.6em;font-weight:700;text-shadow:0 0 22px rgba(255,235,180,.7);}
.bg-inc-block{font-size:14px;}
.bg-inc-no{font-size:12px;}
#inv-bar{font-size:14px;}
#inv-bar-count{font-size:13px;}
.inv-item-name{font-size:12px;}
.dev-btn{color:#fff!important;font-size:12px;}
/* 圓形燈泡按鈕保留深色文字（金色背景上才看得清楚） */
#hint-bulb,#bagua-hint-btn,#puzzle-rules-btn{color:#2a1808!important;text-shadow:none!important;}
#bagua-info-btn{color:#fff!important;}
/* 拼圖卡上的編號佔位（沒上傳圖時用大字呈現） */
.puzzle-placeholder{color:#fff;font-weight:700;}
/* 道具欄 emoji icon 維持原樣 */
.inv-item-icon{color:var(--gold);}
</style>

<body>

<!-- 滑塊揭示：每塊滑塊解開後出現在中央，玩家點擊進入回憶 -->
<div id="slider-reveal">
  <div class="sr-tile" id="sr-tile">
    <div class="sr-tile-icon" id="sr-tile-icon">🪨</div>
    <div class="sr-tile-name" id="sr-tile-name"></div>
    <div class="sr-tile-glow"></div>
  </div>
  <div class="sr-hint">點擊進入回憶</div>
</div>

<!-- 黑屏回憶背景（可帶上玩家自訂的回憶圖） -->
<div id="memory-bg"></div>

<!-- 通用框框：提示／知識卡／規則說明 -->
<div id="info-modal">

/* ══ IndexedDB（序列化開啟，避免競態） ══ */
var _idb=null,_idbQ=[],_idbBusy=false;
function openIDB(cb){
  if(_idb){cb(_idb);return;}
  _idbQ.push(cb);
  if(_idbBusy)return;
  _idbBusy=true;
  var r=indexedDB.open(IDB_NAME,IDB_VER);
  r.onupgradeneeded=function(e){
    try{e.target.result.createObjectStore(IDB_STORE);}catch(ex){}
  };
  r.onsuccess=function(e){
    _idb=e.target.result;_idbBusy=false;
    var q=_idbQ.splice(0);q.forEach(function(fn){fn(_idb);});
  };
  r.onerror=function(){
    _idbBusy=false;
    var q=_idbQ.splice(0);q.forEach(function(fn){fn(null);});
  };
}
function loadAsset(key,cb){
  openIDB(function(db){
    if(!db){cb(null);return;}
    var tx=db.transaction(IDB_STORE,'readonly');
    var r=tx.objectStore(IDB_STORE).get(key);
    r.onsuccess=function(){cb(r.result||null);};
    r.onerror=function(){cb(null);};
  });
}
function assetURL(key,cb){loadAsset(key,function(b){cb(b?URL.createObjectURL(b):null);});}
function saveAsset(key,blob,cb){
  openIDB(function(db){
    if(!db){if(cb)cb(false);return;}
    var tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(blob,key);
    tx.oncomplete=function(){if(cb)cb(true);};
    tx.onerror=function(){if(cb)cb(false);};
  });
}

function bootstrapAssets(cb){
  /* 把固定資源 + G.customAudio + G.customImages 全部納入 bootstrap，
     並嘗試多種副檔名（音訊 mp3/wav/ogg／圖片 png/jpg/jpeg/webp）。
     已經在 IndexedDB 的 key 不會被覆蓋；不在的就試著從 assets/ 拉。 */
  var list=BOOTSTRAP.slice();
  if(Array.isArray(G.customAudio)){
    G.customAudio.forEach(function(a){
      if(!a||!a.key)return;
      ['mp3','wav','ogg','m4a'].forEach(function(ext){
        list.push({key:a.key,path:'assets/audio/'+a.key+'.'+ext,_audio:true,_audioKey:a.key});
      });
    });
  }
  if(Array.isArray(G.customImages)){
    G.customImages.forEach(function(s){
      if(!s||!s.key)return;
      ['png','jpg','jpeg','webp'].forEach(function(ext){
        list.push({key:s.key,path:'assets/images/'+s.key+'.'+ext,_image:true,_imageKey:s.key});
      });
    });
  }
  /* 同 key 多個副檔名候選：第一個成功的就好 */
  var pending={},done=0,total=0;
  list.forEach(function(b){if(!pending[b.key])pending[b.key]=[];pending[b.key].push(b);total++;});
  var keysHandled={};
  var _cbFired=false;
  function finish(){
    done++;
    if(done>=total&&!_cbFired&&cb){_cbFired=true;cb();}
  }
  /* 整體 bootstrap 上限 7 秒，避免任何單一 fetch / IDB 寫入卡死整局 */
  setTimeout(function(){
    if(!_cbFired&&cb){
      console.warn('[bootstrap] hard timeout reached ('+done+'/'+total+' done)');
      _cbFired=true;cb();
    }
  },7000);
  list.forEach(function(b){
    /* 已處理過此 key（成功或全部副檔名跑完）就跳過 */
    if(keysHandled[b.key]){finish();return;}
    loadAsset(b.key,function(existing){
      if(existing){keysHandled[b.key]=true;
        /* 該 key 還有其他候選 → 一併視為完成 */
        var rest=pending[b.key].length;pending[b.key]=[];
        for(var k=0;k<rest;k++)finish();
        return;
      }
      /* 嘗試 fetch 該候選；失敗印 warn 方便除錯（最常見原因：用 file:// 開啟，
         Chrome 擋了本機 fetch。請改用 start.bat 啟動本地伺服器，或從 admin 手動上傳） */
      fetch(b.path).then(function(r){
        if(!r.ok){console.warn('[bootstrap] fetch '+b.path+' → HTTP '+r.status);return null;}
        return r.blob();
      })
        .then(function(blob){
          if(blob&&!keysHandled[b.key]){
            keysHandled[b.key]=true;
            saveAsset(b.key,blob,function(){
              console.log('[bootstrap] ✓ '+b.key+' from '+b.path);
              var rest=pending[b.key].length;pending[b.key]=[];
              for(var k=0;k<rest;k++)finish();
            });
          }else{
            finish();
          }
        }).catch(function(err){
          console.warn('[bootstrap] fetch '+b.path+' failed:',err.message||err);
          finish();
        });
    });
  });
  if(!total)cb();
}

/* 自動遷移（v2 + v3） */
function migrateGameData(){
  var changed=false;
  if(!G._migV2){
    ['ch1','ch2','ch3','ch4','ch5'].forEach(function(key){
      if(!Array.isArray(G[key]))return;
      for(var i=0;i<G[key].length;i++){
        var ev=G[key][i];
        if(ev&&ev.t==='stage'&&ev.id==='map'){
          G[key].splice(i,1,
            {t:'item',id:'map',name:'地圖',icon:'🗺',asset:'map'},
            {t:'stage',id:'hint-gate'}
          );
          changed=true;i++;
        }
      }
    });
    G._migV2=true;changed=true;
  }
  if(!G._migV3){
    if(!G.hintShop)G.hintShop={hintText:'',payBtnText:'以照片購買'};
    if(!G.hintShop.hintText||G.hintShop.hintText.indexOf('拍下你認為的正確位置')>=0){
      G.hintShop.hintText='驛站正中，百萬行蹤。\n莫看遠方雲，且聽腳下風。\n十字交織處，星芒指長空，\n歸途之標，盡在方寸圓融。\n尋正確物，換前路通。\n用照片換取下一段線索。';
    }
    G._migV3=true;changed=true;
  }
  /* v4：ch3 若仍是預設佔位，補上壁龕＋八卦事件 */
  if(!G._migV4){
    if(Array.isArray(G.ch3)){
